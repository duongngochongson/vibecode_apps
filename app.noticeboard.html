<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🐝 — PIXELVERSE</title><link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">
<link rel="stylesheet" href="style.css"/><script src="app.js"></script>
<style>
.nb-title{font-family:var(--font-serif);font-size:clamp(24px,4vw,32px);font-weight:900;color:var(--text-primary);letter-spacing:0.5px}
.notice-card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:20px;margin-bottom:16px;transition:border-color 0.15s, box-shadow 0.15s}
.notice-card:hover{border-color:var(--border-default);box-shadow:0 1px 2px rgba(0,0,0,.2)}
.notice-card__head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.notice-card__title{font-family:var(--font-serif);font-size:clamp(16px,3vw,20px);font-weight:700;color:var(--text-primary);margin:0;line-height:1.4}
.notice-card__copy{font-family:var(--font-serif);font-size:var(--text-sm);font-weight:600;letter-spacing:0.5px;padding:8px 14px;background:var(--accent);border:none;color:var(--text-inverse);border-radius:6px;cursor:pointer;transition:all 0.15s;white-space:nowrap;flex-shrink:0}
.notice-card__copy:hover{background:var(--accent-hover);transform:scale(1.02)}
.notice-card__copy:active{transform:scale(0.98)}
.notice-card__body{font-family:var(--font-sans);font-size:14px;line-height:1.85;color:var(--text-primary);white-space:pre-wrap;user-select:text;word-break:break-word}
.notice-card__body a{color:var(--accent);text-decoration:underline;text-underline-offset:3px;transition:color 0.15s}
.notice-card__body a:hover{color:var(--accent-hover)}
.nb-empty{text-align:center;padding:60px 20px;color:var(--text-tertiary);font-size:13px;line-height:1.8}
@media(max-width:480px){.game-page{padding:20px 1rem 40px}.notice-card{padding:16px}}
</style></head>
<body><main class="game-page">
<div class="page-header"><a href="index.html" class="page-header__back" onclick="SFX.navigate()">← Home</a><h1 class="nb-title">🐝 Bảng Thông Báo</h1></div>
<div id="noticeList"></div><div class="nb-empty" id="nbEmpty" style="display:none">CHƯA CÓ THÔNG BÁO NÀO.<br>THÊM TRONG ADMIN.</div></main>
<script>
function linkify(t){return PV.escHtml(t).replace(/(https?:\/\/[^\s<>"]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>')}
function copy(t,b){navigator.clipboard?.writeText(t).catch(()=>{const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a)});const o=b.textContent;b.textContent='✓ COPIED';setTimeout(()=>b.textContent=o,2000)}
(async()=>{const notices=await PV.loadData('noticeboard')||[];const list=document.getElementById('noticeList');
if(!notices.length){document.getElementById('nbEmpty').style.display='';return}
notices.forEach(n=>{const a=document.createElement('article');a.className='notice-card';
const cb=document.createElement('button');cb.className='notice-card__copy';cb.textContent='Copy';
cb.addEventListener('click',e=>{e.stopPropagation();SFX.click?.();copy(n.title+'\n\n'+n.body,cb)});
const h=document.createElement('div');h.className='notice-card__head';
const t=document.createElement('h2');t.className='notice-card__title';t.textContent=n.title;
h.appendChild(t);h.appendChild(cb);
const b=document.createElement('div');b.className='notice-card__body';b.innerHTML=linkify(n.body);
a.appendChild(h);a.appendChild(b);list.appendChild(a)})})();
</script></body></html>
