<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🦊 — PIXELVERSE</title><link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">
<link rel="stylesheet" href="style.css"/><script src="app.js"></script>
<style>.game-page{padding:32px 1.5rem 80px;max-width:800px}
.page-header__title{font-family:var(--fp);font-size:clamp(14px,3vw,20px);color:var(--orange);letter-spacing:3px;margin:12px 0 10px}
.mece-exp{font-family:var(--fb);font-size:13px;color:rgba(232,232,255,.75);line-height:1.6;max-width:600px;margin:0 auto}
.mece-exp strong{color:var(--orange)}
.qcard{background:var(--card);border:2px solid var(--grey);padding:20px 24px;margin-bottom:16px;transition:border-color .2s}
.qcard.correct{border-color:var(--green)}.qcard.wrong{border-color:var(--magenta)}
.qcard__hdr{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.qcard__num{font-family:var(--fp);font-size:9px;color:var(--orange);min-width:28px}
.qcard__topic{font-family:var(--fh);font-size:16px;font-weight:700;color:var(--white)}
.qcard__concept{font-family:var(--fb);font-size:12px;color:rgba(232,232,255,.4);font-style:italic;margin-bottom:12px;padding-left:40px}
.cats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;padding-left:40px}
.cat-chip{font-family:var(--fb);font-size:12px;color:var(--white);padding:6px 14px;border:1px solid rgba(255,255,255,.15);background:var(--card2)}
.cat-chip[title]{cursor:help}
.ans-group{display:flex;flex-wrap:wrap;gap:8px;padding-left:40px}
.ans-btn{font-family:var(--fb);font-size:12px;font-weight:600;padding:8px 14px;border:2px solid var(--grey);background:transparent;color:var(--grey);cursor:pointer;transition:all .15s}
.ans-btn:hover{border-color:var(--white);color:var(--white)}
.ans-btn.selected{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 8px rgba(0,255,245,.2);background:rgba(0,255,245,.05)}
.ans-btn.r-ok{border-color:var(--green)!important;color:var(--green)!important;box-shadow:0 0 8px rgba(57,255,20,.3);background:rgba(57,255,20,.08)}
.ans-btn.r-bad{border-color:var(--magenta)!important;color:var(--magenta)!important;box-shadow:0 0 8px rgba(255,0,204,.3);background:rgba(255,0,204,.08)}
.mece-empty{text-align:center;padding:60px 20px;color:var(--grey);font-size:11px;letter-spacing:1px}
@media(max-width:600px){.game-page{padding:16px 1rem 60px}.qcard{padding:16px}.cats,.ans-group,.qcard__concept{padding-left:0}.ans-btn{font-size:10px;padding:6px 10px}}</style></head>
<body><main class="game-page">
<div class="page-header"><a href="index.html" class="page-header__back">◀ HOME</a>
<h1 class="page-header__title">🦊 MECE</h1>
<p class="mece-exp"><strong>MECE = Mutually Exclusive, Collectively Exhaustive.</strong><br>Phân loại đúng MECE khi các nhóm <strong>không chồng chéo</strong> (ME) và <strong>bao phủ hết</strong> tất cả trường hợp (CE).</p></div>
<div class="score-bar"><div class="score-chip pixel-box" id="pDisp">0 / 0 ANSWERED</div>
<button class="action-btn action-btn--check" id="checkBtn">✓ CHECK</button>
<button class="action-btn action-btn--continue" id="contBtn" style="display:none">▶ CONTINUE</button>
<div class="score-chip pixel-box pixel-box--yellow" id="sDisp">SCORE: —</div></div>
<div id="qCont"></div><div id="meceEmpty" class="mece-empty" style="display:none">Chưa có câu hỏi nào. Thêm trong Admin.</div>
<div class="result-banner" id="resultBanner"><div class="result-banner__score" id="resultScore"></div><div class="result-banner__msg" id="resultMsg"></div></div></main>
<script>
const AK=['mece','not_me','not_ce','not_mece'],AL={mece:'✓ MECE',not_me:'✗ Sai ME',not_ce:'✗ Sai CE',not_mece:'✗ Sai MECE'};
let gd=[],ans={},chk=false,tC=0,tA=0;
function build(){const c=document.getElementById('qCont');c.innerHTML='';ans={};chk=false;tC=0;tA=0;
if(!gd.length){document.getElementById('meceEmpty').style.display='';document.getElementById('checkBtn').style.display='none';upd();return}
document.getElementById('meceEmpty').style.display='none';document.getElementById('checkBtn').style.display='';
document.getElementById('contBtn').style.display='none';document.getElementById('resultBanner').style.display='none';
gd.forEach((q,i)=>{const card=document.createElement('div');card.className='qcard';card.id='qc-'+q.id;
const hdr=document.createElement('div');hdr.className='qcard__hdr';
hdr.innerHTML=`<span class="qcard__num">#${i+1}</span><span class="qcard__topic">${PV.escHtml(q.topic)}</span>`;card.appendChild(hdr);
if(q.topicConcept){const cp=document.createElement('div');cp.className='qcard__concept';cp.textContent=q.topicConcept;card.appendChild(cp)}
const cats=document.createElement('div');cats.className='cats';
(q.categories||[]).forEach(cat=>{const ch=document.createElement('span');ch.className='cat-chip';ch.textContent=cat.name;if(cat.concept)ch.title=cat.concept;cats.appendChild(ch)});card.appendChild(cats);
const gr=document.createElement('div');gr.className='ans-group';gr.dataset.qid=q.id;
AK.forEach(k=>{const b=document.createElement('button');b.className='ans-btn';b.dataset.answer=k;b.textContent=AL[k];
b.addEventListener('click',()=>{if(chk)return;SFX.click();if(ans[q.id]===k)delete ans[q.id];else ans[q.id]=k;
gr.querySelectorAll('.ans-btn').forEach(x=>x.classList.toggle('selected',x.dataset.answer===ans[q.id]));upd()});gr.appendChild(b)});
card.appendChild(gr);c.appendChild(card)});upd();uScore()}
function upd(){document.getElementById('pDisp').textContent=gd.filter(q=>ans[q.id]!==undefined).length+' / '+gd.length+' ANSWERED'}
function uScore(){document.getElementById('sDisp').textContent=tA===0?'SCORE: —':'SCORE: '+tC+'/'+tA}
function doCheck(){chk=true;let ok=0;gd.forEach(q=>{const card=document.getElementById('qc-'+q.id);const gr=card.querySelector('.ans-group');
const ua=ans[q.id],isOk=ua===q.answer;if(isOk){ok++;card.classList.add('correct')}else card.classList.add('wrong');
gr.querySelectorAll('.ans-btn').forEach(b=>{const k=b.dataset.answer;b.classList.remove('selected');
if(k===q.answer)b.classList.add('r-ok');if(k===ua&&!isOk)b.classList.add('r-bad')})});
tC+=ok;tA+=gd.length;const pct=Math.round(ok/gd.length*100);SFX[pct===100?'correct':'wrong']();
PV.showResult(ok,gd.length,PV.checkMsg(pct));document.getElementById('checkBtn').style.display='none';
document.getElementById('contBtn').style.display='';uScore()}
function doCont(){chk=false;document.querySelectorAll('.qcard').forEach(c=>c.classList.remove('correct','wrong'));
document.querySelectorAll('.ans-btn').forEach(b=>{b.classList.remove('r-ok','r-bad');const gr=b.closest('.ans-group');
b.classList.toggle('selected',b.dataset.answer===ans[+gr.dataset.qid])});
document.getElementById('resultBanner').style.display='none';document.getElementById('checkBtn').style.display='';document.getElementById('contBtn').style.display='none'}
document.getElementById('checkBtn').addEventListener('click',doCheck);document.getElementById('contBtn').addEventListener('click',doCont);
(async()=>{const d=await PV.loadData('mece');gd=d?JSON.parse(JSON.stringify(d)):[];build()})();
</script></body></html>
