<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🐜 — PIXELVERSE</title><link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">
<link rel="stylesheet" href="style.css"/><script src="app.js"></script>
<style>.game-page{padding:28px 1.5rem 40px;max-width:1200px}
.po-title{font-family:var(--font-serif);font-size:clamp(18px,4vw,28px);font-weight:700;color:var(--text-primary);letter-spacing:0.5px;margin-bottom:16px}
.game-area{display:grid;grid-template-columns:1fr 260px;gap:20px;align-items:start}
.types-col{display:flex;flex-direction:column;gap:8px}
.type-row{display:flex;align-items:flex-start;gap:10px;background:var(--bg-surface);border:2px solid var(--border-subtle);padding:10px 12px}
.type-row__label{font-family:var(--font-sans);font-size:13px;font-weight:600;padding:6px 10px;border:1px solid;flex-shrink:0;min-width:90px;text-align:center;margin-top:2px;white-space:nowrap}
.type-row--role .type-row__label{color:var(--info);border-color:var(--info)}.type-row--context .type-row__label{color:var(--game-octopus);border-color:var(--game-octopus)}
.type-row--task .type-row__label{color:var(--success);border-color:var(--success)}.type-row--output .type-row__label{color:var(--accent);border-color:var(--accent)}
.type-row--style .type-row__label{color:var(--game-fox);border-color:var(--game-fox)}.type-row--reference .type-row__label{color:var(--game-octopus);border-color:var(--game-octopus)}
.type-row--other .type-row__label{color:var(--text-tertiary);border-color:var(--text-tertiary)}
.type-row__zone{flex:1;min-height:56px;border:2px dashed var(--border-default);padding:8px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;transition:border-color .15s,background .15s}
.type-row__zone.drag-over{border-color:var(--accent);box-shadow:0 0 8px rgba(255,193,7,.25);background:rgba(255,193,7,.03)}
.type-row__zone.accepting{border-color:var(--accent);border-style:solid;cursor:pointer}.type-row__zone.accepting:hover{border-color:var(--accent-hover)}
.type-row__zone-empty{font-family:var(--font-sans);font-size:13px;color:var(--text-tertiary);padding:8px 4px;pointer-events:none;user-select:none;width:100%}
.drag-card{background:var(--bg-elevated);border:2px solid var(--border-default);padding:10px 14px;font-family:var(--font-sans);font-size:13px;color:var(--text-primary);line-height:1.5;cursor:grab;transition:border-color .15s,box-shadow .15s,opacity .15s;width:100%;position:relative;user-select:none;display:flex;align-items:flex-start;gap:8px;min-height:48px;align-items:center}
.drag-card:active{cursor:grabbing;opacity:.8}.drag-card:hover{border-color:var(--accent);box-shadow:0 0 6px rgba(255,193,7,.15)}
.drag-card.dragging{opacity:.4}.drag-card.selected{border-color:var(--accent);box-shadow:0 0 10px rgba(255,193,7,.4);background:rgba(255,193,7,.05)}
.type-row__zone .drag-card{font-size:12px;padding:6px 10px;width:auto;flex-grow:1;max-width:100%}
.drag-card.po-correct{border-color:var(--success);box-shadow:0 0 8px rgba(34,197,94,.3)}.drag-card.po-wrong{border-color:var(--error);box-shadow:0 0 8px rgba(239,68,68,.3)}
.drag-card__badge{font-family:var(--font-sans);font-size:11px;font-weight:600;padding:3px 8px;border:1px solid;flex-shrink:0;white-space:nowrap;border-radius:3px}
.card-pool-section{position:sticky;top:80px}.po-q-section{margin-bottom:24px;border:1px solid var(--border-subtle);border-radius:6px;padding:14px 16px}.po-q-section+.po-q-section{border-top-color:var(--border-subtle)}.po-q-num{font-family:var(--font-sans);font-size:11px;color:var(--text-secondary);letter-spacing:1.5px;font-weight:600;margin-bottom:10px}
.card-pool-header{font-family:var(--font-sans);font-size:13px;font-weight:600;color:var(--accent);letter-spacing:0.5px;margin-bottom:12px}
.card-pool{background:var(--bg-surface);border:2px solid var(--border-default);padding:12px;min-height:120px;display:flex;flex-direction:column;gap:8px;border-radius:var(--radius-md)}
.card-pool.drag-over{border-color:var(--accent);box-shadow:0 0 8px rgba(255,193,7,.2)}
.card-pool__empty{font-family:var(--font-sans);font-size:13px;color:var(--text-tertiary);text-align:center;padding:20px 0}
@media(max-width:768px){.game-area{grid-template-columns:1fr}.card-pool-section{order:-1;position:static}.type-row__zone .drag-card{width:100%}}
@media(max-width:480px){.game-page{padding:20px 1rem 30px}.type-row{padding:6px 8px;gap:6px}.type-row__label{min-width:70px;font-size:10px;padding:4px 6px}.drag-card{font-size:12px}}</style></head>
<body><main class="game-page">
<div class="page-header"><a href="index.html" class="page-header__back">← Home</a>
<h1 class="po-title">🐜 Sắp xếp Prompt</h1>
<p class="page-header__sub">Kéo thẻ vào đúng loại thành phần prompt</p></div>
<div class="how-to"><strong>Cách chơi:</strong> Kéo từng thẻ vào cột loại đúng của nó. Nhấp "Check" khi xong.</div>
<div class="control-bar">
<div class="control-bar__row">
<span class="control-bar__stat" id="setDisp">Bộ: 1 / 1</span>
<button class="control-bar__check" id="checkBtn">Check<span class="check-toggle" id="checkToggle">›all</span></button>
<button class="control-bar__continue" id="contBtn" style="display:none">Tiếp tục</button>
<span class="control-bar__stat" id="scoreDisp" style="display:none">Điểm: 0</span></div>
<div class="control-bar__nav">
<button class="control-bar__prev" id="prevBtn">←</button>
<div class="control-bar__dots" id="ctrlDots"></div>
<button class="control-bar__next" id="nextBtn">→</button></div></div>
<div id="gameArea"></div>
<div class="result-banner" id="resultBanner"><div class="result-banner__score" id="resultScore"></div><div class="result-banner__msg" id="resultMsg"></div></div>
<div class="po-empty" id="poEmpty" style="display:none;text-align:center;padding:60px 20px;color:var(--text-tertiary);font-size:13px">Chưa có câu hỏi nào. Thêm trong admin.</div></main>
<div class="toast" id="toast"></div>
<script>
const TO=['role','context','task','output','style','reference','other'];const TL={role:'Vai trò',context:'Bối cảnh',task:'Nhiệm vụ',output:'Đầu ra',style:'Phong cách',reference:'Tham khảo',other:'Khác'};
const TC={role:'var(--info)',context:'var(--game-octopus)',task:'var(--success)',output:'var(--accent)',style:'var(--game-fox)',reference:'var(--game-octopus)',other:'var(--text-tertiary)'};
let qs=[],ap={},so={},cr={},cq=0,tq=0,chk=false,dpQid=null,dpIdx=null,spQid=null,spIdx=null;const gameState={sets:[],currentSetIdx:0,checkMode:'all',setResults:[],globalResults:{correct:0,total:0,pct:0}};
function migrate(d){if(!d.length||d[0].questions)return d;return[{id:Date.now(),title:'Bộ 1',questions:d}]}
function initPl(){const p={};TO.forEach(t=>p[t]=[]);return p}
function getPlaced(qi,qid){const s=new Set(),p=(ap[qi]||{})[qid];if(p)TO.forEach(t=>(p[t]||[]).forEach(i=>s.add(i)));return s}
function rmFromPl(qi,qid,pi){const p=(ap[qi]||{})[qid];if(!p)return null;for(const t of TO){const a=p[t],i=a.indexOf(pi);if(i!==-1){a.splice(i,1);return t}}return null}
function clrSel(){spQid=null;spIdx=null;document.querySelectorAll('.drag-card.selected').forEach(c=>c.classList.remove('selected'));document.querySelectorAll('.type-row__zone.accepting').forEach(z=>z.classList.remove('accepting'))}
function mkCard(qid,pi,question,fromType){const part=question.parts[pi],d=document.createElement('div');d.className='drag-card';d.draggable=true;d.dataset.pi=pi;d.dataset.qid=qid;const s=document.createElement('span');s.textContent=part.text;d.appendChild(s);
d.addEventListener('click',e=>{e.stopPropagation();if(chk)return;if(spQid===qid&&spIdx===pi)clrSel();else{clrSel();spQid=qid;spIdx=pi;d.classList.add('selected');SFX.click();document.querySelectorAll(`.type-row__zone[data-qid="${qid}"]`).forEach(z=>z.classList.add('accepting'))}});
d.addEventListener('dragstart',e=>{dpQid=qid;dpIdx=pi;d.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',String(pi));clrSel()});
d.addEventListener('dragend',()=>{dpQid=null;dpIdx=null;d.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'))});
d.addEventListener('touchend',e=>{if(chk)return;const t=e.changedTouches[0],el=document.elementFromPoint(t.clientX,t.clientY);const z=el?el.closest(`.type-row__zone[data-qid="${qid}"]`):null,pool=el?el.closest(`.card-pool[data-qid="${qid}"]`):null;if(z)doPlace(qid,z.dataset.type,pi,question);else if(pool&&fromType!==null){rmFromPl(cq,qid,pi);SFX.click();rebuildQ(qid)}},{passive:true});return d}
function doPlace(qid,tk,pi,question){if(chk)return;rmFromPl(cq,qid,pi);ap[cq][qid][tk].push(pi);SFX.click();rebuildQ(qid)}
function rebuildQ(qid){const q=qs[cq].questions.find(x=>x.id===qid);if(!q)return;const sec=document.getElementById('posec-'+qid);if(!sec)return;const tc=sec.querySelector('.types-col'),pp=sec.querySelector('.card-pool'),pe=sec.querySelector('.card-pool__empty');renderTypes(tc,qid,q);renderPool(pp,pe,qid,q)}
function renderTypes(col,qid,question){col.innerHTML='';const pls=ap[cq][qid]||initPl(),res=cr[cq]?cr[cq][qid]:null;
TO.forEach(tk=>{const row=document.createElement('div');row.className=`type-row type-row--${tk}`;const lbl=document.createElement('span');lbl.className='type-row__label';lbl.textContent=TL[tk];row.appendChild(lbl);const zone=document.createElement('div');zone.className='type-row__zone';zone.dataset.type=tk;zone.dataset.qid=qid;const emp=document.createElement('span');emp.className='type-row__zone-empty';emp.textContent='Kéo thẻ vào đây';zone.appendChild(emp);const cis=pls[tk]||[];if(cis.length>0)emp.style.display='none';
cis.forEach(pi=>{const card=mkCard(qid,pi,question,tk);if(res){card.classList.add(res.results[pi]?'po-correct':'po-wrong');const part=question.parts[pi],badge=document.createElement('span');badge.className='drag-card__badge';badge.textContent=TL[part.type];badge.style.color=TC[part.type];badge.style.borderColor=TC[part.type];card.insertBefore(badge,card.firstChild)}zone.appendChild(card)});
zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over')});zone.addEventListener('dragleave',e=>{if(!zone.contains(e.relatedTarget))zone.classList.remove('drag-over')});zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag-over');if(dpIdx===null||dpQid!==qid||chk)return;doPlace(qid,tk,dpIdx,question);dpIdx=null;dpQid=null});zone.addEventListener('click',e=>{e.stopPropagation();if(spQid!==qid||spIdx===null||chk)return;doPlace(qid,tk,spIdx,question);clrSel()});
row.appendChild(zone);col.appendChild(row)})}
function renderPool(pool,poolEmp,qid,question){pool.querySelectorAll('.drag-card').forEach(c=>c.remove());const placed=getPlaced(cq,qid),res=cr[cq]?cr[cq][qid]:null;const unpl=(so[cq][qid]||[]).filter(i=>!placed.has(i));poolEmp.style.display=unpl.length===0?'block':'none';
unpl.forEach(pi=>{const card=mkCard(qid,pi,question,null);if(res){card.classList.add('po-wrong');const part=question.parts[pi],badge=document.createElement('span');badge.className='drag-card__badge';badge.textContent=TL[part.type];badge.style.color=TC[part.type];badge.style.borderColor=TC[part.type];card.insertBefore(badge,card.firstChild)}pool.appendChild(card)})}
function buildGame(){const ga=document.getElementById('gameArea');ga.innerHTML='';if(!qs[cq])return;
qs[cq].questions.forEach((q,qi)=>{const sec=document.createElement('div');sec.className='po-q-section';sec.id='posec-'+q.id;if(qs[cq].questions.length>1){const hdr=document.createElement('div');hdr.className='po-q-num';hdr.textContent=`CÂU ${qi+1}`;sec.appendChild(hdr)}const area=document.createElement('div');area.className='game-area';const tc=document.createElement('div');tc.className='types-col';const ps=document.createElement('div');ps.className='card-pool-section';const ph=document.createElement('div');ph.className='card-pool-header';ph.textContent='Thẻ còn lại';const pp=document.createElement('div');pp.className='card-pool';pp.dataset.qid=q.id;const pe=document.createElement('div');pe.className='card-pool__empty';pe.textContent='Tất cả thẻ đã được phân loại!';pp.appendChild(pe);ps.appendChild(ph);ps.appendChild(pp);area.appendChild(tc);area.appendChild(ps);sec.appendChild(area);ga.appendChild(sec);
pp.addEventListener('dragover',e=>{e.preventDefault();pp.classList.add('drag-over')});pp.addEventListener('dragleave',e=>{if(!pp.contains(e.relatedTarget))pp.classList.remove('drag-over')});pp.addEventListener('drop',e=>{e.preventDefault();pp.classList.remove('drag-over');if(dpIdx===null||dpQid!==q.id||chk)return;rmFromPl(cq,q.id,dpIdx);SFX.click();rebuildQ(q.id);dpIdx=null;dpQid=null});
renderTypes(tc,q.id,q);renderPool(pp,pe,q.id,q)});upSetNav()}
function buildSetDots(){PV.buildDots(tq,'ctrlDots');document.querySelectorAll('#ctrlDots .control-bar__dot').forEach((d,i)=>{d.addEventListener('click',e=>{e.stopPropagation();if(i!==cq){SFX.navigate();goTo(i)}})})}
function upDots(){const states=[];for(let i=0;i<tq;i++){if(i===cq)states.push('active');else if(gameState.setResults[i])states.push(gameState.setResults[i].pct===100?'answered':'wrong-q');else{const qi=ap[i];const hasAny=qi&&Object.values(qi).some(qd=>TO.some(t=>(qd[t]||[]).length>0));states.push(hasAny?'drafted':null)}}PV.setAllDots(states,'ctrlDots')}
function goTo(i){cq=i;gameState.currentSetIdx=i;chk=false;document.getElementById('resultBanner').style.display='none';document.getElementById('resultBanner').classList.remove('show');document.getElementById('checkBtn').style.display='';document.getElementById('contBtn').style.display='none';clrSel();buildGame()}
function upSetNav(){document.getElementById('setDisp').textContent=`Bộ: ${cq+1} / ${tq}`;document.getElementById('prevBtn').disabled=cq===0;document.getElementById('nextBtn').disabled=cq===tq-1;upDots()}
function doCheck(){if(gameState.checkMode==='all'){doCheckAllSets()}else{doCheckCurrentSet()}}
function doCheckCurrentSet(){chk=true;const set=qs[cq];let ok=0,tot=0;const setCr={};set.questions.forEach(q=>{const pls=ap[cq][q.id]||initPl(),results={};let qok=0;TO.forEach(tk=>{(pls[tk]||[]).forEach(pi=>{const isOk=q.parts[pi].type===tk;results[pi]=isOk;if(isOk)qok++})});const placed=getPlaced(cq,q.id);q.parts.forEach((_,i)=>{if(!placed.has(i))results[i]=false});setCr[q.id]={correct:qok,total:q.parts.length,results};ok+=qok;tot+=q.parts.length});
cr[cq]=setCr;const pct=tot===0?100:Math.round(ok/tot*100);gameState.setResults[cq]={correct:ok,total:tot,pct};SFX[pct===100?'correct':'wrong']();buildGame();upDots();const sd=document.getElementById('scoreDisp');sd.style.display='';sd.textContent=`Điểm: ${ok}/${tot}`;PV.showResult(ok,tot,PV.checkMsg(pct));document.getElementById('checkBtn').style.display='none';document.getElementById('contBtn').style.display=''}
function doCheckAllSets(){chk=true;let globalOk=0,globalTot=0;qs.forEach((set,si)=>{let ok=0,tot=0;const setCr={};set.questions.forEach(q=>{const pls=(ap[si]||{})[q.id]||initPl(),results={};let qok=0;TO.forEach(tk=>{(pls[tk]||[]).forEach(pi=>{const isOk=q.parts[pi].type===tk;results[pi]=isOk;if(isOk)qok++})});const placed=getPlaced(si,q.id);q.parts.forEach((_,i)=>{if(!placed.has(i))results[i]=false});setCr[q.id]={correct:qok,total:q.parts.length,results};ok+=qok;tot+=q.parts.length});cr[si]=setCr;const pct=tot===0?100:Math.round(ok/tot*100);gameState.setResults[si]={correct:ok,total:tot,pct};globalOk+=ok;globalTot+=tot});
const globalPct=globalTot===0?100:Math.round(globalOk/globalTot*100);gameState.globalResults={correct:globalOk,total:globalTot,pct:globalPct};SFX[globalPct===100?'correct':'wrong']();buildGame();upDots();const sd2=document.getElementById('scoreDisp');sd2.style.display='';sd2.textContent=`Điểm: ${globalOk}/${globalTot}`;PV.showResult(globalOk,globalTot,PV.checkMsg(globalPct));document.getElementById('checkBtn').style.display='none';document.getElementById('contBtn').style.display=''}
function doCont(){chk=false;cr={};document.getElementById('resultBanner').style.display='none';document.getElementById('resultBanner').classList.remove('show');document.getElementById('checkBtn').style.display='';document.getElementById('contBtn').style.display='none';document.getElementById('scoreDisp').style.display='none';buildGame();upDots()}
document.getElementById('checkBtn').addEventListener('click',doCheck);document.getElementById('checkToggle').addEventListener('click',e=>{e.stopPropagation();SFX.click();PV.toggleCheckMode(gameState)});document.getElementById('contBtn').addEventListener('click',doCont);document.getElementById('prevBtn').addEventListener('click',()=>{if(cq>0){SFX.navigate();goTo(cq-1)}});document.getElementById('nextBtn').addEventListener('click',()=>{if(cq<tq-1){SFX.navigate();goTo(cq+1)}});document.addEventListener('click',clrSel);
(async()=>{const raw=await PV.loadData('promptOrder');const d=raw?JSON.parse(JSON.stringify(raw)):[];qs=migrate(d);if(!qs.length){document.getElementById('poEmpty').style.display='';return}tq=qs.length;qs.forEach((set,si)=>{ap[si]={};so[si]={};set.questions.forEach(q=>{ap[si][q.id]=initPl();const idx=q.parts.map((_,j)=>j);for(let k=idx.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[idx[k],idx[j]]=[idx[j],idx[k]]}so[si][q.id]=idx})});gameState.sets=qs;gameState.currentSetIdx=0;gameState.checkMode='all';buildSetDots();goTo(0)})();
</script></body></html>
