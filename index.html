sparent;border:none;color:rgba(232,232,255,.85);padding:4px 10px;min-height:44px;cursor:pointer;display:inline-flex;align-items:center;transition:all .15s}.navbar__admin-btn:hover{color:var(--cyan);text-shadow:0 0 8px var(--cyan)}.navbar__grid-btn{background:transparent;border:none;color:rgba(232,232,255,.7);cursor:pointer;padding:12px;min-height:44px;display:inline-flex;align-items:center;justify-content:center;transition:color .1s}.navbar__grid-btn:hover{color:var(--cyan)}.navbar__grid-btn__dots{display:grid;grid-template-columns:repeat(3,4px);grid-template-rows:repeat(3,4px);gap:3px}.navbar__grid-dot{width:4px;height:4px;background:currentColor}.navbar__games-popup{position:fixed;top:62px;left:0;transform:translateX(-50%);z-index:200;background:var(--card);border:2px solid var(--cyan);box-shadow:0 0 20px rgba(0,255,245,.2);padding:12px;display:none}.navbar__games-popup.open{display:block}.navbar__games-list{display:grid;grid-template-columns:repeat(3,48px);gap:6px}.navbar__game-item{display:flex;align-items:center;justify-content:center;width:48px;height:48px;color:var(--white);font-size:32px;text-decoration:none;transition:transform .1s;line-height:1}.navbar__game-item:hover{transform:scale(1.2);filter:drop-shadow(0 0 6px var(--cyan))}.navbar__game-item--active{transform:scale(1.1);pointer-events:none}.hero{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 2rem 60px;min-height:60vh}.hero__badge{font-size:7px;color:var(--magenta);letter-spacing:4px;border:2px solid var(--magenta);padding:6px 14px;margin-bottom:24px}.hero__title{font-size:36px;line-height:1.4;margin-bottom:20px;background:linear-gradient(90deg,var(--cyan),var(--magenta),var(--yellow),var(--cyan));background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.hero__cta{display:inline-block;font-family:var(--fp);font-size:10px;color:var(--bg);background:var(--cyan);padding:12px 24px;border:none;cursor:pointer;box-shadow:4px 4px 0 var(--magenta)}.hero__cta:hover{transform:translate(-2px,-2px)}.apps-section{padding:40px 2rem 80px;max-width:1100px;margin:0 auto}.section-title{font-size:14px;text-align:center;margin-bottom:12px;color:var(--yellow);letter-spacing:2px}.apps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}.app-card{background:var(--card);padding:24px;display:flex;flex-direction:column;gap:12px;cursor:pointer;position:relative;border:2px solid var(--cyan);box-shadow:0 0 12px rgba(0,255,245,.15)}.app-card:hover{transform:translate(-4px,-4px);box-shadow:0 0 20px rgba(0,255,245,.3)}.app-card__icon{font-size:36px}.app-card__title{font-size:13px;letter-spacing:1px;color:var(--cyan)}.app-card__desc{font-size:12px;color:rgba(232,232,255,.75)}.app-card__btn{display:inline-block;font-family:var(--fp);font-size:8px;padding:8px 16px;border:2px solid var(--cyan);color:var(--cyan);text-align:center;cursor:pointer}.app-card__btn:hover{background:var(--cyan);color:var(--bg)}.game-page{max-width:1200px;margin:0 auto;padding:32px 1.5rem 60px;position:relative;z-index:2}.page-header{text-align:center;margin-bottom:28px}.page-header h1{font-family:var(--fh);font-size:28px;font-weight:900;color:var(--white);margin-bottom:6px}.page-header__back{display:inline-block;font-family:var(--fp);font-size:8px;color:var(--cyan);border:1px solid var(--cyan);padding:6px 14px;text-decoration:none;letter-spacing:1px;margin-bottom:14px}.page-header__back:hover{background:var(--cyan);color:var(--bg)}.action-btn{font-family:var(--fp);font-size:8px;padding:6px 14px;border:2px solid var(--green);background:transparent;color:var(--green);cursor:pointer;letter-spacing:1px}.action-btn:hover{background:var(--green);color:var(--bg)}.action-btn--continue{border-color:var(--cyan);color:var(--cyan)}.action-btn--continue:hover{background:var(--cyan)}.result-banner{display:none;text-align:center;margin-top:24px;padding:24px;border:3px solid var(--green);background:var(--card)}.result-banner__score{font-family:var(--fp);font-size:10px;color:var(--green);margin-bottom:8px}.result-banner__msg{font-size:16px;color:var(--white)}.drag-card{cursor:grab;background:var(--card2);border:2px solid var(--cyan);padding:12px;transition:all .1s}.drag-card:active{cursor:grabbing;filter:drop-shadow(0 0 8px var(--cyan))}.drop-zone{min-height:60px;border:2px dashed;padding:8px;transition:background .15s}.drop-zone.drag-over{background:rgba(255,255,255,.06)}.game-area{display:grid;grid-template-columns:1fr 280px;gap:24px;align-items:start}@keyframes rainbow{0%{background-position:0%}100%{background-position:300%}}@keyframes flicker{0%,95%,100%{opacity:1}96%{opacity:.6}}</style></head><body><nav class="navbar"><a href="/" class="navbar__logo">◈ PIXELVERSE</a><button class="navbar__grid-btn" id="gamesBtn" title="Games"><span class="navbar__grid-btn__dots"><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span></span></button><a class="navbar__admin-btn" href="app.admin.html" title="Admin">⚙</a></nav><div class="navbar__games-popup" id="gamesPopup"><div class="navbar__games-list" id="gamesList"></div></div><div id="app"></div><script>const G=[{id:'pros-cons',e:'🐺'},{id:'mind-map',e:'🐙'},{id:'matching',e:'🐿️'},{id:'file-naming',e:'🐟'},{id:'prompt-order',e:'🐜'},{id:'calculator',e:'🐬'},{id:'mece',e:'🦊'},{id:'noticeboard',e:'🐝'}];const SFX={_c:null,c(){if(!this._c)this._c=new(window.AudioContext||window.webkitAudioContext)();return this._c},_b(f,t,d,v){try{const c=this.c(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v||.08,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start(c.currentTime);o.stop(c.currentTime+d)}catch(e){}},click(){this._b(440,'square',.08,.07)},correct(){this._chord([523,659,784],'sine',.1,.15,.1)},wrong(){try{const c=this.c(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(80,t+.3);g.gain.setValueAtTime(.09,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3)}catch(e){}},_chord(freqs,type,gap,dur,vol){try{const c=this.c(),t=c.currentTime;freqs.forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type;o.frequency.value=f;g.gain.setValueAtTime(vol,t+i*gap);g.gain.exponentialRampToValueAtTime(.001,t+i*gap+dur);o.start(t+i*gap);o.stop(t+i*gap+dur)})}catch(e){}}};const PV={escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')},async loadData(k){const s=localStorage.getItem(k);if(s)try{return JSON.parse(s)}catch(e){}try{const r=await fetch('data.json');if(r.ok)return(await r.json())[k]||null}catch(e){}return null},checkMsg(p){return[[100,'🏆 Perfect!'],[70,'🎉 Great!'],[40,'👍 Good!'],[0,'💪 Try again!']].find(([m])=>p>=m)[1]},showResult(c,t,m){const b=document.getElementById('resultBanner');if(b){document.getElementById('resultScore').textContent=`${c}/${t} (${Math.round(c/t*100)}%)`;document.getElementById('resultMsg').textContent=m;b.style.display='block'}}};let D=null;async function init(){D=await fetch('data.json').then(r=>r.json()).catch(()=>({}));const cur=location.pathname.split('/').pop()||'';const gid=cur.replace('app.','').replace('.html','');document.getElementById('gamesList').innerHTML=G.map(g=>g.id===gid?`<div class="navbar__game-item navbar__game-item--active">${g.e}</div>`:`<a href="/?g=${g.id}" class="navbar__game-item">${g.e}</a>`).join('');const btn=document.getElementById('gamesBtn');btn.addEventListener('click',e=>{e.stop low)" id="cd">0</div><div style="display:grid;grid-template-columns:repeat(4,50px);gap:6px;justify-content:center;margin:20px 0">'+['7','8','9','/','4','5','6','*','1','2','3','-','0','.','=','C'].map(b=>b==='='?`<button onclick="try{this.calcVal=String(eval(document.getElementById('cd').textContent));document.getElementById('cd').textContent=this.calcVal}catch(e){document.getElementById('cd').textContent='ERR'}" style="padding:8px;background:var(--green);border:1px solid var(--green);color:var(--bg);cursor:pointer;grid-column:span 2;font-family:var(--fp)">${b}</button>`:b==='C'?`<button onclick="document.getElementById('cd').textContent='0'" style="padding:8px;background:var(--card2);border:1px solid var(--magenta);color:var(--magenta);cursor:pointer;grid-column:span 2;font-family:var(--fp)">${b}</button>`:`<button onclick="const d=document.getElementById('cd');d.textContent=(d.textContent==='0'&&'${b}'!=='.'?'${b}':d.textContent+'${b}')" style="padding:8px;background:var(--card2);border:1px solid var(--cyan);color:var(--cyan);cursor:pointer;font-family:var(--fp)">${b}</button>`).join('')+'</div>'}else PV.loadData(gameId).then(content=>{if(!content){cont.innerHTML='<p>Data not found</p>';return}cont.innerHTML=`<p>Contains ${Object.keys(content).length} items</p>`})}document.addEventListener('DOMContentLoaded',init);</script></body></html>
