<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PIXELVERSE</title><link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">
<link rel="stylesheet" href="style.css"/><script src="app.js"></script>
<style>
.hero-quote{margin-top:32px;max-width:560px;text-align:center;padding:0 1rem}
.hero-quote__text{font-family:var(--font-sans);font-size:16px;font-style:italic;color:var(--text-secondary);line-height:var(--leading-relaxed);margin-bottom:8px;transition:opacity 0.6s}
.hero-quote__author{font-family:var(--font-sans);font-size:13px;color:var(--text-tertiary);letter-spacing:0.5px;opacity:0.7;transition:opacity 0.6s}
.stats-bar{display:flex;justify-content:center;gap:clamp(24px,5vw,48px);flex-wrap:wrap;margin-top:32px;padding:0}
.stat-item{text-align:center;display:flex;flex-direction:column;gap:8px}
.stat-item__value{font-family:var(--font-serif);font-size:clamp(18px,4vw,24px);font-weight:700;color:var(--accent)}
.stat-item__label{font-size:12px;color:var(--text-secondary);letter-spacing:0.5px;font-weight:500}
</style></head>
<body>
<section class="hero">
<div class="hero__badge">PIXELVERSE</div>
<h1 class="hero__title">Chào mừng đến PIXELVERSE</h1>
<a href="#apps" class="hero__cta" onclick="SFX.navigate()">Khám phá</a>
<div class="stats-bar"><div class="stat-item"><span class="stat-item__value" id="gameCount">4+</span><span class="stat-item__label">GAMES</span></div>
<div class="stat-item"><span class="stat-item__value">∞</span><span class="stat-item__label">DEVELOPMENT</span></div>
<div class="stat-item"><span class="stat-item__value" id="sessionTimer">0s</span><span class="stat-item__label" id="timerLabel">SECONDS</span></div></div>
<div class="hero-quote"><p class="hero-quote__text" id="heroQuoteText"></p><span class="hero-quote__author" id="heroQuoteAuthor"></span></div></section>
<section class="apps-section" id="apps"><h2 class="section-title">Games</h2><div class="section-divider"><span></span></div>
<div class="apps-grid" id="appsGrid"></div></section>
<script>
const cards=[['pros-cons','🐺','Đoán Ưu/Nhược','Kéo thả thẻ vào đúng ô. Phân tích ưu/nhược điểm.','Chơi'],
['mind-map','🐙','Sơ đồ Tư Duy','Kéo thả từ khóa, nối quan hệ, hoàn thiện sơ đồ','Chơi'],
['matching','🐿️','Nối Từ','Nối các từ khóa ở hai cột với nhau theo mối quan hệ đúng.','Chơi'],
['file-naming','🐟','Đặt Tên File','Điền đường dẫn và kéo hành tinh vào đúng thư mục.','Chơi'],
['prompt-order','🐜','Sắp xếp Prompt','Kéo thả các thành phần prompt AI vào đúng thứ tự chuẩn.','Chơi'],
['calculator','🐬','Máy Tính','Công cụ tính toán nhanh với giao diện pixel.','Mở'],
['mece','🦊','MECE','Phân loại đúng MECE hay không? Rèn tư duy phân tích logic!','Chơi'],
['noticeboard','🐝','Bảng Thông Báo','Đọc thông báo và thông tin quan trọng.','Đọc']];
document.getElementById('appsGrid').innerHTML=cards.map(([id,e,t,d,b])=>`<article class="app-card" data-game="${id}" onclick="SFX.navigate();location.href='app.${id}.html'"><div class="app-card__icon">${e}</div><h3 class="app-card__title">${t}</h3><p class="app-card__desc">${d}</p><button class="app-card__btn">${b}</button></article>`).join('');
document.getElementById('gameCount').textContent=cards.length+'+';
const Q=[{t:"The universe is under no obligation to make sense to you.",a:"Neil deGrasse Tyson"},{t:"We are all made of star-stuff.",a:"Carl Sagan"},{t:"Space is big. You just won't believe how vastly, hugely, mind-bogglingly big it is.",a:"Douglas Adams"},{t:"Look up at the stars and not down at your feet.",a:"Stephen Hawking"},{t:"Two things are infinite: the universe and human stupidity; and I'm not sure about the universe.",a:"Albert Einstein"}];
let qi=0;const qT=document.getElementById('heroQuoteText'),qA=document.getElementById('heroQuoteAuthor');
function showQ(i){qT.style.opacity='0';qA.style.opacity='0';setTimeout(()=>{qT.textContent='\u201c'+Q[i].t+'\u201d';qA.textContent='\u2014 '+Q[i].a;qT.style.opacity='1';qA.style.opacity='1'},600)}
showQ(0);setInterval(()=>{qi=(qi+1)%Q.length;showQ(qi)},9000);
const nt=performance.getEntriesByType('navigation')[0]?.type,SK='pv_start';
if(nt==='reload'||!sessionStorage.getItem(SK))sessionStorage.setItem(SK,Date.now());
const ss=parseInt(sessionStorage.getItem(SK)),tE=document.getElementById('sessionTimer'),tL=document.getElementById('timerLabel');
function uT(){const s=Math.floor((Date.now()-ss)/1000);if(s<60){tE.textContent=s+'s';tL.textContent='SECONDS'}else{tE.textContent=Math.floor(s/60)+'+';tL.textContent='MINUTES PLAYED'}}
uT();const si=setInterval(()=>{uT();if(Date.now()-ss>=60000){clearInterval(si);setInterval(uT,60000)}},1000);
</script></body></html>
