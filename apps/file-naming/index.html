<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐟 — PIXELVERSE</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">
  <link rel="stylesheet" href="../../css/style.css" />
  <script src="../../data/file-naming.js"></script>
  <script src="../../js/sfx.js"></script>
  <script src="../../js/admin-auth.js"></script>
  <style>
    /* ===== PAGE LAYOUT ===== */
    .game-page {
      position: relative;
      z-index: 2;
      padding: 32px 1.5rem 80px;
      max-width: 900px;
      margin: 0 auto;
    }
    .page-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .page-header__back {
      display: inline-block;
      font-size: 12px;
      color: var(--grey);
      text-decoration: none;
      letter-spacing: 1px;
      margin-bottom: 8px;
      transition: color 0.15s;
    }
    .page-header__back:hover { color: var(--cyan); }
    .page-header__title {
      font-size: clamp(20px, 4vw, 32px);
      color: var(--yellow);
      text-shadow: 0 0 16px var(--yellow);
      margin: 0;
    }

    /* ===== STATUS ===== */
    .status-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 24px;
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--grey);
    }
    #scoreDisplay { color: var(--green); text-shadow: 0 0 6px var(--green); }
    #qDisplay     { color: var(--yellow); text-shadow: 0 0 6px var(--yellow); }

    /* ===== TREE PANEL ===== */
    .tree-panel {
      background: rgba(0,0,0,0.4);
      border: 2px solid rgba(255,255,255,0.08);
      padding: 16px 20px;
      margin-bottom: 24px;
      font-size: 10px;
      letter-spacing: 1px;
    }
    .tree-panel__label {
      font-size: 8px;
      color: var(--grey);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
    .tree-row {
      display: flex;
      align-items: center;
      padding: 6px 0;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .tree-row:last-child { border-bottom: none; }
    .tree-indent { color: var(--grey); flex-shrink: 0; }
    .tree-icon   { flex-shrink: 0; }
    .tree-name   { color: var(--white); }
    .tree-path   { font-size: 8px; color: var(--grey); margin-left: auto; }

    /* Drop zone for "find file" questions */
    .drop-zone {
      min-width: 60px;
      min-height: 28px;
      border: 2px dashed var(--grey);
      padding: 2px 8px;
      display: inline-flex;
      align-items: center;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-left: auto;
    }
    .drop-zone.over {
      border-color: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
    }
    .drop-zone.correct {
      border-color: var(--green);
      box-shadow: 0 0 8px var(--green);
    }
    .drop-zone.wrong {
      border-color: var(--magenta);
      box-shadow: 0 0 8px var(--magenta);
    }

    /* ===== QUESTION CARD ===== */
    .question-card {
      border: 2px solid var(--yellow);
      background: rgba(255,230,0,0.03);
      padding: 20px;
      margin-bottom: 20px;
    }
    .question-card__type {
      font-size: 8px;
      color: var(--yellow);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .question-card__prompt {
      font-size: 11px;
      color: var(--white);
      letter-spacing: 1px;
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .question-card__prompt .highlight {
      color: var(--cyan);
      text-shadow: 0 0 8px var(--cyan);
    }
    .question-card__prompt .path {
      color: var(--green);
      text-shadow: 0 0 6px var(--green);
      font-size: 10px;
      display: block;
      margin-top: 6px;
    }

    /* Type-answer input */
    .answer-input {
      width: 100%;
      box-sizing: border-box;
      background: transparent;
      border: 2px solid var(--grey);
      color: var(--white);
      font-family: var(--font-pixel);
      font-size: 10px;
      letter-spacing: 1px;
      padding: 8px 12px;
      transition: border-color 0.15s;
    }
    .answer-input:focus { outline: none; border-color: var(--cyan); }
    .answer-input.correct { border-color: var(--green); color: var(--green); }
    .answer-input.wrong   { border-color: var(--magenta); color: var(--magenta); }

    /* Draggable planet token */
    .planet-token {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 2px solid var(--cyan);
      background: rgba(0,255,245,0.05);
      color: var(--cyan);
      font-size: 10px;
      letter-spacing: 1px;
      cursor: grab;
      user-select: none;
      transition: box-shadow 0.15s;
      margin-bottom: 12px;
    }
    .planet-token:active { cursor: grabbing; }
    .planet-token.dragging { opacity: 0.5; }

    /* Correct answer display */
    .correct-answer {
      display: none;
      font-size: 9px;
      color: var(--green);
      letter-spacing: 1px;
      margin-top: 8px;
    }
    .correct-answer.show { display: block; }
    .wrong-answer-info {
      display: none;
      font-size: 9px;
      color: var(--magenta);
      letter-spacing: 1px;
      margin-top: 8px;
    }
    .wrong-answer-info.show { display: block; }

    /* ===== QUESTION NAVIGATION ===== */
    .q-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .q-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--grey);
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      border: none;
      padding: 0;
    }
    .q-dot.active   { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
    .q-dot.answered { background: var(--green);  box-shadow: 0 0 4px var(--green); }
    .q-dot.wrong-q  { background: var(--magenta); }

    /* ===== ACTION BAR ===== */
    .action-bar {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 8px;
    }
    .action-btn {
      font-family: var(--font-pixel);
      font-size: 8px;
      letter-spacing: 2px;
      padding: 10px 24px;
      border: none;
      cursor: pointer;
      transition: all 0.15s steps(2);
    }
    .action-btn--check {
      background: var(--green);
      color: var(--bg-dark);
      box-shadow: 0 0 12px var(--green);
    }
    .action-btn--check:hover { box-shadow: 0 0 20px var(--green); }
    .action-btn--play-again {
      background: var(--cyan);
      color: var(--bg-dark);
      box-shadow: 0 0 12px var(--cyan);
    }
    .action-btn--play-again:hover { box-shadow: 0 0 20px var(--cyan); }

    /* ===== RESULT BANNER ===== */
    .result-banner {
      display: none;
      text-align: center;
      padding: 16px;
      margin-top: 20px;
      border: 2px solid var(--green);
      background: rgba(57,255,20,0.05);
    }
    .result-banner__score {
      font-size: 14px;
      color: var(--green);
      text-shadow: 0 0 10px var(--green);
      margin-bottom: 6px;
    }
    .result-banner__msg {
      font-size: 10px;
      color: var(--white);
      letter-spacing: 1px;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-mid);
      border: 2px solid var(--yellow);
      color: var(--yellow);
      font-size: 9px;
      letter-spacing: 1px;
      padding: 8px 20px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== ADMIN PANEL ===== */
    .admin-panel {
      position: fixed;
      top: 0; right: -400px;
      width: min(400px, 100vw);
      height: 100%;
      background: var(--bg-mid);
      border-left: 2px solid var(--yellow);
      z-index: 200;
      overflow-y: auto;
      transition: right 0.3s steps(4);
      padding: 24px 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .admin-panel.open { right: 0; }
    .admin-panel__title {
      font-size: 10px;
      color: var(--yellow);
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    .admin-panel__close {
      position: absolute;
      top: 16px; right: 16px;
      background: transparent;
      border: 2px solid var(--yellow);
      color: var(--yellow);
      font-family: var(--font-pixel);
      font-size: 8px;
      padding: 4px 10px;
      cursor: pointer;
    }
    .admin-random-msg {
      font-size: 11px;
      color: var(--grey);
      letter-spacing: 1px;
      line-height: 1.8;
      border: 2px solid rgba(255,255,255,0.1);
      padding: 20px;
    }
    .admin-random-msg strong { color: var(--yellow); display: block; margin-bottom: 8px; }
  </style>
</head>

  <!-- ===== MAIN ===== -->
  <main class="game-page">

    <!-- Active question -->

    <div class="action-bar">

  <div class="toast" id="toast"></div>

  <script>
    // ================================================================
    //  CONSTANTS
    // ================================================================
    const GAME_EMOJI = '🐟';
    const LEVEL_ICONS = ['🌌', '🌠', '🌌', '⭐', '🪐'];
    const LEVEL_NAMES = ['Universe', 'Galaxy', 'Milky_Way', 'Solar_System', 'Planet'];
    const TOTAL_Q = 10;

    // ================================================================
    //  TREE STATE (randomized on init)
    // ================================================================
    let tree = null;   // { universe, galaxy, solarSystem, planet[] } — one random branch
    let questions = [];
    let currentQ  = 0;
    let answers   = {};  // qIdx → { given, correct, isCorrect }

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function pickN(arr, n) {
      const shuffled = [...arr].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, n);
    }

    function buildTree() {
      const pools = window.FILE_NAMING_POOLS;
      const galaxy      = pick(pools.galaxies);
      const solarSystem = pick(pools.solarSystems);
      const planets     = pickN(pools.planets, 10);
      tree = { galaxy, solarSystem, planets };
    }

    function getPath(planet) {
      return `Universe/${tree.galaxy}/Milky_Way/${tree.solarSystem}/${planet}`;
    }

    // ================================================================
    //  RENDER TREE
    // ================================================================
    function renderTree() {
      const view = document.getElementById('treeView');
      const levels = [
        { icon: '🌌', name: 'Universe', indent: '' },
        { icon: '🌠', name: tree.galaxy, indent: '│ ' },
        { icon: '🌌', name: 'Milky_Way', indent: '│ │ ' },
        { icon: '⭐', name: tree.solarSystem, indent: '│ │ │ ' },
      ];
      view.innerHTML = '';
      levels.forEach((lv, i) => {
        const row = document.createElement('div');
        row.className = 'tree-row';
        row.innerHTML = `
          <span class="tree-indent">${lv.indent}${i === 0 ? '' : '└─'}</span>
          <span class="tree-icon">${lv.icon}</span>
          <span class="tree-name">${lv.name}</span>
        `;
        view.appendChild(row);
      });

      // Planet rows — with drop zones for "find file" questions
      tree.planets.forEach(planet => {
        const row = document.createElement('div');
        row.className = 'tree-row';
        row.dataset.planet = planet;
        row.innerHTML = `
          <span class="tree-indent">│ │ │ │ └─</span>
          <span class="tree-icon">🪐</span>
          <span class="tree-name">${planet}</span>
          <span class="tree-path">${getPath(planet)}</span>
        `;
        view.appendChild(row);
      });
    }

    // ================================================================
    //  GENERATE QUESTIONS (5 type + 5 drag)
    // ================================================================
    function generateQuestions() {
      const shuffled = [...tree.planets].sort(() => Math.random() - 0.5);
      const typePlanets = shuffled.slice(0, 5);
      const dragPlanets = shuffled.slice(5, 10);

      questions = [];

      typePlanets.forEach(planet => {
        questions.push({ type: 'type', planet, answer: getPath(planet) });
      });
      dragPlanets.forEach(planet => {
        questions.push({ type: 'drag', planet, answer: planet });
      });

      // Shuffle so types are mixed
      questions.sort(() => Math.random() - 0.5);
    }

    // ================================================================
    //  RENDER QUESTION
    // ================================================================
    function renderQuestion(idx) {
      const q = questions[idx];
      const area = document.getElementById('questionArea');
      area.innerHTML = '';

      const card = document.createElement('div');
      card.className = 'question-card';

      if (q.type === 'type') {
        card.innerHTML = `
          <div class="question-card__type">✏ ĐIỀN ĐƯỜNG DẪN (${idx + 1}/${TOTAL_Q})</div>
          <div class="question-card__prompt">
            Hành tinh <span class="highlight">🪐 ${q.planet}</span> nằm ở đâu trong cây thư mục?<br>
            <span style="font-size:8px;color:var(--grey)">Nhập đường dẫn đầy đủ, phân cách bằng /</span>
          </div>
          <input class="answer-input" id="answerInput" placeholder="Universe/Galaxy/Milky_Way/Solar/Planet"
                 ${answers[idx] ? 'disabled' : ''} />
          <div class="correct-answer" id="correctAnswer">✓ ĐÚNG: ${q.answer}</div>
          <div class="wrong-answer-info" id="wrongAnswer">✕ ĐÁP ÁN ĐÚNG: ${q.answer}</div>
        `;
        // Restore state
        if (answers[idx]) {
          const inp = card.querySelector('#answerInput');
          inp.value = answers[idx].given;
          inp.classList.add(answers[idx].isCorrect ? 'correct' : 'wrong');
          if (answers[idx].isCorrect) card.querySelector('#correctAnswer').classList.add('show');
          else card.querySelector('#wrongAnswer').classList.add('show');
        }
      } else {
        // Drag question — show the path, drag the planet to the right row
        const alreadyAnswered = !!answers[idx];
        card.innerHTML = `
          <div class="question-card__type">🖱 KÉO HÀNH TINH (${idx + 1}/${TOTAL_Q})</div>
          <div class="question-card__prompt">
            Tìm hành tinh có đường dẫn:<br>
            <span class="path">${getPath(q.planet)}</span>
          </div>
          ${alreadyAnswered ? '' : `<div class="planet-token" id="planetToken" draggable="true">🪐 ${q.planet}</div>`}
          <div class="correct-answer" id="correctAnswer">✓ Chính xác!</div>
          <div class="wrong-answer-info" id="wrongAnswer">✕ Sai — đây là <strong>${q.planet}</strong></div>
        `;
        if (alreadyAnswered) {
          if (answers[idx].isCorrect) card.querySelector('#correctAnswer').classList.add('show');
          else card.querySelector('#wrongAnswer').classList.add('show');
        }
      }

      area.appendChild(card);

      // Enter key submits type answer
      const inp = document.getElementById('answerInput');
      if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkCurrent(); });

      // Setup drag for drag question
      if (q.type === 'drag' && !answers[idx]) setupDragQuestion(q);
    }

    // ================================================================
    //  DRAG SETUP (for drag-to-find questions)
    // ================================================================
    function setupDragQuestion(q) {
      const token = document.getElementById('planetToken');
      if (!token) return;

      // Add drop zones to matching tree rows
      document.querySelectorAll('#treeView .tree-row[data-planet]').forEach(row => {
        const dz = document.createElement('span');
        dz.className = 'drop-zone';
        dz.dataset.planet = row.dataset.planet;
        dz.textContent = '';
        row.appendChild(dz);

        dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
        dz.addEventListener('dragleave', () => dz.classList.remove('over'));
        dz.addEventListener('drop', e => {
          e.preventDefault();
          dz.classList.remove('over');
          handleDrop(row.dataset.planet, q);
        });
      });

      token.addEventListener('dragstart', () => token.classList.add('dragging'));
      token.addEventListener('dragend', () => token.classList.remove('dragging'));
    }

    function handleDrop(droppedOnPlanet, q) {
      SFX.place();
      const isCorrect = droppedOnPlanet === q.planet;
      answers[currentQ] = { given: droppedOnPlanet, correct: q.planet, isCorrect };

      // Show result on tree
      document.querySelectorAll('#treeView .drop-zone').forEach(dz => {
        if (dz.dataset.planet === droppedOnPlanet) {
          dz.textContent = '🪐';
          dz.classList.add(isCorrect ? 'correct' : 'wrong');
        }
        dz.removeEventListener('dragover', () => {});
      });

      // Show card feedback
      if (isCorrect) {
        document.getElementById('correctAnswer')?.classList.add('show');
        SFX.correct();
      } else {
        document.getElementById('wrongAnswer')?.classList.add('show');
        SFX.wrong();
      }

      const token = document.getElementById('planetToken');
      if (token) token.draggable = false;

      updateQDots();
      updateScore();
      showContinueBtnIfNeeded();
    }

    // ================================================================
    //  CHECK CURRENT (type question)
    // ================================================================
    function checkCurrent() {
      const q = questions[currentQ];

      if (q.type === 'type') {
        const inp = document.getElementById('answerInput');
        if (!inp) return;
        const given = inp.value.trim();
        if (!given) { showToast('Nhập đường dẫn trước!'); return; }

        // Normalize: lowercase, spaces → underscores
        const normalize = s => s.toLowerCase().replace(/\s+/g, '_');
        const isCorrect = normalize(given) === normalize(q.answer);

        answers[currentQ] = { given, correct: q.answer, isCorrect };
        inp.disabled = true;
        inp.classList.add(isCorrect ? 'correct' : 'wrong');

        if (isCorrect) {
          document.getElementById('correctAnswer')?.classList.add('show');
          SFX.correct();
        } else {
          document.getElementById('wrongAnswer')?.classList.add('show');
          SFX.wrong();
        }

        updateQDots();
        updateScore();
        showContinueBtnIfNeeded();

      } else {
        // drag question — check if answered
        if (!answers[currentQ]) {
          showToast('Kéo hành tinh vào đúng hàng!');
        }
      }
    }

    function showContinueBtnIfNeeded() {
      if (answers[currentQ] !== undefined) {
        // Check if all questions answered
        const allDone = questions.every((_, i) => answers[i] !== undefined);
        if (allDone) {
          showFinalResults();
        }
      }
    }

    // ================================================================
    //  CONTINUE (advance to next unanswered question)
    // ================================================================
    function continueGame() {
      // Find next unanswered
      const next = questions.findIndex((_, i) => i > currentQ && answers[i] === undefined);
      if (next !== -1) {
        goToQ(next);
      } else {
        // Find any unanswered
        const any = questions.findIndex((_, i) => answers[i] === undefined);
        if (any !== -1) goToQ(any);
      }
      document.getElementById('resultBanner').style.display = 'none';
      document.getElementById('checkBtn').style.display = '';
      document.getElementById('continueBtn').style.display = 'none';
    }

    function showFinalResults() {
      const correct = Object.values(answers).filter(a => a.isCorrect).length;
      const total   = TOTAL_Q;
      const pct     = Math.round(correct / total * 100);

      SFX[pct === 100 ? 'correct' : 'wrong']();

      const msgs = [
        [100, '🏆 Hoàn hảo! Bạn nhớ đường dẫn xuất sắc!'],
        [70,  '🎉 Rất tốt! Còn một vài đường dẫn cần xem lại.'],
        [40,  '👍 Khá ổn! Hãy xem lại cây thư mục.'],
        [0,   '💪 Chưa đạt! Đọc kỹ cây thư mục và thử lại nhé.'],
      ];
      const msg = msgs.find(([min]) => pct >= min)[1];

      document.getElementById('scoreDisplay').textContent = `SCORE: ${correct} / ${total}`;
      document.getElementById('resultScore').textContent  = `${correct} / ${total} ĐÚNG (${pct}%)`;
      document.getElementById('resultMsg').textContent    = msg;
      document.getElementById('resultBanner').style.display = 'block';
      document.getElementById('checkBtn').style.display = 'none';
      document.getElementById('continueBtn').style.display = '';
    }

    // ================================================================
    //  Q NAV
    // ================================================================
    function buildQNav() {
      const nav = document.getElementById('qNav');
      nav.innerHTML = '';
      questions.forEach((_, i) => {
        const btn = document.createElement('button');
        btn.className = 'q-dot';
        btn.dataset.qi = i;
        btn.addEventListener('click', () => { SFX.click(); goToQ(i); });
        nav.appendChild(btn);
      });
    }

    function updateQDots() {
      document.querySelectorAll('.q-dot').forEach((dot, i) => {
        dot.className = 'q-dot';
        if (i === currentQ) dot.classList.add('active');
        if (answers[i] !== undefined) {
          dot.classList.add(answers[i].isCorrect ? 'answered' : 'wrong-q');
        }
      });
    }

    function goToQ(idx) {
      currentQ = idx;
      renderQuestion(idx);
      updateQDots();
      document.getElementById('qDisplay').textContent = `CÂU: ${idx + 1} / ${TOTAL_Q}`;
    }

    function updateScore() {
      const correct = Object.values(answers).filter(a => a.isCorrect).length;
      const answered = Object.keys(answers).length;
      document.getElementById('scoreDisplay').textContent = `SCORE: ${correct} / ${answered}`;
    }

    // ================================================================
    //  UTILS
    // ================================================================
    function showToast(msg, dur = 2000) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), dur);
    }

    // ================================================================
    //  GAMES POPUP
    // ================================================================
    const gamesBtn   = document.getElementById('gamesBtn');
    const gamesPopup = document.getElementById('gamesPopup');
    gamesBtn.addEventListener('click', e => { e.stopPropagation(); SFX.click(); gamesPopup.classList.toggle('open'); });
    document.addEventListener('click', () => gamesPopup.classList.remove('open'));

    // ================================================================
    //  ADMIN AUTH
    // ================================================================
    const adminBtn    = document.getElementById('adminBtn');
    const adminModal  = document.getElementById('adminModal');
    const adminPanel  = document.getElementById('adminPanel');
    const adminPw     = document.getElementById('adminPw');
    const adminError  = document.getElementById('adminError');
    const adminLoginBtn  = document.getElementById('adminLoginBtn');
    const adminCancelBtn = document.getElementById('adminCancelBtn');

    adminBtn.addEventListener('click', () => {
      SFX.click();
      if (AdminAuth.isLoggedIn()) {
        adminPanel.classList.add('open');
      } else {
        adminModal.classList.remove('hidden');
        adminPw.value = '';
        adminError.textContent = '';
        setTimeout(() => adminPw.focus(), 50);
      }
    });

    adminLoginBtn.addEventListener('click', () => {
      if (AdminAuth.login(adminPw.value)) {
        adminModal.classList.add('hidden');
        adminBtn.classList.add('logged-in');
        adminBtn.textContent = '🔓 ADMIN';
        adminPanel.classList.add('open');
      } else {
        adminError.textContent = '✕ SAI MẬT KHẨU';
        SFX.wrong();
      }
    });

    adminPw.addEventListener('keydown', e => { if (e.key === 'Enter') adminLoginBtn.click(); });
    adminCancelBtn.addEventListener('click', () => adminModal.classList.add('hidden'));
    document.getElementById('adminClose').addEventListener('click', () => adminPanel.classList.remove('open'));

    if (AdminAuth.isLoggedIn()) {
      adminBtn.classList.add('logged-in');
      adminBtn.textContent = '🔓 ADMIN';
    }

    // ================================================================
    //  INIT
    // ================================================================
    function initGame() {
      document.title = `${GAME_EMOJI} — PIXELVERSE`;
      document.getElementById('gameTitle').textContent = `${GAME_EMOJI} Đặt Tên File`;
      document.getElementById('adminPanelTitle').textContent = `⚙ ADMIN — ${GAME_EMOJI} ĐẶT TÊN FILE`;

      buildTree();
      renderTree();
      generateQuestions();
      buildQNav();
      goToQ(0);

      if (new URLSearchParams(location.search).get('admin') === 'open') {
        if (AdminAuth.isLoggedIn()) adminPanel.classList.add('open');
        else { adminModal.classList.remove('hidden'); setTimeout(() => adminPw.focus(), 50); }
      }
    }

    initGame();
  </script>
</body>
</html>
