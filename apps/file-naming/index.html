<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐟 — PIXELVERSE</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">
  <link rel="stylesheet" href="../../css/style.css" />
  <script src="../../js/sfx.js"></script>
  <style>
    /* ===== 3-PANEL LAYOUT ===== */
    .fn-layout {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: auto 1fr auto;
      height: calc(100vh - 56px);
      overflow: hidden;
    }

    /* ===== HEADER (spans both columns) ===== */
    .fn-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .fn-header__title {
      font-size: clamp(14px, 3vw, 20px);
      color: var(--yellow);
      text-shadow: 0 0 12px var(--yellow);
      margin: 0;
    }
    .fn-header__back {
      font-size: 11px;
      color: var(--grey);
      text-decoration: none;
      letter-spacing: 1px;
      margin-right: 12px;
      transition: color 0.15s;
    }
    .fn-header__back:hover { color: var(--cyan); }
    .fn-header__score {
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--green);
      text-shadow: 0 0 6px var(--green);
    }

    /* ===== TREE SIDEBAR ===== */
    .fn-tree {
      grid-row: 2;
      grid-column: 1;
      overflow-y: auto;
      border-right: 2px solid rgba(255,255,255,0.08);
      padding: 8px 0;
      font-size: 10px;
      user-select: none;
    }
    .fn-tree-label {
      font-size: 8px;
      color: var(--grey);
      letter-spacing: 2px;
      padding: 4px 12px 8px;
    }
    .fn-tree-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      cursor: pointer;
      color: var(--white);
      transition: background 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fn-tree-item:hover { background: rgba(255,255,255,0.04); }
    .fn-tree-item.active { background: rgba(0,255,245,0.08); color: var(--cyan); }
    .fn-tree-item.selected-planet { background: rgba(0,255,245,0.15); color: var(--cyan); }
    .fn-tree-toggle {
      width: 14px;
      text-align: center;
      color: var(--grey);
      flex-shrink: 0;
      font-size: 9px;
    }
    .fn-tree-icon { flex-shrink: 0; font-size: 10px; }
    .fn-tree-name { font-size: 9px; letter-spacing: 0.5px; }
    .fn-tree-children { display: none; }
    .fn-tree-children.open { display: block; }

    /* ===== BROWSER PANEL ===== */
    .fn-browser {
      grid-row: 2;
      grid-column: 2;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
    }

    /* Breadcrumb */
    .fn-breadcrumb {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-bottom: 16px;
      font-size: 9px;
      letter-spacing: 0.5px;
      flex-wrap: wrap;
    }
    .fn-bc-item {
      color: var(--grey);
      cursor: pointer;
      padding: 2px 4px;
      transition: color 0.15s;
    }
    .fn-bc-item:hover { color: var(--cyan); }
    .fn-bc-item.current { color: var(--cyan); cursor: default; }
    .fn-bc-sep { color: var(--grey); }

    /* Grid of folder/file icons */
    .fn-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      flex: 1;
      align-content: flex-start;
    }
    .fn-grid-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 80px;
      padding: 12px 8px 8px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      text-align: center;
    }
    .fn-grid-item:hover {
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.03);
    }
    .fn-grid-item.selected {
      border-color: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      background: rgba(0,255,245,0.05);
    }
    .fn-grid-item.correct-sel {
      border-color: var(--green);
      box-shadow: 0 0 8px var(--green);
    }
    .fn-grid-item.wrong-sel {
      border-color: var(--magenta);
      box-shadow: 0 0 8px var(--magenta);
    }
    .fn-grid-icon { font-size: 28px; margin-bottom: 6px; }
    .fn-grid-name {
      font-size: 8px;
      color: var(--white);
      letter-spacing: 0.5px;
      word-break: break-all;
    }
    .fn-empty {
      font-size: 9px;
      color: var(--grey);
      letter-spacing: 1px;
      padding: 20px;
    }

    /* Planet info tooltip */
    .fn-planet-info {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-top: 4px;
      background: var(--bg-mid);
      border: 1px solid var(--cyan);
      padding: 6px 10px;
      z-index: 50;
      white-space: nowrap;
      pointer-events: none;
    }
    .fn-planet-info-name {
      font-size: 9px;
      color: var(--cyan);
      margin-bottom: 2px;
    }
    .fn-planet-info-path {
      font-size: 8px;
      color: var(--grey);
      letter-spacing: 0.5px;
    }

    /* ===== ANSWER BAR ===== */
    .fn-answer-bar {
      grid-row: 3;
      grid-column: 1 / -1;
      border-top: 2px solid var(--cyan);
      box-shadow: 0 -4px 16px rgba(0,255,245,0.1);
      padding: 10px 16px;
      background: var(--bg-mid);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      min-height: 56px;
    }
    .fn-q-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .fn-nav-btn {
      background: transparent;
      border: 2px solid var(--grey);
      color: var(--grey);
      font-size: 16px;
      padding: 2px 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .fn-nav-btn:hover:not(:disabled) {
      border-color: var(--cyan);
      color: var(--cyan);
    }
    .fn-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .fn-q-label {
      font-size: 9px;
      color: var(--yellow);
      letter-spacing: 1px;
      min-width: 50px;
      text-align: center;
    }
    .fn-q-text {
      font-size: 10px;
      color: var(--white);
      letter-spacing: 0.5px;
      flex: 1;
      min-width: 120px;
    }
    .fn-q-text .fn-q-planet {
      color: var(--cyan);
      text-shadow: 0 0 6px var(--cyan);
    }
    .fn-selected-path {
      font-size: 9px;
      color: var(--green);
      letter-spacing: 0.5px;
      padding: 4px 10px;
      border: 1px solid var(--grey);
      min-width: 100px;
      text-align: center;
    }
    .fn-selected-path.empty { color: var(--grey); }
    .fn-selected-path.correct { border-color: var(--green); color: var(--green); }
    .fn-selected-path.wrong { border-color: var(--magenta); color: var(--magenta); }
    .fn-check-btn {
      font-family: var(--font-pixel);
      font-size: 8px;
      letter-spacing: 2px;
      padding: 8px 18px;
      border: none;
      cursor: pointer;
      background: var(--green);
      color: var(--bg-dark);
      box-shadow: 0 0 10px var(--green);
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .fn-check-btn:hover { box-shadow: 0 0 18px var(--green); }
    .fn-check-btn:disabled { opacity: 0.3; cursor: default; }
    .fn-dots {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }
    .fn-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--grey);
      cursor: pointer;
      border: none;
      padding: 0;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .fn-dot.active { background: var(--yellow); box-shadow: 0 0 5px var(--yellow); }
    .fn-dot.answered { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .fn-dot.wrong-q { background: var(--magenta); }

    /* Correct/wrong answer info shown in answer bar */
    .fn-answer-feedback {
      font-size: 8px;
      letter-spacing: 1px;
      flex-basis: 100%;
      text-align: center;
      padding: 2px 0;
    }
    .fn-answer-feedback.correct { color: var(--green); }
    .fn-answer-feedback.wrong { color: var(--magenta); }

    /* ===== RESULT BANNER (overlaid) ===== */
    .result-banner {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      text-align: center;
      padding: 32px 48px;
      border: 2px solid var(--green);
      background: var(--bg-dark);
      box-shadow: 0 0 40px rgba(57,255,20,0.2);
    }
    .result-banner__score {
      font-size: 14px;
      color: var(--green);
      text-shadow: 0 0 10px var(--green);
      margin-bottom: 8px;
    }
    .result-banner__msg {
      font-size: 10px;
      color: var(--white);
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    .result-banner__btn {
      font-family: var(--font-pixel);
      font-size: 8px;
      letter-spacing: 2px;
      padding: 8px 20px;
      border: none;
      cursor: pointer;
      background: var(--cyan);
      color: var(--bg-dark);
      box-shadow: 0 0 10px var(--cyan);
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-mid);
      border: 2px solid var(--yellow);
      color: var(--yellow);
      font-size: 9px;
      letter-spacing: 1px;
      padding: 8px 20px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .fn-layout { grid-template-columns: 160px 1fr; }
      .fn-grid-item { width: 64px; padding: 8px 4px 6px; }
      .fn-grid-icon { font-size: 22px; }
      .fn-answer-bar { gap: 8px; padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <a href="../../index.html" class="navbar__logo">◈ PIXELVERSE</a>
    <ul class="navbar__links">
      <li><a href="../../index.html" title="Home">🏠</a></li>
      <li>
        <button class="navbar__grid-btn" id="gamesBtn" title="Games">
          <span class="navbar__grid-btn__dots">
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
          </span>

  </nav>

  <!-- ===== GAMES POPUP ===== -->
  <div class="navbar__games-popup" id="gamesPopup">
    <div class="navbar__games-list">
      <a href="../pros-cons/index.html" class="navbar__game-item">🐺</a>
      <a href="../mind-map/index.html" class="navbar__game-item">🐙</a>

      <div class="navbar__game-item navbar__game-item--active">🐟</div>
    </div>
  </div>

  <!-- ===== MAIN 3-PANEL LAYOUT ===== -->
  <div class="fn-layout">
    <!-- Header -->
    <div class="fn-header">
      <div style="display:flex;align-items:center;">
        <a href="../../index.html" class="fn-header__back" onclick="SFX.navigate()">◂</a>
        <h1 class="fn-header__title" id="gameTitle">🐟 Đặt Tên File</h1>
      </div>
      <span class="fn-header__score" id="scoreDisplay">SCORE: 0 / 10</span>
    </div>

    <!-- Tree sidebar -->
    <aside class="fn-tree">
      <div class="fn-tree-label">CÂY THƯ MỤC</div>
      <div id="fnTreeBody"></div>
    </aside>

    <!-- File browser -->
    <section class="fn-browser">
      <div class="fn-breadcrumb" id="fnBreadcrumb"></div>
      <div class="fn-grid" id="fnGrid"></div>
    </section>

    <!-- Answer bar -->
    <div class="fn-answer-bar" id="fnAnswerBar">
      <div class="fn-q-nav">
        <button class="fn-nav-btn" id="fnPrevQ">◀</button>
        <span class="fn-q-label" id="fnQLabel">Q1/10</span>
        <button class="fn-nav-btn" id="fnNextQ">▶</button>
      </div>
      <div class="fn-q-text" id="fnQText"></div>
      <div class="fn-selected-path empty" id="fnSelectedPath">Chưa chọn</div>
      <button class="fn-check-btn" id="fnCheckBtn">✓ CHECK</button>
      <div class="fn-dots" id="fnDots"></div>
    </div>
  </div>

  <!-- Result banner -->
  <div class="result-banner" id="resultBanner">
    <div class="result-banner__score" id="resultScore"></div>
    <div class="result-banner__msg" id="resultMsg"></div>
    <button class="result-banner__btn" onclick="document.getElementById('resultBanner').style.display='none'">▶ ĐÓNG</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ================================================================
    //  CONSTANTS
    // ================================================================
    const GAME_EMOJI = '🐟';
    const TOTAL_Q = 10;

    // Icons per tree level
    const TREE_ICONS  = { root: '◈', th: '◆', nh: '✦', hs: '☆', planet: '●' };
    const BROWSER_ICONS = { root: '🌌', th: '🌀', nh: '✨', hs: '☀', planet: '🪐' };

    // ================================================================
    //  STATE
    // ================================================================
    let tree = null;            // nested tree object
    let allPlanets = [];        // flat list of { name, path, node }
    let questions = [];         // 10 random questions
    let currentQ = 0;
    let answers = {};           // qIdx → { selectedPath, correctPath, isCorrect }
    let currentFolder = null;   // current folder node shown in browser
    let selectedPlanet = null;  // { name, path } or null

    // ================================================================
    //  BUILD TREE FROM FLAT DATA
    // ================================================================
    function buildTree() {
      const d = window.FILE_NAMING_TREE;
      const root = { name: d.root, type: 'root', children: [], path: d.root };

      d.th.forEach((thName, ti) => {
        const th = { name: thName, type: 'th', children: [], path: `${d.root}/${thName}` };
        for (let ni = 0; ni < 5; ni++) {
          const nhIdx = ti * 5 + ni;
          const nhName = d.nh[nhIdx];
          const nh = { name: nhName, type: 'nh', children: [], path: `${th.path}/${nhName}` };
          for (let hi = 0; hi < 5; hi++) {
            const hsIdx = nhIdx * 5 + hi;
            const hsName = d.hs[hsIdx];
            const hsPath = `${nh.path}/${hsName}`;
            const planets = (d.pl[hsIdx] || []).map(p => ({
              name: p, type: 'planet', children: [], path: `${hsPath}/${p}`
            }));
            const hs = { name: hsName, type: 'hs', children: planets, path: hsPath };
            nh.children.push(hs);
          }
          th.children.push(nh);
        }
        root.children.push(th);
      });

      return root;
    }

    function collectPlanets(node) {
      if (node.type === 'planet') allPlanets.push(node);
      if (node.children) node.children.forEach(collectPlanets);
    }

    function findNodeByPath(path) {
      const parts = path.split('/');
      let node = tree;
      for (let i = 1; i < parts.length; i++) {
        const child = node.children.find(c => c.name === parts[i]);
        if (!child) return null;
        node = child;
      }
      return node;
    }

    // ================================================================
    //  GENERATE QUESTIONS
    // ================================================================
    function generateQuestions() {
      const shuffled = [...allPlanets].sort(() => Math.random() - 0.5);
      questions = shuffled.slice(0, TOTAL_Q).map(p => ({
        planet: p.name,
        path: p.path
      }));
    }

    // ================================================================
    //  RENDER TREE SIDEBAR
    // ================================================================
    function renderTree() {
      const body = document.getElementById('fnTreeBody');
      body.innerHTML = '';
      renderTreeNode(tree, body, 0);
    }

    function renderTreeNode(node, parent, depth) {
      const isFolder = node.type !== 'planet';
      const hasChildren = node.children && node.children.length > 0;

      const row = document.createElement('div');
      row.className = 'fn-tree-item';
      row.style.paddingLeft = (depth * 14 + 8) + 'px';
      row.dataset.path = node.path;

      // Toggle arrow for folders with children
      const toggle = document.createElement('span');
      toggle.className = 'fn-tree-toggle';
      toggle.textContent = isFolder && hasChildren ? '▸' : ' ';
      row.appendChild(toggle);

      const icon = document.createElement('span');
      icon.className = 'fn-tree-icon';
      icon.textContent = TREE_ICONS[node.type] || '●';
      row.appendChild(icon);

      const name = document.createElement('span');
      name.className = 'fn-tree-name';
      name.textContent = node.name;
      row.appendChild(name);

      parent.appendChild(row);

      if (isFolder && hasChildren) {
        const childrenWrap = document.createElement('div');
        childrenWrap.className = 'fn-tree-children';
        childrenWrap.dataset.parentPath = node.path;

        node.children.forEach(child => renderTreeNode(child, childrenWrap, depth + 1));
        parent.appendChild(childrenWrap);

        // Expand/collapse on toggle click
        toggle.addEventListener('click', e => {
          e.stopPropagation();
          SFX.click();
          const open = childrenWrap.classList.toggle('open');
          toggle.textContent = open ? '▾' : '▸';
        });

        // Click row → navigate browser to this folder + expand
        row.addEventListener('click', () => {
          SFX.click();
          navigateTo(node);
          if (!childrenWrap.classList.contains('open')) {
            childrenWrap.classList.add('open');
            toggle.textContent = '▾';
          }
        });
      } else if (node.type === 'planet') {
        row.addEventListener('click', () => selectPlanetNode(node));
      } else {
        row.addEventListener('click', () => { SFX.click(); navigateTo(node); });
      }
    }

    function highlightTreeItem(path) {
      document.querySelectorAll('.fn-tree-item').forEach(el => {
        el.classList.toggle('active', el.dataset.path === path);
      });
    }

    function expandTreeToPath(path) {
      // Expand all ancestor folders in the tree
      const parts = path.split('/');
      let acc = '';
      parts.forEach((part, i) => {
        acc += (i > 0 ? '/' : '') + part;
        const wrap = document.querySelector(`.fn-tree-children[data-parent-path="${acc}"]`);
        if (wrap && !wrap.classList.contains('open')) {
          wrap.classList.add('open');
          // Update toggle
          const prevSibling = wrap.previousElementSibling;
          if (prevSibling) {
            const tgl = prevSibling.querySelector('.fn-tree-toggle');
            if (tgl) tgl.textContent = '▾';
          }
        }
      });
    }

    // ================================================================
    //  BROWSER PANEL
    // ================================================================
    function navigateTo(node) {
      if (node.type === 'planet') return; // planets can't be navigated into
      currentFolder = node;
      renderBreadcrumb();
      renderBrowser();
      highlightTreeItem(node.path);
      expandTreeToPath(node.path);
    }

    function renderBreadcrumb() {
      const bc = document.getElementById('fnBreadcrumb');
      bc.innerHTML = '';
      const parts = currentFolder.path.split('/');
      let acc = '';
      parts.forEach((part, i) => {
        if (i > 0) {
          const sep = document.createElement('span');
          sep.className = 'fn-bc-sep';
          sep.textContent = ' / ';
          bc.appendChild(sep);
        }
        acc += (i > 0 ? '/' : '') + part;
        const link = document.createElement('span');
        link.className = 'fn-bc-item';
        if (i === parts.length - 1) link.classList.add('current');
        link.textContent = part;
        const targetPath = acc;
        link.addEventListener('click', () => {
          const target = findNodeByPath(targetPath);
          if (target && target.type !== 'planet') { SFX.click(); navigateTo(target); }
        });
        bc.appendChild(link);
      });
    }

    function renderBrowser() {
      const grid = document.getElementById('fnGrid');
      grid.innerHTML = '';

      if (!currentFolder.children || currentFolder.children.length === 0) {
        grid.innerHTML = '<div class="fn-empty">Thư mục trống</div>';
        return;
      }

      currentFolder.children.forEach(child => {
        const item = document.createElement('div');
        item.className = 'fn-grid-item';
        item.style.position = 'relative';
        item.dataset.path = child.path;

        const iconEl = document.createElement('span');
        iconEl.className = 'fn-grid-icon';
        iconEl.textContent = BROWSER_ICONS[child.type] || '🪐';
        item.appendChild(iconEl);

        const nameEl = document.createElement('span');
        nameEl.className = 'fn-grid-name';
        nameEl.textContent = child.name;
        item.appendChild(nameEl);

        if (child.type === 'planet') {
          item.addEventListener('click', () => selectPlanetNode(child));
          // Highlight if already selected
          if (selectedPlanet && selectedPlanet.path === child.path) {
            item.classList.add('selected');
          }
        } else {
          item.addEventListener('click', () => { SFX.navigate(); navigateTo(child); });
        }

        grid.appendChild(item);
      });
    }

    // ================================================================
    //  PLANET SELECTION
    // ================================================================
    function selectPlanetNode(planetNode) {
      SFX.click();
      selectedPlanet = planetNode;

      // Remove old selection styling
      document.querySelectorAll('.fn-grid-item.selected').forEach(el => el.classList.remove('selected'));
      document.querySelectorAll('.fn-tree-item.selected-planet').forEach(el => el.classList.remove('selected-planet'));

      // Highlight in browser
      const browserItem = document.querySelector(`.fn-grid-item[data-path="${planetNode.path}"]`);
      if (browserItem) {
        browserItem.classList.add('selected');
        showPlanetInfo(browserItem, planetNode);
      }

      // Highlight in tree
      const treeItem = document.querySelector(`.fn-tree-item[data-path="${planetNode.path}"]`);
      if (treeItem) treeItem.classList.add('selected-planet');

      // Navigate browser to parent folder if planet is not visible
      if (!browserItem) {
        const parentPath = planetNode.path.split('/').slice(0, -1).join('/');
        const parent = findNodeByPath(parentPath);
        if (parent) navigateTo(parent);
        // Re-highlight after render
        requestAnimationFrame(() => {
          const el = document.querySelector(`.fn-grid-item[data-path="${planetNode.path}"]`);
          if (el) { el.classList.add('selected'); showPlanetInfo(el, planetNode); }
        });
      }

      // Update answer bar
      const pathEl = document.getElementById('fnSelectedPath');
      pathEl.textContent = planetNode.path;
      pathEl.classList.remove('empty', 'correct', 'wrong');
    }

    function showPlanetInfo(itemEl, planetNode) {
      // Remove existing tooltips
      document.querySelectorAll('.fn-planet-info').forEach(el => el.remove());

      const info = document.createElement('div');
      info.className = 'fn-planet-info';
      info.innerHTML = `
        <div class="fn-planet-info-name">🪐 ${planetNode.name}</div>
        <div class="fn-planet-info-path">${planetNode.path}</div>
      `;
      itemEl.appendChild(info);

      // Auto-remove after 3 seconds
      setTimeout(() => info.remove(), 3000);
    }

    // ================================================================
    //  CHECK ANSWER
    // ================================================================
    function checkAnswer() {
      if (answers[currentQ] !== undefined) return; // Already answered

      if (!selectedPlanet) {
        showToast('Chọn hành tinh trước!');
        return;
      }

      const q = questions[currentQ];
      const isCorrect = selectedPlanet.path.toLowerCase() === q.path.toLowerCase();
      answers[currentQ] = { selectedPath: selectedPlanet.path, correctPath: q.path, isCorrect };

      if (isCorrect) {
        SFX.correct();
      } else {
        SFX.wrong();
      }

      updateAnswerBarFeedback();
      updateScore();
      updateDots();

      // Check if all done
      const allDone = questions.every((_, i) => answers[i] !== undefined);
      if (allDone) showFinalResults();
    }

    function updateAnswerBarFeedback() {
      const a = answers[currentQ];
      if (!a) return;

      const pathEl = document.getElementById('fnSelectedPath');
      pathEl.classList.add(a.isCorrect ? 'correct' : 'wrong');

      // Remove old feedback
      document.querySelectorAll('.fn-answer-feedback').forEach(el => el.remove());

      if (!a.isCorrect) {
        const fb = document.createElement('div');
        fb.className = 'fn-answer-feedback wrong';
        fb.textContent = `✕ Đáp án: ${a.correctPath}`;
        document.getElementById('fnAnswerBar').appendChild(fb);
      } else {
        const fb = document.createElement('div');
        fb.className = 'fn-answer-feedback correct';
        fb.textContent = '✓ Chính xác!';
        document.getElementById('fnAnswerBar').appendChild(fb);
      }

      // Highlight correct/wrong in browser
      const sel = document.querySelector('.fn-grid-item.selected');
      if (sel) {
        sel.classList.remove('selected');
        sel.classList.add(a.isCorrect ? 'correct-sel' : 'wrong-sel');
      }

      document.getElementById('fnCheckBtn').disabled = true;
    }

    // ================================================================
    //  QUESTION NAVIGATION
    // ================================================================
    function goToQ(idx) {
      currentQ = idx;
      selectedPlanet = null;

      // Reset selection visuals
      document.querySelectorAll('.fn-grid-item.selected, .fn-grid-item.correct-sel, .fn-grid-item.wrong-sel')
        .forEach(el => el.classList.remove('selected', 'correct-sel', 'wrong-sel'));
      document.querySelectorAll('.fn-tree-item.selected-planet')
        .forEach(el => el.classList.remove('selected-planet'));
      document.querySelectorAll('.fn-planet-info').forEach(el => el.remove());
      document.querySelectorAll('.fn-answer-feedback').forEach(el => el.remove());

      const q = questions[idx];
      document.getElementById('fnQLabel').textContent = `Q${idx + 1}/${TOTAL_Q}`;
      document.getElementById('fnQText').innerHTML = `🪐 Hành tinh <span class="fn-q-planet">"${q.planet}"</span> nằm ở đâu?`;

      document.getElementById('fnPrevQ').disabled = idx === 0;
      document.getElementById('fnNextQ').disabled = idx === TOTAL_Q - 1;

      const pathEl = document.getElementById('fnSelectedPath');
      const checkBtn = document.getElementById('fnCheckBtn');

      if (answers[idx] !== undefined) {
        // Already answered
        pathEl.textContent = answers[idx].selectedPath;
        pathEl.classList.remove('empty');
        pathEl.classList.add(answers[idx].isCorrect ? 'correct' : 'wrong');
        checkBtn.disabled = true;
        updateAnswerBarFeedback();
      } else {
        pathEl.textContent = 'Chưa chọn';
        pathEl.className = 'fn-selected-path empty';
        checkBtn.disabled = false;
      }

      updateDots();
    }

    function updateDots() {
      document.querySelectorAll('.fn-dot').forEach((dot, i) => {
        dot.className = 'fn-dot';
        if (i === currentQ) dot.classList.add('active');
        if (answers[i] !== undefined) {
          dot.classList.add(answers[i].isCorrect ? 'answered' : 'wrong-q');
        }
      });
    }

    function updateScore() {
      const correct = Object.values(answers).filter(a => a.isCorrect).length;
      const total = Object.keys(answers).length;
      document.getElementById('scoreDisplay').textContent = `SCORE: ${correct} / ${total}`;
    }

    function buildDots() {
      const container = document.getElementById('fnDots');
      container.innerHTML = '';
      for (let i = 0; i < TOTAL_Q; i++) {
        const dot = document.createElement('button');
        dot.className = 'fn-dot';
        dot.addEventListener('click', () => { SFX.click(); goToQ(i); });
        container.appendChild(dot);
      }
    }

    // ================================================================
    //  FINAL RESULTS
    // ================================================================
    function showFinalResults() {
      const correct = Object.values(answers).filter(a => a.isCorrect).length;
      const pct = Math.round(correct / TOTAL_Q * 100);

      SFX[pct === 100 ? 'correct' : 'wrong']();

      const msgs = [
        [100, '🏆 Hoàn hảo! Bạn biết rõ mọi ngõ ngách vũ trụ!'],
        [70,  '🎉 Rất tốt! Còn một vài hành tinh lạc đường.'],
        [40,  '👍 Khá ổn! Hãy khám phá thêm cây thư mục.'],
        [0,   '💪 Chưa đạt! Duyệt lại vũ trụ và thử lại nhé.'],
      ];
      const msg = msgs.find(([min]) => pct >= min)[1];

      document.getElementById('scoreDisplay').textContent = `SCORE: ${correct} / ${TOTAL_Q}`;
      document.getElementById('resultScore').textContent = `${correct} / ${TOTAL_Q} ĐÚNG (${pct}%)`;
      document.getElementById('resultMsg').textContent = msg;
      document.getElementById('resultBanner').style.display = 'block';
    }

    // ================================================================
    //  UTILS
    // ================================================================
    function showToast(msg, dur = 2000) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), dur);
    }

    // ================================================================
    //  GAMES POPUP
    // ================================================================
    const gamesBtn   = document.getElementById('gamesBtn');
    const gamesPopup = document.getElementById('gamesPopup');
    gamesBtn.addEventListener('click', e => {
      e.stopPropagation(); SFX.click(); gamesPopup.classList.toggle('open');
      if (gamesPopup.classList.contains('open')) {
        const r = gamesBtn.getBoundingClientRect();
        gamesPopup.style.left = (r.left + r.width / 2) + 'px';
        gamesPopup.style.top  = (r.bottom + 6) + 'px';
      }
    });
    document.addEventListener('click', () => gamesPopup.classList.remove('open'));

    // ================================================================
    //  EVENT LISTENERS
    // ================================================================
    document.getElementById('fnCheckBtn').addEventListener('click', checkAnswer);
    document.getElementById('fnPrevQ').addEventListener('click', () => {
      if (currentQ > 0) { SFX.navigate(); goToQ(currentQ - 1); }
    });
    document.getElementById('fnNextQ').addEventListener('click', () => {
      if (currentQ < TOTAL_Q - 1) { SFX.navigate(); goToQ(currentQ + 1); }
    });

    // ================================================================
    //  INIT
    // ================================================================
    async function initGame() {
      try {
        const r = await fetch('../../data/admin_content.json');
        if (r.ok) { const d = await r.json(); window.FILE_NAMING_TREE = d.fileNaming; }
      } catch(e) {}
      document.title = `${GAME_EMOJI} — PIXELVERSE`;
      document.getElementById('gameTitle').textContent = `${GAME_EMOJI} Đặt Tên File`;
      tree = buildTree();
      collectPlanets(tree);
      generateQuestions();

      renderTree();
      navigateTo(tree); // Start at root
      buildDots();
      goToQ(0);

    }

    initGame();
  </script>
</body>
</html>
