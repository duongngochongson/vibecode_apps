<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐟 — PIXELVERSE</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">
  <link rel="stylesheet" href="../../css/style.css" />
  <script src="../../js/sfx.js"></script>
  <style>
    /* ===== 3-PANEL LAYOUT ===== */
    .fn-layout {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: auto 1fr auto;
      height: calc(100vh - 56px);
      overflow: hidden;
    }

    /* ===== HEADER (spans both columns) ===== */
    .fn-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .fn-header__title {
      font-size: clamp(14px, 3vw, 20px);
      color: var(--yellow);
      margin: 0;
    }
    .fn-header__back {
      font-family: var(--font-pixel);
      font-size: 8px;
      color: var(--cyan);
      border: 1px solid var(--cyan);
      text-decoration: none;
      letter-spacing: 1px;
      padding: 5px 12px;
      margin-right: 12px;
      transition: all 0.1s steps(1);
    }
    .fn-header__back:hover {
      background: var(--cyan);
      color: var(--bg-dark);
      box-shadow: 0 0 12px var(--cyan);
    }
    /* ===== TREE SIDEBAR ===== */
    .fn-tree {
      grid-row: 2;
      grid-column: 1;
      overflow-y: auto;
      border-right: 2px solid rgba(255,255,255,0.08);
      padding: 8px 0;
      font-size: 10px;
      user-select: none;
    }
    .fn-tree-label {
      font-size: 8px;
      color: var(--grey);
      letter-spacing: 2px;
      padding: 4px 12px 8px;
    }
    .fn-tree-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      cursor: pointer;
      color: var(--white);
      transition: background 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fn-tree-item:hover { background: rgba(255,255,255,0.04); }
    .fn-tree-item.active { background: rgba(0,255,245,0.08); color: var(--cyan); }
    .fn-tree-item.selected-planet { background: rgba(0,255,245,0.15); color: var(--cyan); }
    .fn-tree-toggle {
      width: 14px;
      text-align: center;
      color: var(--grey);
      flex-shrink: 0;
      font-size: 9px;
    }
    .fn-tree-icon { flex-shrink: 0; font-size: 10px; }
    .fn-tree-name { font-size: 9px; letter-spacing: 0.5px; }
    .fn-tree-children { display: none; }
    .fn-tree-children.open { display: block; }

    /* ===== BROWSER PANEL ===== */
    .fn-browser {
      grid-row: 2;
      grid-column: 2;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
    }

    /* Breadcrumb */
    .fn-breadcrumb {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-bottom: 16px;
      font-size: 9px;
      letter-spacing: 0.5px;
      flex-wrap: wrap;
    }
    .fn-bc-item {
      color: var(--grey);
      cursor: pointer;
      padding: 2px 4px;
      transition: color 0.15s;
    }
    .fn-bc-item:hover { color: var(--cyan); }
    .fn-bc-item.current { color: var(--cyan); cursor: default; }
    .fn-bc-sep { color: var(--grey); }

    /* Grid of folder/file icons */
    .fn-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      flex: 1;
      align-content: flex-start;
    }
    .fn-grid-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 80px;
      padding: 12px 8px 8px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      text-align: center;
    }
    .fn-grid-item:hover {
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.03);
    }
    .fn-grid-item.selected {
      border-color: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      background: rgba(0,255,245,0.05);
    }
    .fn-grid-item.correct-sel {
      border-color: var(--green);
      box-shadow: 0 0 8px var(--green);
    }
    .fn-grid-item.wrong-sel {
      border-color: var(--magenta);
      box-shadow: 0 0 8px var(--magenta);
    }
    .fn-grid-icon { font-size: 28px; margin-bottom: 6px; }
    .fn-grid-name {
      font-size: 8px;
      color: var(--white);
      letter-spacing: 0.5px;
      word-break: break-all;
    }
    .fn-empty {
      font-size: 9px;
      color: var(--grey);
      letter-spacing: 1px;
      padding: 20px;
    }

    /* ===== ANSWER BAR ===== */
    .fn-answer-bar {
      grid-row: 3;
      grid-column: 1 / -1;
      border-top: 2px solid var(--cyan);
      box-shadow: 0 -4px 16px rgba(0,255,245,0.1);
      padding: 8px 16px 10px;
      background: var(--bg-mid);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    /* Story + answer row */
    .fn-q-block {
      flex: 1;
      min-width: 0;
    }
    /* Bottom row: type badge + nav group */
    .fn-bottom-nav {
      display: flex;
      align-items: stretch;
      gap: 12px;
    }
    /* Nav group: arrows+check row on top, dots below */
    .fn-nav-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .fn-q-nav {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .fn-nav-btn {
      background: transparent;
      border: 2px solid var(--grey);
      color: var(--grey);
      font-size: 16px;
      padding: 2px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .fn-nav-btn:hover:not(:disabled) {
      border-color: var(--cyan);
      color: var(--cyan);
    }
    .fn-nav-btn:disabled { opacity: 0.3; cursor: default; }

    /* Type badge — tall, left of nav group */
    .fn-q-type-badge {
      font-size: 10px;
      letter-spacing: 2px;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .fn-q-type-badge--find {
      background: rgba(0,255,245,0.08);
      color: var(--cyan);
      border: 1px solid var(--cyan);
    }
    .fn-q-type-badge--write {
      background: rgba(255,255,0,0.06);
      color: var(--yellow);
      border: 1px solid var(--yellow);
    }
    .fn-story-text {
      font-size: 12px;
      color: var(--white);
      line-height: 1.65;
      margin-bottom: 8px;
    }
    .fn-story-hi {
      color: var(--cyan);
      font-style: normal;
      text-shadow: 0 0 6px var(--cyan);
    }
    .fn-q-answer-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .fn-selected-path {
      font-size: 9px;
      color: var(--green);
      letter-spacing: 0.5px;
      padding: 4px 10px;
      border: 1px solid var(--grey);
      min-width: 100px;
      text-align: center;
    }
    .fn-selected-path.empty { color: var(--grey); }
    .fn-selected-path.correct { border-color: var(--green); color: var(--green); }
    .fn-selected-path.wrong { border-color: var(--magenta); color: var(--magenta); }
    .fn-write-input {
      background: var(--bg-dark);
      border: 1px solid var(--grey);
      color: var(--white);
      font-size: 10px;
      padding: 5px 10px;
      letter-spacing: 0.5px;
      width: 320px;
      max-width: 100%;
      font-family: monospace;
    }
    .fn-write-input:focus { outline: none; border-color: var(--cyan); }
    .fn-write-input.input-correct { border-color: var(--green); color: var(--green); }
    .fn-write-input.input-wrong   { border-color: var(--magenta); color: var(--magenta); }

    .fn-check-btn {
      font-family: var(--font-pixel);
      font-size: 8px;
      letter-spacing: 2px;
      padding: 8px 18px;
      border: none;
      cursor: pointer;
      background: var(--green);
      color: var(--bg-dark);
      box-shadow: 0 0 10px var(--green);
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .fn-check-btn:hover { box-shadow: 0 0 18px var(--green); }
    .fn-dots {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }
    .fn-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--grey);
      cursor: pointer;
      border: none;
      padding: 0;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .fn-dot.active   { background: var(--yellow); box-shadow: 0 0 5px var(--yellow); }
    .fn-dot.drafted  { background: rgba(0,255,245,0.45); }
    .fn-dot.answered { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .fn-dot.wrong-q  { background: var(--magenta); }

    /* Feedback row below answer input */
    .fn-answer-feedback {
      font-size: 8px;
      letter-spacing: 1px;
      flex-basis: 100%;
      padding: 2px 0;
      margin-top: 2px;
    }
    .fn-answer-feedback.wrong   { color: var(--magenta); }
    .fn-answer-feedback.correct { color: var(--green); }

    /* ===== RESULT BANNER ===== */
    .result-banner {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      text-align: center;
      padding: 32px 48px;
      border: 2px solid var(--green);
      background: var(--bg-dark);
      box-shadow: 0 0 40px rgba(57,255,20,0.2);
    }
    .result-banner__score {
      font-size: 14px;
      color: var(--green);
      text-shadow: 0 0 10px var(--green);
      margin-bottom: 8px;
    }
    .result-banner__msg {
      font-size: 10px;
      color: var(--white);
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    .result-banner__btn {
      font-family: var(--font-pixel);
      font-size: 8px;
      letter-spacing: 2px;
      padding: 8px 20px;
      border: none;
      cursor: pointer;
      background: var(--cyan);
      color: var(--bg-dark);
      box-shadow: 0 0 10px var(--cyan);
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-mid);
      border: 2px solid var(--yellow);
      color: var(--yellow);
      font-size: 9px;
      letter-spacing: 1px;
      padding: 8px 20px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .fn-layout { grid-template-columns: 160px 1fr; }
      .fn-grid-item { width: 64px; padding: 8px 4px 6px; }
      .fn-grid-icon { font-size: 22px; }
      .fn-answer-bar { gap: 8px; padding: 8px 10px; }
      .fn-write-input { width: 200px; }
      .fn-header__title { font-size: clamp(13px, 3vw, 18px); }
    }
    @media (max-width: 420px) {
      .fn-layout { grid-template-columns: 110px 1fr; }
      .fn-tree-name { font-size: 8px; }
      .fn-grid-item { width: 54px; padding: 6px 2px 4px; }
      .fn-grid-icon { font-size: 18px; }
      .fn-grid-name { font-size: 7px; }
      .fn-write-input { width: 140px; }
      .fn-answer-bar { padding: 6px 8px; gap: 6px; }
      .result-banner { padding: 20px 16px; width: 88vw; box-sizing: border-box; }
      .fn-header { padding: 8px 10px; }
    }
  </style>
</head>

  <script>
    // ================================================================
    //  CONSTANTS
    // ================================================================
    const GAME_EMOJI = '🐟';
    const TOTAL_Q = 10;

    const TREE_ICONS    = { root: '◈', th: '◆', nh: '✦', hs: '☆', planet: '●' };
    const BROWSER_ICONS = { root: '🌌', th: '🌀', nh: '✨', hs: '☀', planet: '🪐' };

    const STORIES = [
      'Tàu thám hiểm đã đáp xuống hành tinh {HP} trong hệ sao {HS}, thuộc ngân hà {NH} của thiên hà {TH}. Nhiệt độ bề mặt −200°C, bầu trời phát ánh tím mờ.',
      'Đài thiên văn phát hiện tín hiệu lạ từ hành tinh {HP} trong hệ sao {HS}. Ngân hà {NH} nằm ở rìa thiên hà {TH}, nơi không gian bẻ cong ánh sáng.',
      'Bản đồ vũ trụ cổ đại ghi: từ thiên hà {TH}, tới ngân hà {NH}, đi sâu vào hệ sao {HS} sẽ thấy hành tinh {HP} — nơi ẩn giấu kho báu của đế chế bị lãng quên.',
      'Nhiệm vụ khẩn cấp: hành tinh {HP} trong hệ sao {HS} thuộc ngân hà {NH}, thiên hà {TH} sắp bị nuốt bởi lỗ đen. Cần sơ tán dân số trước 48 giờ.',
      'Du ký vũ trụ ghi lại: thiên hà {TH} có ngân hà {NH} xinh đẹp với hệ sao {HS} nổi tiếng. Hành tinh {HP} ở đó có mùa hoa nở kéo dài 300 năm.',
    ];

    // ================================================================
    //  STATE
    // ================================================================
    let tree = null;
    let allPlanets = [];
    let questions = [];
    let currentQ = 0;
    let draftAnswers = {};   // qIdx → { planet } for find, { text } for write
    let checkResults  = {};  // qIdx → { isCorrect, correctValue }
    let selectedPlanet = null;
    let currentFolder = null;

    // ================================================================
    //  BUILD TREE
    // ================================================================
    function buildTree() {
      const d = window.FILE_NAMING_TREE;
      const root = { name: d.root, type: 'root', children: [], path: d.root };

      d.th.forEach((thName, ti) => {
        const th = { name: thName, type: 'th', children: [], path: `${d.root}/${thName}` };
        for (let ni = 0; ni < 5; ni++) {
          const nhIdx = ti * 5 + ni;
          const nhName = d.nh[nhIdx];
          const nh = { name: nhName, type: 'nh', children: [], path: `${th.path}/${nhName}` };
          for (let hi = 0; hi < 5; hi++) {
            const hsIdx = nhIdx * 5 + hi;
            const hsName = d.hs[hsIdx];
            const hsPath = `${nh.path}/${hsName}`;
            const planets = (d.pl[hsIdx] || []).map(p => ({
              name: p, type: 'planet', children: [], path: `${hsPath}/${p}`
            }));
            const hs = { name: hsName, type: 'hs', children: planets, path: hsPath };
            nh.children.push(hs);
          }
          th.children.push(nh);
        }
        root.children.push(th);
      });

      return root;
    }

    function collectPlanets(node) {
      if (node.type === 'planet') allPlanets.push(node);
      if (node.children) node.children.forEach(collectPlanets);
    }

    function findNodeByPath(path) {
      const parts = path.split('/');
      let node = tree;
      for (let i = 1; i < parts.length; i++) {
        const child = node.children.find(c => c.name === parts[i]);
        if (!child) return null;
        node = child;
      }
      return node;
    }

    // ================================================================
    //  STORY HELPERS
    // ================================================================
    function fillStory(template, planetNode) {
      const parts = planetNode.path.split('/'); // [VuTru, TH, NH, HS, HP]
      const hi = s => `<b class="fn-story-hi">${s}</b>`;
      return template
        .replace('{TH}', hi(parts[1]))
        .replace('{NH}', hi(parts[2]))
        .replace('{HS}', hi(parts[3]))
        .replace('{HP}', hi(parts[4]));
    }

    // ================================================================
    //  GENERATE QUESTIONS
    // ================================================================
    function generateQuestions() {
      const shuffled = [...allPlanets].sort(() => Math.random() - 0.5);
      const planets10 = shuffled.slice(0, 10);
      const storyIdxs = [0, 1, 2, 3, 4].sort(() => Math.random() - 0.5);

      questions = [];
      for (let i = 0; i < 5; i++) {
        const tpl = STORIES[storyIdxs[i]];
        questions.push({ type: 'find',  planet: planets10[i],     storyHtml: fillStory(tpl, planets10[i]) });
        questions.push({ type: 'write', planet: planets10[i + 5], storyHtml: fillStory(tpl, planets10[i + 5]) });
      }
    }

    // ================================================================
    //  RENDER TREE SIDEBAR
    // ================================================================
    function renderTree() {
      const body = document.getElementById('fnTreeBody');
      body.innerHTML = '';
      renderTreeNode(tree, body, 0);
    }

    function renderTreeNode(node, parent, depth) {
      const isFolder = node.type !== 'planet';
      const hasChildren = node.children && node.children.length > 0;

      const row = document.createElement('div');
      row.className = 'fn-tree-item';
      row.style.paddingLeft = (depth * 14 + 8) + 'px';
      row.dataset.path = node.path;

      const toggle = document.createElement('span');
      toggle.className = 'fn-tree-toggle';
      toggle.textContent = isFolder && hasChildren ? '▸' : ' ';
      row.appendChild(toggle);

      const icon = document.createElement('span');
      icon.className = 'fn-tree-icon';
      icon.textContent = TREE_ICONS[node.type] || '●';
      row.appendChild(icon);

      const name = document.createElement('span');
      name.className = 'fn-tree-name';
      name.textContent = node.name;
      row.appendChild(name);

      parent.appendChild(row);

      if (isFolder && hasChildren) {
        const childrenWrap = document.createElement('div');
        childrenWrap.className = 'fn-tree-children';
        childrenWrap.dataset.parentPath = node.path;

        node.children.forEach(child => renderTreeNode(child, childrenWrap, depth + 1));
        parent.appendChild(childrenWrap);

        toggle.addEventListener('click', e => {
          e.stopPropagation();
          SFX.click();
          const open = childrenWrap.classList.toggle('open');
          toggle.textContent = open ? '▾' : '▸';
        });

        row.addEventListener('click', () => {
          SFX.click();
          navigateTo(node);
          if (!childrenWrap.classList.contains('open')) {
            childrenWrap.classList.add('open');
            toggle.textContent = '▾';
          }
        });
      } else if (node.type === 'planet') {
        row.addEventListener('click', () => selectPlanetNode(node));
      } else {
        row.addEventListener('click', () => { SFX.click(); navigateTo(node); });
      }
    }

    function highlightTreeItem(path) {
      document.querySelectorAll('.fn-tree-item').forEach(el => {
        el.classList.toggle('active', el.dataset.path === path);
      });
    }

    function expandTreeToPath(path) {
      const parts = path.split('/');
      let acc = '';
      parts.forEach((part, i) => {
        acc += (i > 0 ? '/' : '') + part;
        const wrap = document.querySelector(`.fn-tree-children[data-parent-path="${acc}"]`);
        if (wrap && !wrap.classList.contains('open')) {
          wrap.classList.add('open');
          const prev = wrap.previousElementSibling;
          if (prev) { const tgl = prev.querySelector('.fn-tree-toggle'); if (tgl) tgl.textContent = '▾'; }
        }
      });
    }

    // ================================================================
    //  BROWSER PANEL
    // ================================================================
    function navigateTo(node) {
      if (node.type === 'planet') return;
      currentFolder = node;
      renderBreadcrumb();
      renderBrowser();
      highlightTreeItem(node.path);
      expandTreeToPath(node.path);
    }

    function renderBreadcrumb() {
      const bc = document.getElementById('fnBreadcrumb');
      bc.innerHTML = '';
      const parts = currentFolder.path.split('/');
      let acc = '';
      parts.forEach((part, i) => {
        if (i > 0) { const sep = document.createElement('span'); sep.className = 'fn-bc-sep'; sep.textContent = ' / '; bc.appendChild(sep); }
        acc += (i > 0 ? '/' : '') + part;
        const link = document.createElement('span');
        link.className = 'fn-bc-item' + (i === parts.length - 1 ? ' current' : '');
        link.textContent = part;
        const tp = acc;
        link.addEventListener('click', () => {
          const target = findNodeByPath(tp);
          if (target && target.type !== 'planet') { SFX.click(); navigateTo(target); }
        });
        bc.appendChild(link);
      });
    }

    function renderBrowser() {
      const grid = document.getElementById('fnGrid');
      grid.innerHTML = '';

      if (!currentFolder.children || currentFolder.children.length === 0) {
        grid.innerHTML = '<div class="fn-empty">Thư mục trống</div>';
        return;
      }

      currentFolder.children.forEach(child => {
        const item = document.createElement('div');
        item.className = 'fn-grid-item';
        item.style.position = 'relative';
        item.dataset.path = child.path;

        const iconEl = document.createElement('span');
        iconEl.className = 'fn-grid-icon';
        iconEl.textContent = BROWSER_ICONS[child.type] || '🪐';
        item.appendChild(iconEl);

        const nameEl = document.createElement('span');
        nameEl.className = 'fn-grid-name';
        nameEl.textContent = child.name;
        item.appendChild(nameEl);

        if (child.type === 'planet') {
          item.addEventListener('click', () => selectPlanetNode(child));
          if (selectedPlanet && selectedPlanet.path === child.path) item.classList.add('selected');
        } else {
          item.addEventListener('click', () => { SFX.navigate(); navigateTo(child); });
        }

        grid.appendChild(item);
      });
    }

    // ================================================================
    //  PLANET SELECTION (find questions only)
    // ================================================================
    function selectPlanetNode(planetNode) {
      // Only meaningful for find-type questions
      if (questions[currentQ]?.type !== 'find') return;

      SFX.click();
      selectedPlanet = planetNode;
      draftAnswers[currentQ] = { planet: planetNode };

      // Clear previous check result for this Q if user re-selects
      if (checkResults[currentQ]) {
        delete checkResults[currentQ];
        document.querySelectorAll('.fn-answer-feedback').forEach(el => el.remove());
      }

      // Remove old selection styling
      document.querySelectorAll('.fn-grid-item.selected, .fn-grid-item.correct-sel, .fn-grid-item.wrong-sel')
        .forEach(el => el.classList.remove('selected', 'correct-sel', 'wrong-sel'));
      document.querySelectorAll('.fn-tree-item.selected-planet')
        .forEach(el => el.classList.remove('selected-planet'));

      // Highlight in browser
      const browserItem = document.querySelector(`.fn-grid-item[data-path="${planetNode.path}"]`);
      if (browserItem) browserItem.classList.add('selected');

      // Highlight in tree
      const treeItem = document.querySelector(`.fn-tree-item[data-path="${planetNode.path}"]`);
      if (treeItem) treeItem.classList.add('selected-planet');

      // Navigate browser to parent if planet not visible
      if (!browserItem) {
        const parentPath = planetNode.path.split('/').slice(0, -1).join('/');
        const parent = findNodeByPath(parentPath);
        if (parent) navigateTo(parent);
        requestAnimationFrame(() => {
          const el = document.querySelector(`.fn-grid-item[data-path="${planetNode.path}"]`);
          if (el) el.classList.add('selected');
        });
      }

      // Update path display
      const pathEl = document.getElementById('fnSelectedPath');
      pathEl.textContent = planetNode.path;
      pathEl.className = 'fn-selected-path';

      updateCheckBtn();
      updateDots();
    }

    // ================================================================
    //  DRAFT SAVE / RESTORE
    // ================================================================
    function saveDraft(idx) {
      const q = questions[idx];
      if (!q) return;
      if (q.type === 'write') {
        const val = document.getElementById('fnWriteInput').value;
        if (val.trim()) draftAnswers[idx] = { text: val };
        else delete draftAnswers[idx];
      }
      // find type draft is saved immediately in selectPlanetNode
    }

    // ================================================================
    //  QUESTION NAVIGATION
    // ================================================================
    function goToQ(idx) {
      saveDraft(currentQ);
      currentQ = idx;
      const q = questions[idx];

      // Type badge
      const badge = document.getElementById('fnQTypeBadge');
      if (q.type === 'find') {
        badge.textContent = '🔍 TÌM FILE';
        badge.className = 'fn-q-type-badge fn-q-type-badge--find';
      } else {
        badge.textContent = '✏️ VIẾT TÊN';
        badge.className = 'fn-q-type-badge fn-q-type-badge--write';
      }

      // Story
      document.getElementById('fnStoryText').innerHTML = q.storyHtml;

      // Clear previous feedback
      document.querySelectorAll('.fn-answer-feedback').forEach(el => el.remove());

      // Show/hide answer elements
      const pathEl  = document.getElementById('fnSelectedPath');
      const inputEl = document.getElementById('fnWriteInput');
      const draft   = draftAnswers[idx];

      // Reset visual states
      document.querySelectorAll('.fn-grid-item.selected, .fn-grid-item.correct-sel, .fn-grid-item.wrong-sel')
        .forEach(el => el.classList.remove('selected', 'correct-sel', 'wrong-sel'));
      document.querySelectorAll('.fn-tree-item.selected-planet')
        .forEach(el => el.classList.remove('selected-planet'));

      if (q.type === 'find') {
        pathEl.style.display  = '';
        inputEl.style.display = 'none';
        selectedPlanet = draft?.planet || null;
        if (selectedPlanet) {
          pathEl.textContent = selectedPlanet.path;
          pathEl.className   = 'fn-selected-path';
        } else {
          pathEl.textContent = 'Chưa chọn';
          pathEl.className   = 'fn-selected-path empty';
        }
      } else {
        pathEl.style.display  = 'none';
        inputEl.style.display = '';
        inputEl.value = draft?.text || '';
        inputEl.className = 'fn-write-input';
        selectedPlanet = null;
      }

      // Show check feedback if already checked
      if (checkResults[idx]) showCheckFeedback(idx);

      updateNavBtns();
      updateCheckBtn();
      updateDots();
    }

    function updateNavBtns() {
      document.getElementById('fnPrevQ').disabled = currentQ === 0;
      document.getElementById('fnNextQ').disabled = currentQ === TOTAL_Q - 1;
    }

    // ================================================================
    //  DOTS
    // ================================================================
    function buildDots() {
      const container = document.getElementById('fnDots');
      container.innerHTML = '';
      for (let i = 0; i < TOTAL_Q; i++) {
        const dot = document.createElement('button');
        dot.className = 'fn-dot';
        dot.addEventListener('click', () => { SFX.click(); goToQ(i); });
        container.appendChild(dot);
      }
    }

    function updateDots() {
      document.querySelectorAll('.fn-dot').forEach((dot, i) => {
        dot.className = 'fn-dot';
        if (i === currentQ) dot.classList.add('active');
        else if (checkResults[i]?.isCorrect)                  dot.classList.add('answered');
        else if (checkResults[i] && !checkResults[i].isCorrect) dot.classList.add('wrong-q');
        else if (draftAnswers[i])                               dot.classList.add('drafted');
      });
    }

    // ================================================================
    //  CHECK BUTTON
    // ================================================================
    function updateCheckBtn() {
      // Check always enabled
    }

    function doCheckAll() {
      saveDraft(currentQ);

      let correct = 0;
      questions.forEach((q, i) => {
        const draft = draftAnswers[i];
        let isCorrect = false;
        let correctValue = '';

        if (q.type === 'find') {
          correctValue = q.planet.path;
          isCorrect = (draft?.planet?.path || '').toLowerCase() === correctValue.toLowerCase();
        } else {
          correctValue = q.planet.path.replace(/\//g, '.');
          isCorrect = (draft?.text || '').trim().toLowerCase() === correctValue.toLowerCase();
        }

        checkResults[i] = { isCorrect, correctValue };
        if (isCorrect) correct++;
      });

      SFX[correct === TOTAL_Q ? 'correct' : 'wrong']();
      showCheckFeedback(currentQ);
      updateDots();
      showFinalResults(correct);
    }

    // ================================================================
    //  CHECK FEEDBACK (per question)
    // ================================================================
    function showCheckFeedback(idx) {
      document.querySelectorAll('.fn-answer-feedback').forEach(el => el.remove());
      const result = checkResults[idx];
      if (!result) return;

      const q = questions[idx];

      if (q.type === 'find') {
        const pathEl = document.getElementById('fnSelectedPath');
        pathEl.className = 'fn-selected-path ' + (result.isCorrect ? 'correct' : 'wrong');
        // Also highlight grid item if visible
        document.querySelectorAll('.fn-grid-item.selected').forEach(el => {
          el.classList.remove('selected');
          el.classList.add(result.isCorrect ? 'correct-sel' : 'wrong-sel');
        });
      } else {
        const inputEl = document.getElementById('fnWriteInput');
        inputEl.className = 'fn-write-input ' + (result.isCorrect ? 'input-correct' : 'input-wrong');
      }

      if (!result.isCorrect) {
        const fb = document.createElement('div');
        fb.className = 'fn-answer-feedback wrong';
        fb.textContent = `✕ Đáp án đúng: ${result.correctValue}`;
        document.getElementById('fnAnswerBar').appendChild(fb);
      }
    }

    // ================================================================
    //  SCORE + FINAL RESULTS
    // ================================================================

    function showFinalResults(correct) {
      const pct = Math.round(correct / TOTAL_Q * 100);
      const msgs = [
        [100, '🏆 Hoàn hảo! Bạn biết rõ mọi ngõ ngách vũ trụ!'],
        [70,  '🎉 Rất tốt! Còn một vài hành tinh lạc đường.'],
        [40,  '👍 Khá ổn! Hãy khám phá thêm cây thư mục.'],
        [0,   '💪 Chưa đạt! Duyệt lại vũ trụ và thử lại nhé.'],
      ];
      const msg = msgs.find(([min]) => pct >= min)[1];
      document.getElementById('resultScore').textContent = `${correct} / ${TOTAL_Q} ĐÚNG (${pct}%)`;
      document.getElementById('resultMsg').textContent = msg;
      document.getElementById('resultBanner').style.display = 'block';
    }

    // ================================================================
    //  UTILS
    // ================================================================
    function showToast(msg, dur = 2000) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), dur);
    }

    // ================================================================
    //  GAMES POPUP
    // ================================================================
    const gamesBtn   = document.getElementById('gamesBtn');
    const gamesPopup = document.getElementById('gamesPopup');
    gamesBtn.addEventListener('click', e => {
      e.stopPropagation(); SFX.click(); gamesPopup.classList.toggle('open');
      if (gamesPopup.classList.contains('open')) {
        const r = gamesBtn.getBoundingClientRect();
        gamesPopup.style.left = (r.left + r.width / 2) + 'px';
        gamesPopup.style.top  = (r.bottom + 6) + 'px';
      }
    });
    document.addEventListener('click', () => gamesPopup.classList.remove('open'));

    // ================================================================
    //  EVENT LISTENERS
    // ================================================================
    document.getElementById('fnCheckBtn').addEventListener('click', doCheckAll);
    document.getElementById('fnPrevQ').addEventListener('click', () => {
      if (currentQ > 0) { SFX.navigate(); goToQ(currentQ - 1); }
    });
    document.getElementById('fnNextQ').addEventListener('click', () => {
      if (currentQ < TOTAL_Q - 1) { SFX.navigate(); goToQ(currentQ + 1); }
    });

    // Write input: save draft + clear old check result on edit
    document.getElementById('fnWriteInput').addEventListener('input', () => {
      const val = document.getElementById('fnWriteInput').value;
      if (val.trim()) {
        draftAnswers[currentQ] = { text: val };
        // Clear check result if user edits after checking
        if (checkResults[currentQ]) {
          delete checkResults[currentQ];
          document.querySelectorAll('.fn-answer-feedback').forEach(el => el.remove());
          document.getElementById('fnWriteInput').className = 'fn-write-input';
          updateDots();
        }
      } else {
        delete draftAnswers[currentQ];
      }
      updateCheckBtn();
    });

    document.getElementById('resultContinueBtn').addEventListener('click', () => {
      document.getElementById('resultBanner').style.display = 'none';
      // Navigate to first wrong Q for easy editing
      const wrongIdx = questions.findIndex((_, i) => checkResults[i] && !checkResults[i].isCorrect);
      if (wrongIdx !== -1) goToQ(wrongIdx);
    });

    // ================================================================
    //  INIT
    // ================================================================
    async function initGame() {
      try {
        const r = await fetch('../../data/admin_content.json');
        if (r.ok) { const d = await r.json(); window.FILE_NAMING_TREE = d.fileNaming; }
      } catch(e) {}

      document.title = `${GAME_EMOJI} — PIXELVERSE`;
      document.getElementById('gameTitle').textContent = `${GAME_EMOJI} Đặt Tên File`;

      tree = buildTree();
      collectPlanets(tree);
      generateQuestions();

      renderTree();
      navigateTo(tree);
      buildDots();
      goToQ(0);
    }

    initGame();
  </script>
</body>
</html>
