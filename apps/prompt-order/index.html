<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐜 — PIXELVERSE</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">

  <script src="../../js/sfx.js"></script>

  <script src="../../js/games-popup.js"></script>

  <style>
    /* ===== PAGE OVERRIDES ===== */
    .game-page { padding: 28px 1.5rem 40px; }
    .po-header {
      display: flex; align-items: center;
      margin-bottom: 14px;
    }
    .po-header__back { }
    .po-header__center {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 10px;
    }
    .po-title-row {
      display: flex; align-items: center; gap: 16px;
    }
    .po-page-title {
      font-family: var(--font-pixel);
      font-size: clamp(13px, 3vw, 18px);
      color: var(--yellow);
      letter-spacing: 2px;
    }
    .po-score {
      font-family: var(--font-pixel);
      font-size: 9px; letter-spacing: 1px;
      color: var(--green);
    }
    .po-q-header {
      font-family: var(--font-vi-body);
      font-size: 12px; letter-spacing: 0.5px;
      color: var(--grey); margin-bottom: 20px;
    }
    .po-q-number { color: var(--yellow); }

    /* ===== 2-COLUMN LAYOUT ===== */
    .game-area {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 20px;
      align-items: start;
    }

    /* ===== TYPE ROWS (left column) ===== */
    .types-column {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .type-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--bg-card);
      border: 2px solid rgba(255,255,255,0.06);
      padding: 8px 10px;
    }
    .type-row__label {
      font-family: var(--font-vi-body);
      font-size: 11px; font-weight: 600;
      padding: 5px 8px; border: 1px solid;
      flex-shrink: 0; min-width: 82px; text-align: center;
      margin-top: 2px; white-space: nowrap;
    }
    .type-row--role .type-row__label      { color: var(--cyan);    border-color: var(--cyan); }
    .type-row--context .type-row__label   { color: var(--magenta); border-color: var(--magenta); }
    .type-row--task .type-row__label      { color: var(--green);   border-color: var(--green); }
    .type-row--output .type-row__label    { color: var(--yellow);  border-color: var(--yellow); }
    .type-row--style .type-row__label     { color: #ff9966;        border-color: #ff9966; }
    .type-row--reference .type-row__label { color: #aa88ff;        border-color: #aa88ff; }
    .type-row--other .type-row__label     { color: var(--grey);    border-color: var(--grey); }

    .type-row__zone {
      flex: 1;
      min-height: 44px;
      border: 2px dashed rgba(255,255,255,0.12);
      padding: 6px;
      display: flex; flex-wrap: wrap; gap: 6px;
      align-content: flex-start;
      transition: border-color 0.15s, background 0.15s;
    }
    .type-row__zone.drag-over {
      border-color: var(--yellow);
      box-shadow: 0 0 8px rgba(255,230,0,0.25);
      background: rgba(255,230,0,0.03);
    }
    .type-row__zone.accepting {
      border-color: rgba(255,230,0,0.5); border-style: solid; cursor: pointer;
    }
    .type-row__zone.accepting:hover { border-color: var(--yellow); }
    .type-row__zone-empty {
      font-family: var(--font-vi-body);
      font-size: 11px; color: rgba(255,255,255,0.15);
      padding: 8px 4px; pointer-events: none; user-select: none; width: 100%;
    }

    /* ===== DRAGGABLE CARDS ===== */
    .drag-card {
      background: var(--bg-card2);
      border: 2px solid var(--grey);
      padding: 8px 12px;
      font-family: var(--font-vi-body);
      font-size: 13px; color: var(--white); line-height: 1.5;
      cursor: grab;
      transition: border-color 0.15s, box-shadow 0.15s, opacity 0.15s;
      width: 100%; position: relative; user-select: none;
      display: flex; align-items: flex-start; gap: 6px;
    }
    .drag-card:active { cursor: grabbing; opacity: 0.7; }
    .drag-card:hover  { border-color: var(--white); box-shadow: 0 0 6px rgba(232,232,255,0.15); }
    .drag-card.dragging { opacity: 0.35; }
    .drag-card.selected {
      border-color: var(--yellow);
      box-shadow: 0 0 10px rgba(255,230,0,0.4);
      background: rgba(255,230,0,0.03);
    }

    /* Cards inside drop zones are more compact, auto-width */
    .type-row__zone .drag-card {
      font-size: 12px; padding: 6px 10px;
      width: auto; flex-grow: 1; flex-shrink: 0;
      max-width: 100%;
    }

    /* Post-check styling */
    .drag-card.po-correct { border-color: var(--green);   box-shadow: 0 0 8px rgba(57,255,20,0.3); }
    .drag-card.po-wrong   { border-color: var(--magenta); box-shadow: 0 0 8px rgba(255,0,204,0.3); }

    /* Revealed type badge (shown after check) */
    .drag-card__badge {
      font-family: var(--font-vi-body);
      font-size: 9px; font-weight: 600;
      padding: 2px 6px; border: 1px solid;
      flex-shrink: 0; white-space: nowrap;
      margin-top: 1px;
    }

    /* ===== CARD POOL (right column) ===== */
    .card-pool-section { position: sticky; top: 80px; }
    .card-pool-header {
      font-family: var(--font-vi-body);
      font-size: 12px; font-weight: 600; color: var(--yellow);
      letter-spacing: 0.5px; margin-bottom: 10px;
    }
    .card-pool {
      background: var(--bg-card);
      border: 2px solid var(--grey);
      padding: 10px; min-height: 100px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .card-pool.drag-over { border-color: var(--yellow); box-shadow: 0 0 8px rgba(255,230,0,0.2); }
    .card-pool__empty {
      font-family: var(--font-vi-body);
      font-size: 11px; color: rgba(232,232,255,0.25);
      text-align: center; padding: 16px 0;
    }

    .action-btn { font-size: 9px; padding: 8px 18px; }

    /* ===== TOP NAV BAR ===== */
    .fn-answer-bar {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; margin-bottom: 14px;
    }

    /* ===== EMPTY STATE ===== */
    .po-empty { text-align: center; padding: 60px 20px; color: var(--grey); font-size: 11px; letter-spacing: 1px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .game-area { grid-template-columns: 1fr; }
      .card-pool-section { order: -1; position: static; }
      .type-row__zone .drag-card { width: 100%; }
    }
    @media (max-width: 480px) {
      .game-page { padding: 20px 1rem 30px; }
      .type-row { padding: 6px 8px; gap: 6px; }
      .type-row__label { min-width: 70px; font-size: 10px; padding: 4px 6px; }
      .drag-card { font-size: 12px; }
    }
    @media (max-width: 360px) {
      .type-row__label { min-width: 60px; }
    }
  </style>
</head>

  <!-- ===== MAIN ===== -->
  <div class="game-page">

    <div class="po-header">
      <div class="po-header__center">
        <a href="../../index.html" class="page-header__back po-header__back">◀ HOME</a>
        <div class="po-title-row">
          <h1 class="po-page-title" id="pageTitle">🐜 PROMPT ORDER</h1>
          <span class="po-score" id="scoreDisplay">SCORE: — / —</span>
        </div>

        <!-- NAV: arrows + check + dots -->
        <div class="fn-answer-bar" id="fnAnswerBar">
          <div class="fn-q-nav">
            <button class="fn-nav-btn" id="fnPrevQ">◀</button>
            <button class="action-btn action-btn--check"    id="checkBtn">✓ CHECK</button>
            <button class="action-btn action-btn--continue" id="continueBtn" style="display:none">▶ CONTINUE</button>

          </div>
          <div class="fn-dots" id="fnDots"></div>
        </div>
      </div>

    <div class="po-q-header">
      CÂU <span class="po-q-number" id="qNumber">1</span> — KÉO THẺ VÀO ĐÚNG LOẠI
    </div>

    <div class="game-area">

      <!-- LEFT: 7 type classification rows -->
      <div class="types-column" id="typesColumn"></div>

      <!-- RIGHT: card pool -->
      <div class="card-pool-section">
        <div class="card-pool-header">▸ THẺ CÒN LẠI</div>
        <div class="card-pool" id="cardPool"
             ondragover="handleDragOverPool(event)"
             ondragleave="handleDragLeavePool(event)"
             ondrop="handleDropToPool(event)">
          <div class="card-pool__empty" id="poolEmpty">Tất cả thẻ đã được phân loại!</div>
        </div>
      </div>

    </div>

    <!-- Result banner -->
    <div class="result-banner" id="resultBanner">
      <div class="result-banner__score" id="resultScore"></div>
      <div class="result-banner__msg"   id="resultMsg"></div>
    </div>

    <!-- Empty state -->
    <div id="poEmpty" class="po-empty" style="display:none">Chưa có câu hỏi nào. Thêm trong Admin.</div>

  <script>
    // ================================================================
    //  CONSTANTS
    // ================================================================
    const TYPE_ORDER  = ['role','context','task','output','style','reference','other'];
    const TYPE_LABELS = {
      role:'Vai trò', context:'Bối cảnh', task:'Nhiệm vụ',
      output:'Đầu ra', style:'Phong cách', reference:'Tham khảo', other:'Khác'
    };
    const TYPE_COLORS = {
      role:'var(--cyan)', context:'var(--magenta)', task:'var(--green)',
      output:'var(--yellow)', style:'#ff9966', reference:'#aa88ff', other:'var(--grey)'
    };

    // ================================================================
    //  STATE
    // ================================================================
    let questions      = [];
    let allPlacements  = {};   // qIdx → { role:[partIdx,...], context:[...], ... }
    let shuffledOrders = {};   // qIdx → [partIdx,...] stable shuffled
    let checkResults   = {};   // qIdx → { correct, total, results:{partIdx:bool} }
    let currentQ       = 0;
    let totalQ         = 0;
    let checked        = false;

    // Drag state
    let dragPartIdx = null;
    // Click-to-place state
    let selectedPartIdx = null;

    async function loadData() {
      questions = await PV.loadData('promptOrder') || [];
    }

    // ================================================================
    //  PLACEMENTS HELPERS
    // ================================================================
    function initPlacements() {
      const p = {};
      TYPE_ORDER.forEach(t => p[t] = []);
      return p;
    }

    function getPlacedSet(qIdx) {
      const s = new Set();
      const p = allPlacements[qIdx];
      if (p) TYPE_ORDER.forEach(t => (p[t] || []).forEach(i => s.add(i)));
      return s;
    }

    // Remove partIdx from all placement arrays for qIdx.
    // Returns the typeKey it was in, or null if it was in the pool.
    function removeFromPlacements(qIdx, partIdx) {
      const p = allPlacements[qIdx];
      if (!p) return null;
      for (const t of TYPE_ORDER) {
        const arr = p[t];
        const i = arr.indexOf(partIdx);
        if (i !== -1) { arr.splice(i, 1); return t; }
      }
      return null;
    }

    // ================================================================
    //  INIT
    // ================================================================
    async function initGame() {
      await loadData();

      if (!questions.length) {
        document.getElementById('poEmpty').style.display = '';
        document.getElementById('fnAnswerBar').style.display = 'none';
        return;
      }

      totalQ = questions.length;

      questions.forEach((q, i) => {
        allPlacements[i] = initPlacements();
        // Stable shuffle of part indices
        const indices = q.parts.map((_, j) => j);
        for (let k = indices.length - 1; k > 0; k--) {
          const j = Math.floor(Math.random() * (k + 1));
          [indices[k], indices[j]] = [indices[j], indices[k]];
        }
        shuffledOrders[i] = indices;
      });

      buildDots();
      goToQ(0);

      document.getElementById('checkBtn').addEventListener('click', doCheck);
      document.getElementById('continueBtn').addEventListener('click', doContinue);
      document.getElementById('fnPrevQ').addEventListener('click', () => {
        if (currentQ > 0) { SFX.navigate(); goToQ(currentQ - 1); }
      });
      document.getElementById('fnNextQ').addEventListener('click', () => {
        if (currentQ < totalQ - 1) { SFX.navigate(); goToQ(currentQ + 1); }
      });

      // Deselect cards on background click
      document.addEventListener('click', clearSelection);
    }

    // ================================================================
    //  NAVIGATION
    // ================================================================
    function goToQ(idx) {
      currentQ = idx;
      document.getElementById('qNumber').textContent = idx + 1;
      document.getElementById('fnPrevQ').disabled = idx === 0;
      document.getElementById('fnNextQ').disabled = idx === totalQ - 1;
      clearSelection();
      renderTypeRows();
      renderPool();
      updateDots();
    }

    // ================================================================
    //  RENDER TYPE ROWS
    // ================================================================
    function renderTypeRows() {
      const col = document.getElementById('typesColumn');
      col.innerHTML = '';
      const placements = allPlacements[currentQ];
      const results    = checkResults[currentQ];

      TYPE_ORDER.forEach(typeKey => {
        const row = document.createElement('div');
        row.className = `type-row type-row--${typeKey}`;

        // Label
        const label = document.createElement('span');
        label.className = 'type-row__label';
        label.textContent = TYPE_LABELS[typeKey];
        row.appendChild(label);

        // Drop zone
        const zone = document.createElement('div');
        zone.className = 'type-row__zone';
        zone.dataset.type = typeKey;

        // Empty hint (hidden when cards are present)
        const emptyHint = document.createElement('span');
        emptyHint.className = 'type-row__zone-empty';
        emptyHint.textContent = 'Kéo thẻ vào đây';
        zone.appendChild(emptyHint);

        const cardIdxs = placements[typeKey] || [];
        if (cardIdxs.length > 0) emptyHint.style.display = 'none';

        // Render placed cards
        cardIdxs.forEach(partIdx => {
          const card = makeCardEl(partIdx, typeKey);
          if (results) {
            card.classList.add(results.results[partIdx] ? 'po-correct' : 'po-wrong');
            // Revealed type badge showing the correct type
            const part = questions[currentQ].parts[partIdx];
            const badge = document.createElement('span');
            badge.className = 'drag-card__badge';
            badge.textContent = TYPE_LABELS[part.type];
            badge.style.color = TYPE_COLORS[part.type];
            badge.style.borderColor = TYPE_COLORS[part.type];
            card.insertBefore(badge, card.firstChild);
          }
          zone.appendChild(card);
        });

        // Drag events on zone
        zone.addEventListener('dragover', e => {
          e.preventDefault();
          zone.classList.add('drag-over');
        });
        zone.addEventListener('dragleave', e => {
          if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over');
        });
        zone.addEventListener('drop', e => {
          e.preventDefault();
          zone.classList.remove('drag-over');
          if (dragPartIdx === null || checked) return;
          doPlaceInZone(typeKey, dragPartIdx);
          dragPartIdx = null;
        });

        // Click-to-place: clicking a zone places selected card
        zone.addEventListener('click', e => {
          e.stopPropagation();
          if (selectedPartIdx === null || checked) return;
          doPlaceInZone(typeKey, selectedPartIdx);
          clearSelection();
        });

        row.appendChild(zone);
        col.appendChild(row);
      });
    }

    // ================================================================
    //  RENDER POOL
    // ================================================================
    function renderPool() {
      const pool    = document.getElementById('cardPool');
      const emptyMsg = document.getElementById('poolEmpty');

      pool.querySelectorAll('.drag-card').forEach(c => c.remove());

      const placed   = getPlacedSet(currentQ);
      const results  = checkResults[currentQ];
      const unplaced = shuffledOrders[currentQ].filter(i => !placed.has(i));

      emptyMsg.style.display = unplaced.length === 0 ? 'block' : 'none';

      unplaced.forEach(partIdx => {
        const card = makeCardEl(partIdx, null);
        if (results) {
          // Cards left in pool are wrong
          card.classList.add('po-wrong');
          const part = questions[currentQ].parts[partIdx];
          const badge = document.createElement('span');
          badge.className = 'drag-card__badge';
          badge.textContent = TYPE_LABELS[part.type];
          badge.style.color = TYPE_COLORS[part.type];
          badge.style.borderColor = TYPE_COLORS[part.type];
          card.insertBefore(badge, card.firstChild);
        }
        pool.appendChild(card);
      });
    }

    // ================================================================
    //  CARD ELEMENT FACTORY
    // ================================================================
    function makeCardEl(partIdx, fromType) {
      const part = questions[currentQ].parts[partIdx];
      const div  = document.createElement('div');
      div.className = 'drag-card';
      div.draggable = true;
      div.dataset.partIdx = partIdx;

      const textSpan = document.createElement('span');
      textSpan.textContent = part.text;
      div.appendChild(textSpan);

      // Click: toggle select for click-to-place
      div.addEventListener('click', e => {
        e.stopPropagation();
        if (checked) return;
        if (selectedPartIdx === partIdx) {
          clearSelection();
        } else {
          clearSelection();
          selectedPartIdx = partIdx;
          div.classList.add('selected');
          SFX.click();
          document.querySelectorAll('.type-row__zone').forEach(z => z.classList.add('accepting'));
        }
      });

      // HTML5 drag
      div.addEventListener('dragstart', e => {
        dragPartIdx = partIdx;
        div.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(partIdx));
        clearSelection();
      });
      div.addEventListener('dragend', () => {
        dragPartIdx = null;
        div.classList.remove('dragging');
        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      });

      // Touch support
      div.addEventListener('touchstart', () => {
        // nothing needed here
      }, { passive: true });
      div.addEventListener('touchend', e => {
        if (checked) return;
        const touch = e.changedTouches[0];
        const el    = document.elementFromPoint(touch.clientX, touch.clientY);
        const zone  = el ? el.closest('.type-row__zone') : null;
        const pool  = el ? el.closest('.card-pool') : null;
        if (zone) {
          doPlaceInZone(zone.dataset.type, partIdx);
        } else if (pool && fromType !== null) {
          // Return to pool
          removeFromPlacements(currentQ, partIdx);
          SFX.click();
          renderTypeRows();
          renderPool();
        }
      });

      return div;
    }

    // ================================================================
    //  PLACE CARD IN ZONE
    // ================================================================
    function doPlaceInZone(typeKey, partIdx) {
      if (checked) return;
      removeFromPlacements(currentQ, partIdx);
      allPlacements[currentQ][typeKey].push(partIdx);
      SFX.click();
      renderTypeRows();
      renderPool();
    }

    // ================================================================
    //  POOL DRAG HANDLERS (called via inline html)
    // ================================================================
    function handleDragOverPool(e) {
      e.preventDefault();
      document.getElementById('cardPool').classList.add('drag-over');
    }
    function handleDragLeavePool(e) {
      if (!document.getElementById('cardPool').contains(e.relatedTarget)) {
        document.getElementById('cardPool').classList.remove('drag-over');
      }
    }
    function handleDropToPool(e) {
      e.preventDefault();
      document.getElementById('cardPool').classList.remove('drag-over');
      if (dragPartIdx === null || checked) return;
      removeFromPlacements(currentQ, dragPartIdx);
      SFX.click();
      renderTypeRows();
      renderPool();
      dragPartIdx = null;
    }

    // ================================================================
    //  CLEAR SELECTION
    // ================================================================
    function clearSelection() {
      selectedPartIdx = null;
      document.querySelectorAll('.drag-card.selected').forEach(c => c.classList.remove('selected'));
      document.querySelectorAll('.type-row__zone.accepting').forEach(z => z.classList.remove('accepting'));
    }

    // ================================================================
    //  CHECK
    // ================================================================
    function doCheck() {
      checked = true;
      let questionsAllCorrect = 0;

      questions.forEach((q, qIdx) => {
        const placements = allPlacements[qIdx];
        const results    = {};
        let correct = 0;

        // Check placed cards
        TYPE_ORDER.forEach(typeKey => {
          (placements[typeKey] || []).forEach(partIdx => {
            const isCorrect = q.parts[partIdx].type === typeKey;
            results[partIdx] = isCorrect;
            if (isCorrect) correct++;
          });
        });

        // Cards left in pool are wrong
        const placed = getPlacedSet(qIdx);
        q.parts.forEach((_, i) => {
          if (!placed.has(i)) results[i] = false;
        });

        checkResults[qIdx] = { correct, total: q.parts.length, results };
        if (correct === q.parts.length) questionsAllCorrect++;
      });

      SFX[questionsAllCorrect === totalQ ? 'correct' : 'wrong']();
      renderTypeRows();
      renderPool();
      updateDots();
      updateScoreDisplay();
      showResultBanner();

      document.getElementById('checkBtn').style.display    = 'none';
      document.getElementById('continueBtn').style.display = '';
    }

    function updateScoreDisplay() {
      let cardCorrect = 0, cardTotal = 0;
      questions.forEach((q, i) => {
        cardTotal   += q.parts.length;
        cardCorrect += checkResults[i]?.correct || 0;
      });
      document.getElementById('scoreDisplay').textContent = `SCORE: ${cardCorrect} / ${cardTotal}`;
    }

    function showResultBanner() {
      const correct = Object.values(checkResults).filter(r => r.correct === r.total).length;
      const pct  = Math.round(correct / totalQ * 100);
      const msgs = [
        [100, '🏆 Hoàn hảo! Bạn nắm rõ cấu trúc prompt!'],
        [70,  '🎉 Rất tốt! Còn vài thẻ cần xem lại.'],
        [40,  '👍 Khá ổn! Hãy ôn lại các loại thành phần prompt.'],
        [0,   '💪 Chưa đạt! Xem lại và thử lại nhé.'],
      ];
      const msg = msgs.find(([min]) => pct >= min)[1];
      document.getElementById('resultScore').textContent = `${correct} / ${totalQ} CORRECT (${pct}%)`;
      document.getElementById('resultMsg').textContent   = msg;
      document.getElementById('resultBanner').style.display = 'block';
    }

    // ================================================================
    //  CONTINUE
    // ================================================================
    function doContinue() {
      checked      = false;
      checkResults = {};
      document.getElementById('resultBanner').style.display = 'none';
      document.getElementById('checkBtn').style.display     = '';
      document.getElementById('continueBtn').style.display  = 'none';
      document.getElementById('scoreDisplay').textContent   = 'SCORE: — / —';
      renderTypeRows();
      renderPool();
      updateDots();
    }

    // ================================================================
    //  DOTS
    // ================================================================
    function buildDots() {
      const container = document.getElementById('fnDots');
      container.innerHTML = '';
      for (let i = 0; i < totalQ; i++) {
        const dot = document.createElement('button');
        dot.className = 'fn-dot';
        dot.addEventListener('click', () => { SFX.click(); goToQ(i); });
        container.appendChild(dot);
      }
    }

    function updateDots() {
      document.querySelectorAll('.fn-dot').forEach((dot, i) => {
        dot.className = 'fn-dot';
        if (i === currentQ) {
          dot.classList.add('active');
        } else if (checkResults[i] !== undefined) {
          dot.classList.add(checkResults[i].correct === checkResults[i].total ? 'answered' : 'wrong-q');
        }
      });
    }

    // ================================================================
    //  START
    // ================================================================
    initGame();
  </script>
</body>
</html>
