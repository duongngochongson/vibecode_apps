<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐿️ — PIXELVERSE</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">
  <link rel="stylesheet" href="../../css/style.css" />
  <script src="../../js/sfx.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/games-popup.js"></script>
  <script src="../../js/game-visibility.js" data-json="../../data/admin_content.json"></script>
  <style>
    /* ===== PAGE OVERRIDES ===== */
    .game-page { padding: 32px 1.5rem 80px; max-width: 900px; }
    .page-header__title {
      font-family: var(--font-vi-heading);
      font-size: clamp(20px, 4vw, 32px);
      font-weight: 900;
      color: var(--green);
      margin: 0 0 6px;
    }

    /* ===== STATUS BAR ===== */
    .status-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 20px;
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--grey);
    }
    #scoreDisplay { color: var(--green); }
    #setDisplay   { color: var(--cyan); }

    /* ===== MATCHING ARENA ===== */
    .match-arena {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 60px 1fr;
      gap: 0;
      align-items: start;
      min-height: 300px;
    }

    /* ===== COLUMNS ===== */
    .match-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 8px 0;
    }

    .match-item {
      position: relative;
      display: flex;
      align-items: center;
      min-height: 48px;
      padding: 8px 16px;
      font-size: 13px;
      background: rgba(12,12,26,0.7);
      border: 2px solid rgba(255,255,255,0.08);
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--white);
      transition: border-color 0.15s, box-shadow 0.15s;
      user-select: none;
      cursor: pointer;
    }
    .match-item.pending {
      border-color: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
    }
    .match-item.correct {
      border-color: var(--green);
      box-shadow: 0 0 8px var(--green);
      color: var(--green);
    }
    .match-item.wrong {
      border-color: var(--magenta);
      box-shadow: 0 0 8px var(--magenta);
      color: var(--magenta);
    }

    /* Left column: text left, dot on right edge */
    .match-col--left .match-item { padding-right: 28px; }
    .match-col--left .match-item .dot {
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--grey);
      border: 2px solid var(--bg-dark);
      pointer-events: none;
      z-index: 10;
      transition: background 0.15s, box-shadow 0.15s;
    }
    /* Right column: dot on left edge, text right */
    .match-col--right .match-item { padding-left: 28px; }
    .match-col--right .match-item .dot {
      position: absolute;
      left: -10px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--grey);
      border: 2px solid var(--bg-dark);
      pointer-events: none;
      z-index: 10;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .dot.pending {
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
    }
    .dot.connected {
      background: var(--green);
    }

    /* ===== SVG OVERLAY ===== */
    .match-svg-wrap {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
      z-index: 5;
    }
    .match-svg-wrap svg {
      width: 100%; height: 100%;
      overflow: visible;
    }
    .conn-line {
      stroke: var(--cyan);
      stroke-width: 2;
      fill: none;
      opacity: 0.7;
    }
    .conn-line.correct { stroke: var(--green); opacity: 1; }
    .conn-line.wrong   { stroke: var(--magenta); opacity: 1; }

    /* ===== CONNECTION GROUP (hover to show delete, click line to delete) ===== */
    .conn-group { cursor: pointer; }
    .conn-hit   { stroke: transparent; stroke-width: 20; pointer-events: stroke; fill: none; }
    .conn-del-group { visibility: hidden; pointer-events: none; }
    .conn-group:hover .conn-del-group { visibility: visible; }
    .conn-del-bg { fill: var(--bg-dark); stroke: var(--magenta); stroke-width: 1.5; }
    .conn-del-txt {
      fill: var(--magenta); font-size: 11px;
      text-anchor: middle; dominant-baseline: central;
    }
    /* Highlight partner items on hover */
    .match-item.highlight {
      border-color: var(--magenta) !important;
      box-shadow: 0 0 10px rgba(255,0,204,0.45) !important;
    }

    /* ===== SET NAVIGATION ===== */
    .set-nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .set-nav__row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .set-nav__btn {
      background: transparent;
      border: 2px solid var(--grey);
      color: var(--grey);
      font-size: 18px;
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.15s steps(2);
    }
    .set-nav__btn:hover:not(:disabled) {
      border-color: var(--cyan);
      color: var(--cyan);
    }
    .set-nav__btn:disabled { opacity: 0.3; cursor: default; }
    .set-nav__dots { display: flex; gap: 5px; }
    .set-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--grey); cursor: pointer; border: none; padding: 0;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .set-dot.active   { background: var(--yellow); box-shadow: 0 0 5px var(--yellow); }
    .set-dot.answered { background: var(--green);  box-shadow: 0 0 4px var(--green); }

    /* ===== MATCHING-SPECIFIC ACTION BTN OVERRIDES ===== */
    .action-btn {
      letter-spacing: 2px;
      padding: 8px 18px;
      border: none;
    }
    .action-btn--check {
      background: var(--green);
      color: var(--bg-dark);
      box-shadow: 0 0 12px var(--green);
    }
    .action-btn--check:hover { box-shadow: 0 0 20px var(--green); }
    .action-btn--play-again {
      background: var(--cyan);
      color: var(--bg-dark);
      box-shadow: 0 0 12px var(--cyan);
    }
    .action-btn--play-again:hover { box-shadow: 0 0 20px var(--cyan); }

    .result-banner { padding: 16px; margin-top: 16px; border-width: 2px; background: rgba(57,255,20,0.05); }
    .result-banner__score { font-size: 14px; }
    .result-banner__msg { font-size: 10px; letter-spacing: 1px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .game-page { padding: 16px 1rem 60px; }
      .match-arena { grid-template-columns: 1fr 24px 1fr; }
      .match-item { font-size: 9px; padding: 6px 8px; min-height: 40px; }
      .match-col--left .match-item { padding-right: 20px; }
      .match-col--right .match-item { padding-left: 20px; }
      .status-bar { gap: 1rem; font-size: 8px; }
      .set-nav { gap: 8px; font-size: 8px; }
      .action-bar { gap: 10px; }
    }
    @media (max-width: 400px) {
      .match-arena { grid-template-columns: 1fr 16px 1fr; }
      .match-item { font-size: 8px; padding: 5px 6px; }
      .match-col--left .match-item { padding-right: 18px; }
      .match-col--right .match-item { padding-left: 18px; }
      .dot { width: 12px; height: 12px; }
    }

  </style>
</head>
<body>
  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <a href="../../index.html" class="navbar__logo">◈ PIXELVERSE</a>
    <ul class="navbar__links">
      <li><a href="../../index.html" title="Home">◈</a></li>
      <li>
        <button class="navbar__grid-btn" id="gamesBtn" title="Games">
          <span class="navbar__grid-btn__dots">
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
          </span>
        </button>
      </li>
      <li><a class="navbar__admin-btn" href="../admin/">⚙</a></li>
    </ul>
  </nav>

  <!-- ===== GAMES POPUP ===== -->
  <div class="navbar__games-popup" id="gamesPopup">
    <div class="navbar__games-list">
      <a href="../pros-cons/index.html" class="navbar__game-item" data-game="pros-cons">🐺</a>
      <a href="../mind-map/index.html" class="navbar__game-item" data-game="mind-map">🐙</a>
      <div class="navbar__game-item navbar__game-item--active">🐿️</div>
      <a href="../file-naming/index.html" class="navbar__game-item" data-game="file-naming">🐟</a>
      <a href="../prompt-order/index.html" class="navbar__game-item" data-game="prompt-order">🐜</a>
      <a href="../calculator/index.html" class="navbar__game-item" data-game="calculator">🐬</a>
      <a href="../mece/index.html" class="navbar__game-item" data-game="mece">🦊</a>
      <a href="../noticeboard/index.html" class="navbar__game-item" data-game="noticeboard">🐝</a>
    </div>
  </div>

  <!-- ===== MAIN ===== -->
  <main class="game-page">
    <div class="page-header">
      <a href="../../index.html" class="page-header__back" onclick="SFX.navigate()">◀ HOME</a>
      <h1 class="page-header__title" id="gameTitle">🐿️ Nối Từ</h1>
      <p class="page-header__sub font-vi">Nối các từ khóa ở hai cột theo mối quan hệ đúng</p>
    </div>

    <div class="status-bar">
      <span id="scoreDisplay">SCORE: 0</span>
      <span id="setDisplay">BỘ: 1 / 1</span>
    </div>

    <div class="set-nav">
      <div class="set-nav__row">
        <button class="set-nav__btn" id="prevSetBtn" onclick="prevSet()">◀</button>
        <button class="action-btn action-btn--check"      id="checkBtn"    onclick="checkAnswers()">✓ CHECK</button>
        <button class="action-btn action-btn--play-again" id="playAgainBtn" onclick="continueGame()" style="display:none">▶ CONTINUE</button>
        <button class="set-nav__btn" id="nextSetBtn" onclick="nextSet()">▶</button>
      </div>
      <div class="set-nav__dots" id="setDots"></div>
    </div>

    <div class="match-arena" id="matchArena">
      <div class="match-col match-col--left"  id="colLeft"></div>
      <div></div>
      <div class="match-col match-col--right" id="colRight"></div>
      <div class="match-svg-wrap" id="svgWrap">
        <svg id="matchSvg" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
    </div>

    <div class="result-banner" id="resultBanner">
      <div class="result-banner__score" id="resultScore"></div>
      <div class="result-banner__msg"   id="resultMsg"></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    // ================================================================
    //  CONSTANTS & STATE
    // ================================================================
    const GAME_EMOJI = '🐿️';
    const STORAGE_KEY = 'matching';

    let gameData   = [];   // array of set objects
    let currentSet = 0;    // index into gameData
    let connections = new Set();  // "L1|R1" style keys for current set
    let pendingDot  = null;       // { id, side } or null
    let checked     = false;
    let totalCorrect = 0;
    let totalAnswered = 0;

    // Per-set connection state
    let setConnections = {};   // setIdx → Set of connection keys

    // ================================================================
    //  UTILS
    // ================================================================
    function ck(a, b) { return a < b ? `${a}|${b}` : `${b}|${a}`; }

    async function loadGameData() {
      const data = await PV.loadData(STORAGE_KEY);
      return data ? JSON.parse(JSON.stringify(data)) : [];
    }

    // ================================================================
    //  DOT POSITIONS (for SVG lines)
    // ================================================================
    function getDotPos(dotEl) {
      const arena = document.getElementById('matchArena');
      const arenaRect = arena.getBoundingClientRect();
      const dotRect   = dotEl.getBoundingClientRect();
      return {
        x: dotRect.left + dotRect.width / 2 - arenaRect.left,
        y: dotRect.top  + dotRect.height / 2 - arenaRect.top
      };
    }

    function getDotElById(id) {
      return document.querySelector(`[data-dot="${id}"]`);
    }

    // ================================================================
    //  RENDER LINES
    // ================================================================
    function renderLines(correctSet) {
      const svg = document.getElementById('matchSvg');
      svg.innerHTML = '';
      const ns = 'http://www.w3.org/2000/svg';

      connections.forEach(key => {
        const [a, b] = key.split('|');
        const elA = getDotElById(a);
        const elB = getDotElById(b);
        if (!elA || !elB) return;

        const posA = getDotPos(elA);
        const posB = getDotPos(elB);
        const mx = (posA.x + posB.x) / 2;
        const my = (posA.y + posB.y) / 2;

        const g = document.createElementNS(ns, 'g');
        g.setAttribute('class', !checked ? 'conn-group' : '');

        // Thick invisible hit area
        const hit = document.createElementNS(ns, 'line');
        hit.setAttribute('x1', posA.x); hit.setAttribute('y1', posA.y);
        hit.setAttribute('x2', posB.x); hit.setAttribute('y2', posB.y);
        hit.setAttribute('class', 'conn-hit');

        // Visible styled line
        const line = document.createElementNS(ns, 'line');
        line.setAttribute('x1', posA.x); line.setAttribute('y1', posA.y);
        line.setAttribute('x2', posB.x); line.setAttribute('y2', posB.y);
        line.classList.add('conn-line');
        line.style.pointerEvents = 'none';
        if (correctSet) line.classList.add(correctSet.has(key) ? 'correct' : 'wrong');

        g.appendChild(hit);
        g.appendChild(line);

        // Delete indicator — hover-triggered, only when not checked
        if (!checked) {
          const dg = document.createElementNS(ns, 'g');
          dg.setAttribute('class', 'conn-del-group');
          const bg = document.createElementNS(ns, 'rect');
          bg.setAttribute('x', mx - 9); bg.setAttribute('y', my - 9);
          bg.setAttribute('width', 18); bg.setAttribute('height', 18);
          bg.setAttribute('rx', 3); bg.setAttribute('class', 'conn-del-bg');
          const txt = document.createElementNS(ns, 'text');
          txt.setAttribute('x', mx); txt.setAttribute('y', my);
          txt.setAttribute('class', 'conn-del-txt'); txt.textContent = '✕';
          dg.appendChild(bg); dg.appendChild(txt);
          g.appendChild(dg);

          g.addEventListener('click', () => { SFX.click(); deleteConn(key); });
        }

        svg.appendChild(g);
      });
    }

    function deleteConn(key) {
      connections.delete(key);
      setConnections[currentSet] = new Set(connections);
      updateDotColors();
      renderLines();
    }

    function updateDotColors() {
      document.querySelectorAll('[data-dot]').forEach(dot => {
        const id = dot.dataset.dot;
        const hasConn = [...connections].some(k => k.split('|').includes(id));
        dot.classList.toggle('connected', hasConn);
        dot.classList.toggle('pending', pendingDot && pendingDot.id === id);
        // Also update parent match-item for pending highlight
        const item = dot.closest('.match-item');
        if (item) item.classList.toggle('pending', pendingDot && pendingDot.id === id);
      });
    }

    // ================================================================
    //  BUILD GAME
    // ================================================================
    function buildGame() {
      const set = gameData[currentSet];
      if (!set) return;

      // Restore saved connections for this set
      connections = setConnections[currentSet] || new Set();
      setConnections[currentSet] = connections;

      checked = false;

      const colLeft  = document.getElementById('colLeft');
      const colRight = document.getElementById('colRight');
      colLeft.innerHTML  = '';
      colRight.innerHTML = '';

      // Shuffle display order
      const leftOrder  = [...set.leftItems].sort(() => Math.random() - 0.5);
      const rightOrder = [...set.rightItems].sort(() => Math.random() - 0.5);

      leftOrder.forEach(item => {
        const el = document.createElement('div');
        el.className = 'match-item';
        el.dataset.id   = item.id;
        el.dataset.side = 'left';
        el.innerHTML = `<span>${item.text}</span><div class="dot" data-dot="${item.id}"></div>`;
        colLeft.appendChild(el);
      });

      rightOrder.forEach(item => {
        const el = document.createElement('div');
        el.className = 'match-item';
        el.dataset.id   = item.id;
        el.dataset.side = 'right';
        el.innerHTML = `<div class="dot" data-dot="${item.id}"></div><span>${item.text}</span>`;
        colRight.appendChild(el);
      });

      // Click on whole row + hover highlight
      document.querySelectorAll('.match-item').forEach(item => {
        item.addEventListener('click', onItemClick);
        item.addEventListener('mouseenter', () => {
          const id = item.dataset.id;
          document.querySelectorAll('.match-item.highlight').forEach(el => el.classList.remove('highlight'));
          [...connections].filter(k => k.split('|').includes(id)).forEach(key => {
            const partnerId = key.split('|').find(k => k !== id);
            document.querySelector(`.match-item[data-id="${partnerId}"]`)?.classList.add('highlight');
          });
        });
        item.addEventListener('mouseleave', () => {
          document.querySelectorAll('.match-item.highlight').forEach(el => el.classList.remove('highlight'));
        });
      });

      updateDotColors();
      renderLines();
      updateSetNav();
    }

    function onItemClick(e) {
      if (checked) return;
      e.stopPropagation();
      SFX.click();

      const id   = e.currentTarget.dataset.id;
      const side = e.currentTarget.dataset.side;

      if (!pendingDot) {
        pendingDot = { id, side };
        updateDotColors();
        return;
      }

      if (pendingDot.id === id) {
        // Same item — cancel
        pendingDot = null;
        updateDotColors();
        return;
      }

      if (pendingDot.side === side) {
        // Same column — switch pending to this item
        pendingDot = { id, side };
        updateDotColors();
        return;
      }

      // Connect: one from each side
      const leftId  = side === 'right' ? pendingDot.id : id;
      const rightId = side === 'right' ? id : pendingDot.id;
      const key = ck(leftId, rightId);

      if (connections.has(key)) {
        connections.delete(key);
      } else {
        connections.add(key);
        SFX.place();
      }

      setConnections[currentSet] = new Set(connections);
      pendingDot = null;
      updateDotColors();
      renderLines();
    }

    // Cancel pending on outside click
    document.addEventListener('click', () => {
      if (pendingDot) { pendingDot = null; updateDotColors(); }
    });

    // ================================================================
    //  SET NAVIGATION
    // ================================================================
    function buildSetDots() {
      const container = document.getElementById('setDots');
      container.innerHTML = '';
      gameData.forEach((_, i) => {
        const btn = document.createElement('button');
        btn.className = 'set-dot';
        btn.addEventListener('click', e => {
          e.stopPropagation();
          if (i !== currentSet) { SFX.navigate(); goToSet(i); }
        });
        container.appendChild(btn);
      });
    }

    function updateSetDots() {
      document.querySelectorAll('.set-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === currentSet);
        dot.classList.toggle('answered', i !== currentSet && !!setConnections[i]?.size);
      });
    }

    function goToSet(idx) {
      currentSet = idx;
      checked = false;
      document.getElementById('resultBanner').style.display = 'none';
      document.getElementById('checkBtn').style.display = '';
      document.getElementById('playAgainBtn').style.display = 'none';
      buildGame();
    }

    function updateSetNav() {
      const total = gameData.length;
      document.getElementById('setDisplay').textContent = `BỘ: ${currentSet + 1} / ${total}`;
      document.getElementById('prevSetBtn').disabled = currentSet === 0;
      document.getElementById('nextSetBtn').disabled = currentSet === total - 1;
      updateSetDots();
    }

    function prevSet() {
      if (currentSet > 0) { SFX.navigate(); goToSet(currentSet - 1); }
    }

    function nextSet() {
      if (currentSet < gameData.length - 1) { SFX.navigate(); goToSet(currentSet + 1); }
    }

    // ================================================================
    //  CHECK & CONTINUE
    // ================================================================
    function checkAnswers() {
      const set = gameData[currentSet];
      const correctSet = new Set(set.connections.map(c => ck(c.from, c.to)));

      checked = true;
      let correct = 0;

      connections.forEach(key => { if (correctSet.has(key)) correct++; });

      // Also count missed correct connections
      const total = correctSet.size;
      const pct   = total === 0 ? 100 : Math.round(correct / total * 100);

      SFX[pct === 100 ? 'correct' : 'wrong']();

      // Color items
      const allIds = new Set();
      [...connections, ...correctSet].forEach(k => k.split('|').forEach(id => allIds.add(id)));
      allIds.forEach(id => {
        const item = document.querySelector(`[data-id="${id}"]`);
        if (!item) return;
        const hasCorrect = [...connections].some(k => {
          const parts = k.split('|');
          return parts.includes(id) && correctSet.has(k);
        });
        const hasWrong = [...connections].some(k => {
          const parts = k.split('|');
          return parts.includes(id) && !correctSet.has(k);
        });
        item.classList.remove('correct', 'wrong');
        if (hasCorrect && !hasWrong) item.classList.add('correct');
        else if (hasWrong) item.classList.add('wrong');
      });

      renderLines(correctSet);

      const msgs = [
        [100, '🏆 Hoàn hảo! Nối đúng tất cả!'],
        [70,  '🎉 Rất tốt! Còn một vài nối sai.'],
        [40,  '👍 Khá ổn! Hãy thử lại để cải thiện.'],
        [0,   '💪 Chưa đạt! Xem lại các mối quan hệ nhé.'],
      ];
      const msg = msgs.find(([min]) => pct >= min)[1];

      document.getElementById('scoreDisplay').textContent = `SCORE: ${correct}/${total}`;
      document.getElementById('resultScore').textContent  = `${correct} / ${total} ĐÚNG (${pct}%)`;
      document.getElementById('resultMsg').textContent    = msg;
      document.getElementById('resultBanner').style.display = 'block';
      document.getElementById('checkBtn').style.display = 'none';
      document.getElementById('playAgainBtn').style.display = '';
    }

    function continueGame() {
      checked = false;
      document.querySelectorAll('.match-item').forEach(el => el.classList.remove('correct', 'wrong'));
      renderLines();
      document.getElementById('resultBanner').style.display = 'none';
      document.getElementById('checkBtn').style.display = '';
      document.getElementById('playAgainBtn').style.display = 'none';
    }

    // ================================================================
    //  RESIZE → REDRAW LINES
    // ================================================================
    window.addEventListener('resize', () => renderLines(checked ? undefined : undefined));

    // ================================================================
    //  INIT
    // ================================================================
    async function initGame() {
      gameData = await loadGameData();
      setConnections = {};
      currentSet = 0;
