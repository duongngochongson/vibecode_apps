<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐿️ — PIXELVERSE</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">
  <link rel="stylesheet" href="../../css/style.css" />
  <script src="../../data/matching.js"></script>
  <script src="../../js/sfx.js"></script>
  <script src="../../js/admin-auth.js"></script>
  <style>
    /* ===== PAGE LAYOUT ===== */
    .game-page {
      position: relative;
      z-index: 2;
      padding: 32px 1.5rem 80px;
      max-width: 900px;
      margin: 0 auto;
    }

    .page-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .page-header__back {
      display: inline-block;
      font-size: 12px;
      color: var(--grey);
      text-decoration: none;
      letter-spacing: 1px;
      margin-bottom: 8px;
      transition: color 0.15s;
    }
    .page-header__back:hover { color: var(--cyan); }
    .page-header__title {
      font-size: clamp(20px, 4vw, 32px);
      color: var(--green);
      text-shadow: 0 0 16px var(--green);
      margin: 0;
    }

    /* ===== STATUS BAR ===== */
    .status-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 20px;
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--grey);
    }
    #scoreDisplay { color: var(--green); text-shadow: 0 0 6px var(--green); }
    #setDisplay   { color: var(--cyan);  text-shadow: 0 0 6px var(--cyan); }

    /* ===== MATCHING ARENA ===== */
    .match-arena {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 60px 1fr;
      gap: 0;
      align-items: start;
      min-height: 300px;
    }

    /* ===== COLUMNS ===== */
    .match-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 8px 0;
    }

    .match-item {
      position: relative;
      display: flex;
      align-items: center;
      min-height: 48px;
      padding: 8px 16px;
      background: rgba(12,12,26,0.7);
      border: 2px solid rgba(255,255,255,0.08);
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--white);
      transition: border-color 0.15s, box-shadow 0.15s;
      user-select: none;
      cursor: pointer;
    }
    .match-item.pending {
      border-color: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
    }
    .match-item.correct {
      border-color: var(--green);
      box-shadow: 0 0 8px var(--green);
      color: var(--green);
    }
    .match-item.wrong {
      border-color: var(--magenta);
      box-shadow: 0 0 8px var(--magenta);
      color: var(--magenta);
    }

    /* Left column: text left, dot on right edge */
    .match-col--left .match-item { padding-right: 28px; }
    .match-col--left .match-item .dot {
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--grey);
      border: 2px solid var(--bg-dark);
      pointer-events: none;
      z-index: 10;
      transition: background 0.15s, box-shadow 0.15s;
    }
    /* Right column: dot on left edge, text right */
    .match-col--right .match-item { padding-left: 28px; }
    .match-col--right .match-item .dot {
      position: absolute;
      left: -10px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--grey);
      border: 2px solid var(--bg-dark);
      pointer-events: none;
      z-index: 10;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .dot.pending {
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
    }
    .dot.connected {
      background: var(--green);
    }

    /* ===== SVG OVERLAY ===== */
    .match-svg-wrap {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
      z-index: 5;
    }
    .match-svg-wrap svg {
      width: 100%; height: 100%;
      overflow: visible;
    }
    .conn-line {
      stroke: var(--cyan);
      stroke-width: 2;
      fill: none;
      opacity: 0.7;
    }
    .conn-line.correct { stroke: var(--green); opacity: 1; }
    .conn-line.wrong   { stroke: var(--magenta); opacity: 1; }

    /* ===== DELETE BUTTON ON LINE ===== */
    .conn-del {
      pointer-events: all;
      cursor: pointer;
      font-size: 9px;
      fill: var(--magenta);
      font-family: var(--font-pixel);
      dominant-baseline: middle;
      text-anchor: middle;
    }
    .conn-del:hover { fill: var(--white); }
    .conn-del-bg {
      pointer-events: all;
      cursor: pointer;
      fill: var(--bg-dark);
      stroke: var(--magenta);
      stroke-width: 1;
    }

    /* ===== SET NAVIGATION ===== */
    .set-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
      font-size: 9px;
      letter-spacing: 1px;
    }
    .set-nav__btn {
      background: transparent;
      border: 2px solid var(--grey);
      color: var(--grey);
      font-size: 18px;
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.15s steps(2);
    }
    .set-nav__btn:hover:not(:disabled) {
      border-color: var(--cyan);
      color: var(--cyan);
    }
    .set-nav__btn:disabled { opacity: 0.3; cursor: default; }
    .set-nav__label { color: var(--cyan); min-width: 80px; text-align: center; }

    /* ===== ACTION BAR ===== */
    .action-bar {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 24px;
    }
    .action-btn {
      font-family: var(--font-pixel);
      font-size: 8px;
      letter-spacing: 2px;
      padding: 10px 24px;
      border: none;
      cursor: pointer;
      transition: all 0.15s steps(2);
    }
    .action-btn--check {
      background: var(--green);
      color: var(--bg-dark);
      box-shadow: 0 0 12px var(--green);
    }
    .action-btn--check:hover { box-shadow: 0 0 20px var(--green); }
    .action-btn--play-again {
      background: var(--cyan);
      color: var(--bg-dark);
      box-shadow: 0 0 12px var(--cyan);
    }
    .action-btn--play-again:hover { box-shadow: 0 0 20px var(--cyan); }

    /* ===== RESULT BANNER ===== */
    .result-banner {
      display: none;
      text-align: center;
      padding: 16px;
      margin-top: 16px;
      border: 2px solid var(--green);
      background: rgba(57,255,20,0.05);
    }
    .result-banner__score {
      font-size: 14px;
      color: var(--green);
      text-shadow: 0 0 10px var(--green);
      margin-bottom: 6px;
    }
    .result-banner__msg {
      font-size: 10px;
      color: var(--white);
      letter-spacing: 1px;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-mid);
      border: 2px solid var(--yellow);
      color: var(--yellow);
      font-size: 9px;
      letter-spacing: 1px;
      padding: 8px 20px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== ADMIN PANEL ===== */
    .admin-panel {
      position: fixed;
      top: 0; right: -480px;
      width: min(480px, 100vw);
      height: 100%;
      background: var(--bg-mid);
      border-left: 2px solid var(--yellow);
      z-index: 200;
      overflow-y: auto;
      transition: right 0.3s steps(4);
      padding: 24px 20px 40px;
    }
    .admin-panel.open { right: 0; }
    .admin-panel__title {
      font-size: 10px;
      color: var(--yellow);
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    .admin-panel__close {
      position: absolute;
      top: 16px; right: 16px;
      background: transparent;
      border: 2px solid var(--yellow);
      color: var(--yellow);
      font-family: var(--font-pixel);
      font-size: 8px;
      padding: 4px 10px;
      cursor: pointer;
    }
    .admin-set-card {
      border: 2px solid rgba(255,255,255,0.1);
      padding: 12px;
      margin-bottom: 16px;
      background: rgba(0,0,0,0.3);
    }
    .admin-set-title {
      font-size: 9px;
      color: var(--cyan);
      letter-spacing: 1px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .admin-set-title input {
      flex: 1;
      background: transparent;
      border: 1px solid var(--grey);
      color: var(--white);
      font-family: var(--font-pixel);
      font-size: 9px;
      padding: 3px 6px;
    }
    .admin-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .admin-col-label {
      font-size: 8px;
      color: var(--grey);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .admin-kw-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
    }
    .admin-kw-row input {
      flex: 1;
      background: transparent;
      border: 1px solid var(--grey);
      color: var(--white);
      font-family: var(--font-pixel);
      font-size: 8px;
      padding: 3px 6px;
    }
    .admin-del-btn {
      background: transparent;
      border: 1px solid var(--magenta);
      color: var(--magenta);
      font-family: var(--font-pixel);
      font-size: 7px;
      padding: 2px 5px;
      cursor: pointer;
    }
    .admin-add-btn {
      background: transparent;
      border: 1px solid var(--grey);
      color: var(--grey);
      font-family: var(--font-pixel);
      font-size: 7px;
      padding: 3px 8px;
      cursor: pointer;
      margin-top: 2px;
    }
    .admin-add-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .admin-conn-label {
      font-size: 8px;
      color: var(--grey);
      letter-spacing: 1px;
      margin: 8px 0 4px;
    }
    .admin-conn-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      font-size: 8px;
      color: var(--white);
    }
    .admin-conn-row select {
      flex: 1;
      background: var(--bg-dark);
      border: 1px solid var(--grey);
      color: var(--white);
      font-family: var(--font-pixel);
      font-size: 8px;
      padding: 2px 4px;
    }
    .admin-save-btn {
      width: 100%;
      background: var(--yellow);
      color: var(--bg-dark);
      border: none;
      font-family: var(--font-pixel);
      font-size: 9px;
      letter-spacing: 2px;
      padding: 10px;
      cursor: pointer;
      margin-top: 16px;
      transition: box-shadow 0.15s;
    }
    .admin-save-btn:hover { box-shadow: 0 0 14px var(--yellow); }
    .admin-add-set-btn {
      width: 100%;
      background: transparent;
      border: 2px solid var(--green);
      color: var(--green);
      font-family: var(--font-pixel);
      font-size: 9px;
      letter-spacing: 2px;
      padding: 8px;
      cursor: pointer;
      margin-bottom: 16px;
    }
    .admin-add-set-btn:hover { background: rgba(57,255,20,0.1); }
    .admin-del-set-btn {
      background: transparent;
      border: 1px solid var(--magenta);
      color: var(--magenta);
      font-family: var(--font-pixel);
      font-size: 7px;
      padding: 2px 6px;
      cursor: pointer;
      margin-left: auto;
    }

    /* ===== ADMIN ARENA ===== */
    .admin-arena {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 20px 1fr;
      min-height: 40px;
      margin: 8px 0;
    }
    .admin-arena-col {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .admin-arena-item {
      position: relative;
      display: flex;
      align-items: center;
      min-height: 30px;
      padding: 4px 8px;
      background: rgba(12,12,26,0.5);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 9px;
      color: var(--white);
      cursor: pointer;
      user-select: none;
    }
    .admin-arena-item:hover { border-color: rgba(255,255,255,0.3); }
    .admin-arena-item.pending { border-color: var(--cyan); box-shadow: 0 0 4px var(--cyan); }
    .admin-arena-item.connected { border-color: var(--green); }
    .admin-left .admin-arena-item { padding-right: 20px; }
    .admin-right .admin-arena-item { padding-left: 20px; }
    .admin-arena-item .dot {
      position: absolute;
      width: 10px;
      height: 10px;
      pointer-events: none;
    }
    .admin-left  .admin-arena-item .dot { right: -5px; }
    .admin-right .admin-arena-item .dot { left: -5px; }
  </style>
</head>

    <div class="match-arena" id="matchArena">
      <div class="match-col match-col--left"  id="colLeft"></div>

      <button class="action-btn action-btn--check"      id="checkBtn"    onclick="checkAnswers()">✓ CHECK</button>

  <div class="toast" id="toast"></div>

  <script>
    // ================================================================
    //  CONSTANTS & STATE
    // ================================================================
    const GAME_EMOJI = '🐿️';
    const STORAGE_KEY = 'matching';

    let gameData   = [];   // array of set objects
    let currentSet = 0;    // index into gameData
    let connections = new Set();  // "L1|R1" style keys for current set
    let pendingDot  = null;       // { id, side } or null
    let checked     = false;
    let totalCorrect = 0;
    let totalAnswered = 0;

    // Per-set connection state
    let setConnections = {};   // setIdx → Set of connection keys

    // ================================================================
    //  UTILS
    // ================================================================
    function ck(a, b) { return a < b ? `${a}|${b}` : `${b}|${a}`; }

    function showToast(msg, dur = 2000) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), dur);
    }

    // ================================================================
    //  DATA LOADING
    // ================================================================
    async function loadGameData() {
      // Try localStorage first (admin saved)
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try { return JSON.parse(saved); } catch(e) {}
      }
      // Fallback to bundled data
      if (window.MATCHING_DATA) return JSON.parse(JSON.stringify(window.MATCHING_DATA));
      return [];
    }

    // ================================================================
    //  DOT POSITIONS (for SVG lines)
    // ================================================================
    function getDotPos(dotEl) {
      const arena = document.getElementById('matchArena');
      const arenaRect = arena.getBoundingClientRect();
      const dotRect   = dotEl.getBoundingClientRect();
      return {
        x: dotRect.left + dotRect.width / 2 - arenaRect.left,
        y: dotRect.top  + dotRect.height / 2 - arenaRect.top
      };
    }

    function getDotElById(id) {
      return document.querySelector(`[data-dot="${id}"]`);
    }

    // ================================================================
    //  RENDER LINES
    // ================================================================
    function renderLines(correctSet) {
      const svg = document.getElementById('matchSvg');
      svg.innerHTML = '';

      connections.forEach(key => {
        const [a, b] = key.split('|');
        const elA = getDotElById(a);
        const elB = getDotElById(b);
        if (!elA || !elB) return;

        const posA = getDotPos(elA);
        const posB = getDotPos(elB);

        const mx = (posA.x + posB.x) / 2;
        const my = (posA.y + posB.y) / 2;

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', posA.x); line.setAttribute('y1', posA.y);
        line.setAttribute('x2', posB.x); line.setAttribute('y2', posB.y);
        line.classList.add('conn-line');
        if (correctSet) {
          line.classList.add(correctSet.has(key) ? 'correct' : 'wrong');
        }
        svg.appendChild(line);

        // Delete button (only when not checked)
        if (!checked) {
          const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          g.style.cursor = 'pointer';
          g.addEventListener('click', () => { SFX.click(); deleteConn(key); });

          const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          bg.setAttribute('x', mx - 7); bg.setAttribute('y', my - 7);
          bg.setAttribute('width', 14);  bg.setAttribute('height', 14);
          bg.classList.add('conn-del-bg');

          const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          txt.setAttribute('x', mx); txt.setAttribute('y', my);
          txt.classList.add('conn-del');
          txt.textContent = '✕';

          g.appendChild(bg); g.appendChild(txt);
          svg.appendChild(g);
        }
      });
    }

    function deleteConn(key) {
      connections.delete(key);
      setConnections[currentSet] = new Set(connections);
      updateDotColors();
      renderLines();
    }

    function updateDotColors() {
      document.querySelectorAll('[data-dot]').forEach(dot => {
        const id = dot.dataset.dot;
        const hasConn = [...connections].some(k => k.split('|').includes(id));
        dot.classList.toggle('connected', hasConn);
        dot.classList.toggle('pending', pendingDot && pendingDot.id === id);
        // Also update parent match-item for pending highlight
        const item = dot.closest('.match-item');
        if (item) item.classList.toggle('pending', pendingDot && pendingDot.id === id);
      });
    }

    // ================================================================
    //  BUILD GAME
    // ================================================================
    function buildGame() {
      const set = gameData[currentSet];
      if (!set) return;

      // Restore saved connections for this set
      connections = setConnections[currentSet] || new Set();
      setConnections[currentSet] = connections;

      checked = false;

      const colLeft  = document.getElementById('colLeft');
      const colRight = document.getElementById('colRight');
      colLeft.innerHTML  = '';
      colRight.innerHTML = '';

      // Shuffle display order
      const leftOrder  = [...set.leftItems].sort(() => Math.random() - 0.5);
      const rightOrder = [...set.rightItems].sort(() => Math.random() - 0.5);

      leftOrder.forEach(item => {
        const el = document.createElement('div');
        el.className = 'match-item';
        el.dataset.id   = item.id;
        el.dataset.side = 'left';
        el.innerHTML = `<span>${item.text}</span><div class="dot" data-dot="${item.id}"></div>`;
        colLeft.appendChild(el);
      });

      rightOrder.forEach(item => {
        const el = document.createElement('div');
        el.className = 'match-item';
        el.dataset.id   = item.id;
        el.dataset.side = 'right';
        el.innerHTML = `<div class="dot" data-dot="${item.id}"></div><span>${item.text}</span>`;
        colRight.appendChild(el);
      });

      // Click on whole row
      document.querySelectorAll('.match-item').forEach(item => {
        item.addEventListener('click', onItemClick);
      });

      updateDotColors();
      renderLines();
      updateSetNav();
    }

    function onItemClick(e) {
      if (checked) return;
      e.stopPropagation();
      SFX.click();

      const id   = e.currentTarget.dataset.id;
      const side = e.currentTarget.dataset.side;

      if (!pendingDot) {
        pendingDot = { id, side };
        updateDotColors();
        return;
      }

      if (pendingDot.id === id) {
        // Same item — cancel
        pendingDot = null;
        updateDotColors();
        return;
      }

      if (pendingDot.side === side) {
        // Same column — switch pending to this item
        pendingDot = { id, side };
        updateDotColors();
        return;
      }

      // Connect: one from each side
      const leftId  = side === 'right' ? pendingDot.id : id;
      const rightId = side === 'right' ? id : pendingDot.id;
      const key = ck(leftId, rightId);

      if (connections.has(key)) {
        connections.delete(key);
      } else {
        connections.add(key);
        SFX.place();
      }

      setConnections[currentSet] = new Set(connections);
      pendingDot = null;
      updateDotColors();
      renderLines();
    }

    // Cancel pending on outside click
    document.addEventListener('click', () => {
      if (pendingDot) { pendingDot = null; updateDotColors(); }
    });

    // ================================================================
    //  SET NAVIGATION
    // ================================================================
    function updateSetNav() {
      const total = gameData.length;
      document.getElementById('setLabel').textContent = `BỘ ${currentSet + 1}`;
      document.getElementById('setDisplay').textContent = `BỘ: ${currentSet + 1} / ${total}`;
      document.getElementById('prevSetBtn').disabled = currentSet === 0;
      document.getElementById('nextSetBtn').disabled = currentSet === total - 1;
    }

    function prevSet() {
      if (currentSet > 0) {
        SFX.navigate();
        currentSet--;
        checked = false;
        document.getElementById('resultBanner').style.display = 'none';
        document.getElementById('checkBtn').style.display = '';
        document.getElementById('playAgainBtn').style.display = 'none';
        buildGame();
      }
    }

    function nextSet() {
      if (currentSet < gameData.length - 1) {
        SFX.navigate();
        currentSet++;
        checked = false;
        document.getElementById('resultBanner').style.display = 'none';
        document.getElementById('checkBtn').style.display = '';
        document.getElementById('playAgainBtn').style.display = 'none';
        buildGame();
      }
    }

    // ================================================================
    //  CHECK & CONTINUE
    // ================================================================
    function checkAnswers() {
      const set = gameData[currentSet];
      const correctSet = new Set(set.connections.map(c => ck(c.from, c.to)));

      checked = true;
      let correct = 0;

      connections.forEach(key => { if (correctSet.has(key)) correct++; });

      // Also count missed correct connections
      const total = correctSet.size;
      const pct   = total === 0 ? 100 : Math.round(correct / total * 100);

      SFX[pct === 100 ? 'correct' : 'wrong']();

      // Color items
      const allIds = new Set();
      [...connections, ...correctSet].forEach(k => k.split('|').forEach(id => allIds.add(id)));
      allIds.forEach(id => {
        const item = document.querySelector(`[data-id="${id}"]`);
        if (!item) return;
        const hasCorrect = [...connections].some(k => {
          const parts = k.split('|');
          return parts.includes(id) && correctSet.has(k);
        });
        const hasWrong = [...connections].some(k => {
          const parts = k.split('|');
          return parts.includes(id) && !correctSet.has(k);
        });
        item.classList.remove('correct', 'wrong');
        if (hasCorrect && !hasWrong) item.classList.add('correct');
        else if (hasWrong) item.classList.add('wrong');
      });

      renderLines(correctSet);

      const msgs = [
        [100, '🏆 Hoàn hảo! Nối đúng tất cả!'],
        [70,  '🎉 Rất tốt! Còn một vài nối sai.'],
        [40,  '👍 Khá ổn! Hãy thử lại để cải thiện.'],
        [0,   '💪 Chưa đạt! Xem lại các mối quan hệ nhé.'],
      ];
      const msg = msgs.find(([min]) => pct >= min)[1];

      document.getElementById('scoreDisplay').textContent = `SCORE: ${correct}/${total}`;
      document.getElementById('resultScore').textContent  = `${correct} / ${total} ĐÚNG (${pct}%)`;
      document.getElementById('resultMsg').textContent    = msg;
      document.getElementById('resultBanner').style.display = 'block';
      document.getElementById('checkBtn').style.display = 'none';
      document.getElementById('playAgainBtn').style.display = '';
    }

    function continueGame() {
      checked = false;
      document.querySelectorAll('.match-item').forEach(el => el.classList.remove('correct', 'wrong'));
      renderLines();
      document.getElementById('resultBanner').style.display = 'none';
      document.getElementById('checkBtn').style.display = '';
      document.getElementById('playAgainBtn').style.display = 'none';
    }

    // ================================================================
    //  RESIZE → REDRAW LINES
    // ================================================================
    window.addEventListener('resize', () => renderLines(checked ? undefined : undefined));

    // ================================================================
    //  ADMIN PANEL
    // ================================================================
    let adminData    = null;
    let adminConns   = {};    // si → Set of connection keys
    let adminPending = null;  // { id, side, si } or null

    function buildAdminUI() {
      const list = document.getElementById('adminSetList');
      list.innerHTML = '';
      adminData.forEach((set, si) => {
        const card = document.createElement('div');
        card.className = 'admin-set-card';

        // Title row
        const titleRow = document.createElement('div');
        titleRow.className = 'admin-set-title';
        titleRow.innerHTML = `<span>BỘ ${si + 1}:</span>`;
        const titleInput = document.createElement('input');
        titleInput.value = set.title || '';
        titleInput.addEventListener('input', () => { adminData[si].title = titleInput.value; });
        const delSetBtn = document.createElement('button');
        delSetBtn.className = 'admin-del-set-btn';
        delSetBtn.textContent = '✕ XÓA';
        delSetBtn.addEventListener('click', () => {
          adminData.splice(si, 1);
          adminConns = {};
          adminData.forEach((s, i) => { adminConns[i] = new Set(s.connections.map(c => ck(c.from, c.to))); });
          buildAdminUI();
        });
        titleRow.appendChild(titleInput); titleRow.appendChild(delSetBtn);
        card.appendChild(titleRow);

        // Columns (keyword editor)
        const cols = document.createElement('div');
        cols.className = 'admin-cols';
        ['left', 'right'].forEach(side => {
          const col = document.createElement('div');
          const label = document.createElement('div');
          label.className = 'admin-col-label';
          label.textContent = side === 'left' ? 'CỘT TRÁI' : 'CỘT PHẢI';
          col.appendChild(label);
          const items = side === 'left' ? set.leftItems : set.rightItems;
          items.forEach((item, ii) => {
            const row = document.createElement('div');
            row.className = 'admin-kw-row';
            const inp = document.createElement('input');
            inp.value = item.text;
            inp.addEventListener('input', () => { items[ii].text = inp.value; });
            const del = document.createElement('button');
            del.className = 'admin-del-btn'; del.textContent = '✕';
            del.addEventListener('click', () => { items.splice(ii, 1); buildAdminUI(); });
            row.appendChild(inp); row.appendChild(del);
            col.appendChild(row);
          });
          const addBtn = document.createElement('button');
          addBtn.className = 'admin-add-btn'; addBtn.textContent = '＋';
          addBtn.addEventListener('click', () => {
            const newId = side === 'left' ? `L${Date.now()}` : `R${Date.now()}`;
            items.push({ id: newId, text: '' });
            buildAdminUI();
          });
          col.appendChild(addBtn);
          cols.appendChild(col);
        });
        card.appendChild(cols);

        // Connection arena (game-like)
        const connLabel = document.createElement('div');
        connLabel.className = 'admin-conn-label';
        connLabel.textContent = 'KẾT NỐI ĐÚNG — bấm để nối / xóa:';
        card.appendChild(connLabel);

        const arena = document.createElement('div');
        arena.className = 'admin-arena';
        arena.id = `admin-arena-${si}`;

        const leftCol = document.createElement('div');
        leftCol.className = 'admin-arena-col admin-left';
        set.leftItems.forEach(item => {
          const el = document.createElement('div');
          el.className = 'admin-arena-item';
          el.dataset.adotId   = item.id;
          el.dataset.adotSide = 'left';
          el.dataset.adotSi   = si;
          el.innerHTML = `<span>${item.text || item.id}</span><div class="dot" data-adot="a${si}_${item.id}"></div>`;
          el.addEventListener('click', e => { e.stopPropagation(); onAdminItemClick(item.id, 'left', si); });
          leftCol.appendChild(el);
        });

        const midCol = document.createElement('div');

        const rightCol = document.createElement('div');
        rightCol.className = 'admin-arena-col admin-right';
        set.rightItems.forEach(item => {
          const el = document.createElement('div');
          el.className = 'admin-arena-item';
          el.dataset.adotId   = item.id;
          el.dataset.adotSide = 'right';
          el.dataset.adotSi   = si;
          el.innerHTML = `<div class="dot" data-adot="a${si}_${item.id}"></div><span>${item.text || item.id}</span>`;
          el.addEventListener('click', e => { e.stopPropagation(); onAdminItemClick(item.id, 'right', si); });
          rightCol.appendChild(el);
        });

        // SVG overlay for lines
        const svgWrap = document.createElement('div');
        svgWrap.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;';
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.id = `admin-svg-${si}`;
        svg.style.cssText = 'width:100%;height:100%;overflow:visible;';
        svgWrap.appendChild(svg);

        arena.appendChild(leftCol);
        arena.appendChild(midCol);
        arena.appendChild(rightCol);
        arena.appendChild(svgWrap);
        card.appendChild(arena);
        list.appendChild(card);
      });

      // Render lines after DOM is ready
      requestAnimationFrame(() => {
        adminData.forEach((set, si) => renderAdminLines(si));
      });
    }

    function getAdminDotPos(dotEl, si) {
      const arena = document.getElementById(`admin-arena-${si}`);
      if (!arena || !dotEl) return null;
      const arenaRect = arena.getBoundingClientRect();
      const dotRect   = dotEl.getBoundingClientRect();
      return {
        x: dotRect.left + dotRect.width / 2 - arenaRect.left,
        y: dotRect.top  + dotRect.height / 2 - arenaRect.top
      };
    }

    function renderAdminLines(si) {
      const svg = document.getElementById(`admin-svg-${si}`);
      if (!svg) return;
      svg.innerHTML = '';
      const conns = adminConns[si] || new Set();
      conns.forEach(key => {
        const [a, b] = key.split('|');
        const elA = document.querySelector(`[data-adot="a${si}_${a}"]`);
        const elB = document.querySelector(`[data-adot="a${si}_${b}"]`);
        if (!elA || !elB) return;
        const posA = getAdminDotPos(elA, si);
        const posB = getAdminDotPos(elB, si);
        if (!posA || !posB) return;

        const mx = (posA.x + posB.x) / 2;
        const my = (posA.y + posB.y) / 2;

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', posA.x); line.setAttribute('y1', posA.y);
        line.setAttribute('x2', posB.x); line.setAttribute('y2', posB.y);
        line.classList.add('conn-line');
        svg.appendChild(line);

        // Delete button on midpoint
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.style.cssText = 'cursor:pointer;pointer-events:all;';
        g.addEventListener('click', e => {
          e.stopPropagation(); SFX.click();
          adminConns[si].delete(key);
          renderAdminLines(si);
          updateAdminColors(si);
        });
        const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        bg.setAttribute('x', mx - 7); bg.setAttribute('y', my - 7);
        bg.setAttribute('width', 14); bg.setAttribute('height', 14);
        bg.classList.add('conn-del-bg');
        const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        txt.setAttribute('x', mx); txt.setAttribute('y', my);
        txt.classList.add('conn-del');
        txt.textContent = '✕';
        g.appendChild(bg); g.appendChild(txt);
        svg.appendChild(g);
      });
      updateAdminColors(si);
    }

    function updateAdminColors(si) {
      const conns = adminConns[si] || new Set();
      document.querySelectorAll(`[data-adot-si="${si}"]`).forEach(item => {
        const id = item.dataset.adotId;
        const hasConn = [...conns].some(k => k.split('|').includes(id));
        item.classList.toggle('connected', hasConn);
        item.classList.toggle('pending', adminPending && adminPending.si == si && adminPending.id === id);
      });
    }

    function onAdminItemClick(id, side, si) {
      SFX.click();
      if (!adminPending) {
        adminPending = { id, side, si };
        updateAdminColors(si);
        return;
      }
      if (adminPending.si != si) {
        // Different set — cancel previous, start new
        const prevSi = adminPending.si;
        adminPending = { id, side, si };
        updateAdminColors(prevSi);
        updateAdminColors(si);
        return;
      }
      if (adminPending.id === id) {
        // Same item — cancel
        adminPending = null;
        updateAdminColors(si);
        return;
      }
      if (adminPending.side === side) {
        // Same column — switch pending
        adminPending = { id, side, si };
        updateAdminColors(si);
        return;
      }
      // Connect
      const leftId  = side === 'right' ? adminPending.id : id;
      const rightId = side === 'right' ? id : adminPending.id;
      const key = ck(leftId, rightId);
      if (!adminConns[si]) adminConns[si] = new Set();
      if (adminConns[si].has(key)) {
        adminConns[si].delete(key);
      } else {
        adminConns[si].add(key);
        SFX.place();
      }
      adminPending = null;
      renderAdminLines(si);
    }

    document.getElementById('adminAddSetBtn').addEventListener('click', () => {
      const si = adminData.length;
      adminData.push({
        id: Date.now(),
        title: `Bộ ${si + 1}`,
        leftItems:  [{ id: `L${Date.now()}a`, text: '' }],
        rightItems: [{ id: `R${Date.now()}b`, text: '' }],
        connections: []
      });
      adminConns[si] = new Set();
      buildAdminUI();
    });

    document.getElementById('adminSaveBtn').addEventListener('click', () => {
      SFX.correct();
      // Convert adminConns back to connections format
      adminData.forEach((set, si) => {
        const conns = adminConns[si] || new Set();
        set.connections = [...conns].map(key => {
          const [a, b] = key.split('|');
          const isALeft = set.leftItems.some(it => it.id === a);
          return isALeft ? { from: a, to: b } : { from: b, to: a };
        });
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(adminData));
      showToast('Đã lưu!');
      gameData = JSON.parse(JSON.stringify(adminData));
      setConnections = {};
      currentSet = 0;
      buildGame();
    });

    // ================================================================
    //  GAMES POPUP
    // ================================================================
    const gamesBtn   = document.getElementById('gamesBtn');
    const gamesPopup = document.getElementById('gamesPopup');
    gamesBtn.addEventListener('click', e => {
      e.stopPropagation(); SFX.click(); gamesPopup.classList.toggle('open');
      if (gamesPopup.classList.contains('open')) {
        const r = gamesBtn.getBoundingClientRect();
        gamesPopup.style.left = (r.left + r.width / 2) + 'px';
        gamesPopup.style.top  = (r.bottom + 6) + 'px';
      }
    });
    document.addEventListener('click', () => gamesPopup.classList.remove('open'));

    // ================================================================
    //  ADMIN AUTH
    // ================================================================
    const adminPanel = document.getElementById('adminPanel');

    function openAdminPanel() {
      adminData = JSON.parse(JSON.stringify(gameData));
      adminConns = {};
      adminPending = null;
      adminData.forEach((set, si) => {
        adminConns[si] = new Set(set.connections.map(c => ck(c.from, c.to)));
      });
      buildAdminUI();
      adminPanel.classList.add('open');
    }

    document.getElementById('adminClose').addEventListener('click', () => adminPanel.classList.remove('open'));

    initAdminAuth({ onLogin: openAdminPanel });

    // ================================================================
    //  INIT
    // ================================================================
    async function initGame() {
      gameData = await loadGameData();
      setConnections = {};
      currentSet = 0;

      document.title = `${GAME_EMOJI} — PIXELVERSE`;
      document.getElementById('gameTitle').textContent = `${GAME_EMOJI} Nối Từ`;
      document.getElementById('adminPanelTitle').textContent = `⚙ ADMIN — ${GAME_EMOJI} NỐI TỪ`;

      buildGame();

      if (new URLSearchParams(location.search).get('admin') === 'open') {
        if (isAdminLoggedIn()) openAdminPanel();
      }
    }

    initGame();
  </script>
</body>
</html>
