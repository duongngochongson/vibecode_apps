<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐺 — PIXELVERSE</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">
  <link rel="stylesheet" href="../../css/style.css" />
  <script src="../../js/sfx.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/games-popup.js"></script>
  <script src="../../js/game-visibility.js" data-json="../../data/admin_content.json"></script>
  <style>
    /* ===== PAGE OVERRIDES ===== */
    .page-header h1 { color: var(--cyan); font-size: clamp(22px, 4vw, 34px); }
    #scoreDisplay { color: var(--yellow); border-color: var(--yellow); }
    #progressDisplay { color: var(--cyan); border-color: var(--cyan); }

    /* ===== GAME AREA ===== */
    .game-area {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .game-area {
        grid-template-columns: 1fr;
      }
      .card-pool-section {
        order: -1;
        position: static; /* disable sticky on mobile */
      }
    }

    @media (max-width: 480px) {
      .game-page { padding: 20px 1rem 40px; }
      .page-header { margin-bottom: 20px; }
      .score-bar { gap: 10px; }
      .topic-card { padding: 14px; }
      .drop-zone { min-height: 60px; }
      .result-banner__score { font-size: clamp(14px, 5vw, 22px); }
      .result-banner { padding: 20px 16px; }
    }
    @media (max-width: 380px) {
      .drop-zones { grid-template-columns: 1fr; }
      .drop-zone { min-height: 52px; }
      .card-pool { min-height: 80px; }
    }

    /* ===== TOPICS COLUMN ===== */
    .topics-column {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .topic-card {
      background: var(--bg-card);
      border: 2px solid var(--grey);
      padding: 20px;
      transition: border-color 0.2s;
    }
    .topic-card.highlight { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,255,245,0.2); }

    .topic-card__header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .topic-card__num {
      font-family: var(--font-pixel);
      font-size: 9px;
      color: var(--magenta);
      text-shadow: 0 0 6px var(--magenta);
      min-width: 28px;
    }
    .topic-card__title {
      font-family: var(--font-vi-heading);
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
    }
    .topic-card__passage {
      font-family: var(--font-vi-body);
      font-size: 13px;
      color: rgba(232,232,255,0.65);
      line-height: 1.7;
      margin-bottom: 16px;
      padding-left: clamp(0px, 5vw, 40px);
    }

    /* Drop zones */
    .drop-zones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding-left: clamp(0px, 5vw, 40px);
    }

    .drop-zone {
      min-height: 72px;
      border: 2px dashed;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .drop-zone--pro   { border-color: rgba(0,255,245,0.4);  }
    .drop-zone--con   { border-color: rgba(255,0,204,0.4); }
    .drop-zone.drag-over { background: rgba(255,255,255,0.06); }
    .drop-zone--pro.drag-over { box-shadow: 0 0 12px rgba(0,255,245,0.4); border-color: var(--cyan); }
    .drop-zone--con.drag-over { box-shadow: 0 0 12px rgba(255,0,204,0.4); border-color: var(--magenta); }

    .drop-zone__label {
      font-size: 11px;
      font-weight: 600;
      position: absolute;
      top: 5px;
      left: 7px;
      letter-spacing: 1px;
      opacity: 0.6;
    }
    .drop-zone--pro .drop-zone__label { color: var(--cyan); }
    .drop-zone--con .drop-zone__label { color: var(--magenta); }

    .drop-zone__empty {
      font-family: var(--font-vi-body);
      font-size: 11px;
      color: rgba(232,232,255,0.25);
      text-align: center;
      margin-top: 10px;
    }

    /* Result state */
    .drop-zone.correct { border-style: solid; border-color: var(--green); box-shadow: 0 0 12px rgba(57,255,20,0.4); background: rgba(57,255,20,0.05); }
    .drop-zone.wrong   { border-style: solid; border-color: var(--orange); box-shadow: 0 0 12px rgba(255,107,0,0.4); background: rgba(255,107,0,0.05); }

    /* ===== DRAGGABLE CARDS ===== */
    .drag-card {
      background: var(--bg-card2);
      border: 2px solid var(--grey);
      padding: 10px 12px;
      font-family: var(--font-vi-body);
      font-size: 12px;
      color: var(--white);
      line-height: 1.5;
      cursor: grab;
      transition: border-color 0.15s, box-shadow 0.15s, opacity 0.15s;
      width: 100%;
      position: relative;
    }
    .drag-card:active { cursor: grabbing; opacity: 0.7; }
    .drag-card:hover  { border-color: var(--white); box-shadow: 0 0 8px rgba(232,232,255,0.2); }
    .drag-card.dragging { opacity: 0.35; }

    /* Card inside drop zone */
    .drop-zone .drag-card {
      font-size: 11px;
      margin-top: 14px;
    }
    .drop-zone--pro .drag-card { border-color: rgba(0,255,245,0.5); }
    .drop-zone--con .drag-card { border-color: rgba(255,0,204,0.5); }

    /* correct/wrong card tint */
    .drop-zone.correct .drag-card { border-color: var(--green); color: var(--green); }
    .drop-zone.wrong   .drag-card { border-color: var(--orange); color: var(--orange); }

    /* Selected card (click-to-place) */
    .drag-card.selected {
      border-color: var(--yellow);
      box-shadow: 0 0 10px rgba(255,230,0,0.45);
      background: rgba(255,230,0,0.04);
    }
    .drop-zone.accepting {
      border-color: rgba(255,230,0,0.5);
      border-style: solid;
    }
    .drop-zone.accepting:hover {
      border-color: var(--yellow);
      box-shadow: 0 0 8px rgba(255,230,0,0.35);
      cursor: pointer;
    }

    /* ===== CARD POOL ===== */
    .card-pool-section {
      position: sticky;
      top: 80px;
    }
    .card-pool-header {
      font-size: 13px;
      font-weight: 600;
      color: var(--yellow);
      letter-spacing: 2px;
      text-shadow: 0 0 8px var(--yellow);
      margin-bottom: 12px;
    }
    .card-pool {
      background: var(--bg-card);
      border: 2px solid var(--grey);
      padding: 12px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .card-pool.drag-over {
      border-color: var(--yellow);
      box-shadow: 0 0 10px rgba(255,230,0,0.3);
    }
    .card-pool__empty {
      font-family: var(--font-vi-body);
      font-size: 12px;
      color: rgba(232,232,255,0.3);
      text-align: center;
      padding: 20px 0;
    }

    .result-banner__score { font-size: 22px; }
  </style>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <a href="../../index.html" class="navbar__logo">◈ PIXELVERSE</a>
    <ul class="navbar__links">
      <li><a href="../../index.html" title="Home">◈</a></li>
      <li>
        <button class="navbar__grid-btn" id="gamesBtn" title="Games">
          <span class="navbar__grid-btn__dots">
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
          </span>
        </button>
      </li>
      <li><a class="navbar__admin-btn" href="../admin/">⚙</a></li>
    </ul>
  </nav>

  <!-- ===== GAMES POPUP ===== -->
  <div class="navbar__games-popup" id="gamesPopup">
    <div class="navbar__games-list">
      <div class="navbar__game-item navbar__game-item--active">🐺</div>
      <a href="../mind-map/index.html" class="navbar__game-item" data-game="mind-map">🐙</a>
      <a href="../matching/index.html" class="navbar__game-item" data-game="matching">🐿️</a>
      <a href="../file-naming/index.html" class="navbar__game-item" data-game="file-naming">🐟</a>
      <a href="../prompt-order/index.html" class="navbar__game-item" data-game="prompt-order">🐜</a>
      <a href="../calculator/index.html" class="navbar__game-item" data-game="calculator">🐬</a>
      <a href="../mece/index.html" class="navbar__game-item" data-game="mece">🦊</a>
      <a href="../noticeboard/index.html" class="navbar__game-item" data-game="noticeboard">🐝</a>
    </div>
  </div>

  <!-- ===== GAME PAGE ===== -->
  <main class="game-page">

    <div class="page-header">
      <a href="../../index.html" class="page-header__back">◀ HOME</a>
      <h1>🐺 Đoán Ưu / Nhược</h1>
      <p class="page-header__sub">Kéo thả thẻ vào đúng ô tương ứng với từng chủ đề</p>
    </div>

    <div class="score-bar">
      <div class="score-chip pixel-box" id="progressDisplay">0 / 0 PLACED</div>
      <button class="action-btn action-btn--check"      id="checkBtn"    onclick="checkAnswers()">✓ CHECK</button>
      <button class="action-btn action-btn--play-again" id="playAgainBtn" onclick="continueGame()" style="display:none">▶ CONTINUE</button>
      <div class="score-chip pixel-box pixel-box--yellow" id="scoreDisplay">SCORE: —</div>
    </div>

    <div class="game-area">

      <!-- LEFT: Topics -->
      <div class="topics-column" id="topicsColumn"></div>

      <!-- RIGHT: Card Pool -->
      <div class="card-pool-section">
        <div class="card-pool-header">▸ THẺ CÒN LẠI</div>
        <div class="card-pool pixel-box pixel-box--yellow" id="cardPool"
             ondragover="handleDragOver(event)" ondrop="handleDropToPool(event)">
          <div class="card-pool__empty" id="poolEmpty">Tất cả thẻ đã được đặt!</div>
        </div>
      </div>

    </div>

    <div class="result-banner" id="resultBanner">
      <div class="result-banner__score" id="resultScore"></div>
      <div class="result-banner__msg"   id="resultMsg"></div>
    </div>

  </main>

  <!-- ===== FOOTER ===== -->
  <script>
    // ================================================================
    //  GAME DATA & STATE
    // ================================================================
    let gameData = [];

    // dragging state
    let dragCardId   = null;   // ID of card being dragged
    let dragFromPool = false;  // true if from pool
    let dragFromZone = null;   // { topicId, type:'pro'|'con' } if from a drop zone
    let selectedCardId = null; // click-to-place selection

    function clearCardSelection() {
      selectedCardId = null;
      document.querySelectorAll('.drag-card.selected').forEach(c => c.classList.remove('selected'));
      document.querySelectorAll('.drop-zone.accepting').forEach(z => z.classList.remove('accepting'));
    }

    // Game state: map of { topicId -> { pro: cardId|null, con: cardId|null } }
    let dropState = {};
    let checked   = false;

    function initDropState() {
      dropState = {};
      gameData.forEach(t => { dropState[t.id] = { pro: null, con: null }; });
    }

    // ================================================================
    //  RENDER GAME
    // ================================================================
    function buildGame() {
      checked = false;
      initDropState();
      renderTopics();
      renderPool();
      updateProgress();
      document.getElementById('resultBanner').style.display = 'none';
      document.getElementById('playAgainBtn').style.display = 'none';
      document.getElementById('checkBtn').style.display = '';
    }

    function renderTopics() {
      const col = document.getElementById('topicsColumn');
      col.innerHTML = '';

      gameData.forEach((topic, idx) => {
        const article = document.createElement('article');
        article.className = 'topic-card';
        article.id = 'topic-' + topic.id;
        article.innerHTML = `
          <div class="topic-card__header">
            <span class="topic-card__num">${String(idx + 1).padStart(2,'0')}.</span>
            <span class="topic-card__title font-vi-h">${PV.escHtml(topic.topic)}</span>
          </div>
          <p class="topic-card__passage font-vi">${PV.escHtml(topic.passage)}</p>
          <div class="drop-zones">
            <div class="drop-zone drop-zone--pro"
                 id="dz-${topic.id}-pro"
                 ondragover="handleDragOver(event)"
                 ondrop="handleDropToZone(event,'${topic.id}','pro')"
                 ondragleave="handleDragLeave(event)">
              <span class="drop-zone__label">ƯU ▸</span>
              <span class="drop-zone__empty">Kéo / nhấn thẻ</span>
            </div>
            <div class="drop-zone drop-zone--con"
                 id="dz-${topic.id}-con"
                 ondragover="handleDragOver(event)"
                 ondrop="handleDropToZone(event,'${topic.id}','con')"
                 ondragleave="handleDragLeave(event)">
              <span class="drop-zone__label">NHƯỢC ▸</span>
              <span class="drop-zone__empty">Kéo / nhấn thẻ</span>
            </div>
          </div>
        `;
        col.appendChild(article);

        // Click-to-place: add click listeners to drop zones
        article.querySelectorAll('.drop-zone').forEach(zone => {
          const [, topicId, type] = zone.id.split('-');
          zone.addEventListener('click', e => {
            e.stopPropagation();
            if (!selectedCardId || checked) return;
            dragCardId = selectedCardId;
            clearCardSelection();
            SFX.place();
            doDropToZone(topicId, type);
          });
        });
      });

      // Deselect when clicking empty space
      document.addEventListener('click', () => clearCardSelection(), { capture: false });
    }

    function renderPool() {
      const pool    = document.getElementById('cardPool');
      const empMsg  = document.getElementById('poolEmpty');

      // Remove old cards (keep empMsg)
      pool.querySelectorAll('.drag-card').forEach(c => c.remove());

      // Collect all card IDs not yet placed
      const placed = new Set();
      Object.values(dropState).forEach(s => {
        if (s.pro) placed.add(s.pro);
        if (s.con) placed.add(s.con);
      });

      // Build all cards (pros + cons)
      let allCards = [];
      gameData.forEach(t => {
        allCards.push({ id: t.pro.id, text: t.pro.text, topicId: t.id, type: 'pro' });
        allCards.push({ id: t.con.id, text: t.con.text, topicId: t.id, type: 'con' });
      });

      // Shuffle (Fisher-Yates)
      for (let i = allCards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allCards[i], allCards[j]] = [allCards[j], allCards[i]];
      }

      // Filter only unplaced
      const unplaced = allCards.filter(c => !placed.has(c.id));

      empMsg.style.display = unplaced.length === 0 ? 'block' : 'none';

      unplaced.forEach(card => {
        pool.appendChild(makeCardEl(card));
      });
    }

    function makeCardEl(card) {
      const div = document.createElement('div');
      div.className = 'drag-card';
      div.draggable = true;
      div.dataset.cardId = card.id;
      div.textContent = card.text;

      div.addEventListener('click', e => {
        e.stopPropagation();
        if (checked) return;
        if (selectedCardId === card.id) {
          clearCardSelection();
        } else {
          clearCardSelection();
          selectedCardId = card.id;
          div.classList.add('selected');
          SFX.select();
          document.querySelectorAll('.drop-zone').forEach(z => z.classList.add('accepting'));
        }
      });

      div.addEventListener('dragstart', e => {
        clearCardSelection();
        dragCardId   = card.id;
        dragFromPool = true;
        dragFromZone = null;
        div.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', card.id);
      });
      div.addEventListener('dragend', () => div.classList.remove('dragging'));

      // Touch support (basic)
      let touchStartX, touchStartY;
      div.addEventListener('touchstart', e => {
        const t = e.touches[0];
        touchStartX = t.clientX; touchStartY = t.clientY;
        dragCardId = card.id;
      }, { passive: true });
      div.addEventListener('touchend', e => {
        const touch = e.changedTouches[0];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        const zone = el ? el.closest('.drop-zone') : null;
        if (zone) {
          const [, topicId, type] = zone.id.split('-');
          doDropToZone(topicId, type);
        }
        dragCardId = null;
      });

      return div;
    }

    function getCardById(cardId) {
      for (const t of gameData) {
        if (t.pro.id === cardId) return { id: t.pro.id, text: t.pro.text, topicId: t.id, type: 'pro' };
        if (t.con.id === cardId) return { id: t.con.id, text: t.con.text, topicId: t.id, type: 'con' };
      }
      return null;
    }

    // ================================================================
    //  DRAG AND DROP HANDLERS
    // ================================================================
    function handleDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add('drag-over');
    }
    function handleDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');
    }

    function handleDropToZone(e, topicId, type) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      if (!dragCardId) return;
      doDropToZone(topicId, type);
    }

    function doDropToZone(topicId, type) {
      if (!dragCardId || checked) return;

      const incomingId = dragCardId;

      // If zone already has a card, swap it back to pool
      const existing = dropState[topicId][type];
      if (existing) {
        // Return existing card to pool — it will show up in renderPool
        dropState[topicId][type] = null;
      }

      // If card came from another zone, clear that zone
      // (dragFromZone is not set for HTML5 drag since we don't track it here,
      //  but we do track it via dropState scan)
      for (const tid of Object.keys(dropState)) {
        if (dropState[tid].pro === incomingId) dropState[tid].pro = null;
        if (dropState[tid].con === incomingId) dropState[tid].con = null;
      }

      dropState[topicId][type] = incomingId;
      dragCardId = null;
      SFX.place();

      refreshZone(topicId, 'pro');
      refreshZone(topicId, 'con');
      renderPool();
      updateProgress();
    }

    function handleDropToPool(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      if (!dragCardId || checked) return;

      // Clear from any zone
      for (const tid of Object.keys(dropState)) {
        if (dropState[tid].pro === dragCardId) { dropState[tid].pro = null; refreshZone(tid, 'pro'); }
        if (dropState[tid].con === dragCardId) { dropState[tid].con = null; refreshZone(tid, 'con'); }
      }
      dragCardId = null;
      renderPool();
      updateProgress();
    }

    function refreshZone(topicId, type) {
      const zone   = document.getElementById(`dz-${topicId}-${type}`);
      if (!zone) return;
      const cardId = dropState[topicId][type];

      // Remove existing card el
      zone.querySelector('.drag-card')?.remove();
      const empSpan = zone.querySelector('.drop-zone__empty');

      if (cardId) {
        const card = getCardById(cardId);
        if (card) {
          const el = makeCardEl(card);
          // Allow dragging back out of zone
          el.addEventListener('dragstart', ev => {
            dragCardId = cardId;
            dragFromPool = false;
            dragFromZone = { topicId, type };
            el.classList.add('dragging');
            ev.dataTransfer.effectAllowed = 'move';
            ev.dataTransfer.setData('text/plain', cardId);
          });
          zone.appendChild(el);
          if (empSpan) empSpan.style.display = 'none';
        }
      } else {
        if (empSpan) empSpan.style.display = '';
      }
    }

    // ================================================================
    //  PROGRESS & CHECK
    // ================================================================
    function updateProgress() {
      let filled = 0;
      const total = gameData.length * 2;
      Object.values(dropState).forEach(s => {
        if (s.pro) filled++;
        if (s.con) filled++;
      });
      document.getElementById('progressDisplay').textContent = `${filled} / ${total} PLACED`;
    }

    function checkAnswers() {
      let correct = 0;
      const total = gameData.length * 2;

      gameData.forEach(topic => {
        const state = dropState[topic.id];
        ['pro', 'con'].forEach(type => {
          const zone   = document.getElementById(`dz-${topic.id}-${type}`);
          if (!zone) return;
          zone.classList.remove('correct', 'wrong');

          const placedId  = state[type];
          const correctId = type === 'pro' ? topic.pro.id : topic.con.id;

          if (placedId === correctId) {
            zone.classList.add('correct');
            correct++;
          } else {
            zone.classList.add('wrong');
          }
        });
      });

      checked = true;
      const pct = Math.round(correct / total * 100);
      if (pct === 100) SFX.correct(); else SFX.wrong();
      const msgs = [
        [100, '🏆 Hoàn hảo! Bạn phân tích rất xuất sắc!'],
        [75,  '🎉 Rất tốt! Còn một vài chỗ cần xem lại.'],
        [50,  '👍 Khá ổn! Hãy thử lại để cải thiện thêm.'],
        [0,   '💪 Chưa đạt! Đọc lại và thử lại nhé!'],
      ];
      const msg = msgs.find(([min]) => pct >= min)[1];

      document.getElementById('scoreDisplay').textContent = `SCORE: ${correct}/${total}`;
      document.getElementById('resultScore').textContent  = `${correct} / ${total} CORRECT (${pct}%)`;
      document.getElementById('resultMsg').textContent    = msg;
      document.getElementById('resultBanner').style.display = 'block';
      document.getElementById('checkBtn').style.display = 'none';
      document.getElementById('playAgainBtn').style.display = '';
    }

    function continueGame() {
      checked = false;
      document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('correct', 'wrong'));
      document.getElementById('resultBanner').style.display = 'none';
      document.getElementById('checkBtn').style.display = '';
      document.getElementById('playAgainBtn').style.display = 'none';
    }

    async function playAgain() {
      gameData = await PV.loadData('prosCons') || [];
      buildGame();
    }

    // ================================================================
    //  INIT
    // ================================================================
    async function initGame() {
      gameData = await PV.loadData('prosCons') || [];
      buildGame();
    }
    initGame();
  </script>

</body>
