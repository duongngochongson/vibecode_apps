<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐬 — PIXELVERSE</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">
  <link rel="stylesheet" href="../../css/style.css" />
  <script src="../../js/sfx.js"></script>
  <style>
    .calc-page {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 1rem 60px;
      min-height: calc(100vh - 56px);
    }
    .calc-title {
      font-family: var(--font-pixel);
      font-size: clamp(14px, 3vw, 20px);
      color: var(--yellow);
      letter-spacing: 3px; margin-bottom: 32px;
    }

    /* ===== CALCULATOR SHELL ===== */
    .calc {
      width: 100%; max-width: 320px;
      border: 2px solid rgba(0,255,245,0.3);
      background: var(--bg-card2);
      box-shadow: 0 0 30px rgba(0,255,245,0.08);
    }

    /* ===== DISPLAY ===== */
    .calc-display {
      padding: 16px 16px 10px;
      border-bottom: 2px solid rgba(255,255,255,0.06);
      text-align: right;
    }
    .calc-expr {
      font-size: 11px; letter-spacing: 0.5px;
      color: var(--grey); min-height: 18px;
      overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; direction: rtl;
      margin-bottom: 6px;
    }
    .calc-result {
      font-size: 28px; color: var(--white);
      font-family: monospace; letter-spacing: 1px;
      overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; direction: rtl;
      min-height: 38px;
    }
    .calc-result.result-shown { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }
    .calc-result.result-error { color: var(--magenta); }

    /* ===== BUTTON GRID ===== */
    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }
    .calc-btn {
      aspect-ratio: 1;
      border: none; border-right: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: transparent; color: var(--white);
      font-size: 16px; cursor: pointer;
      transition: background 0.1s;
      font-family: monospace;
    }
    .calc-btn:hover { background: rgba(255,255,255,0.06); }
    .calc-btn:active { background: rgba(255,255,255,0.12); }

    /* Special button colors */
    .calc-btn--op    { color: var(--cyan); }
    .calc-btn--clear { color: var(--magenta); font-size: 13px; }
    .calc-btn--eq    {
      background: rgba(0,255,245,0.1); color: var(--cyan);
      border-bottom: 1px solid rgba(0,255,245,0.2);
      border-right: none;
    }
    .calc-btn--eq:hover { background: rgba(0,255,245,0.18); }
    .calc-btn--zero  { grid-column: span 1; }
    .calc-btn--paren { color: var(--yellow); font-size: 14px; }
    .calc-btn--del   { color: var(--magenta); font-size: 13px; }
    .calc-btn--dot   { color: var(--grey); }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="../../index.html" class="navbar__logo">◈ PIXELVERSE</a>
    <ul class="navbar__links">
      <li><a href="../../index.html" title="Home">🏠</a></li>
      <li>
        <button class="navbar__grid-btn" id="gamesBtn" title="Games">
          <span class="navbar__grid-btn__dots">
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
          </span>
        </button>
      </li>
      <li><a class="navbar__admin-btn" href="../admin/">⚙</a></li>
    </ul>
  </nav>

  <div class="navbar__games-popup" id="gamesPopup">
    <div class="navbar__games-list">
      <a href="../pros-cons/index.html" class="navbar__game-item">🐺</a>
      <a href="../mind-map/index.html" class="navbar__game-item">🐙</a>
      <a href="../matching/index.html" class="navbar__game-item">🐿️</a>
      <a href="../file-naming/index.html" class="navbar__game-item">🐟</a>
      <a href="../prompt-order/index.html" class="navbar__game-item">🐜</a>
      <div class="navbar__game-item navbar__game-item--active">🐬</div>
      <a href="../mece/index.html" class="navbar__game-item">🦊</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="calc-page">
    <h1 class="calc-title">🐬 CALCULATOR</h1>
    <div class="calc" id="calc">
      <!-- Display -->
      <div class="calc-display">
        <div class="calc-expr"    id="calcExpr"></div>
        <div class="calc-result"  id="calcResult">0</div>
      </div>
      <!-- Button grid -->
      <div class="calc-grid">
        <button class="calc-btn calc-btn--clear" data-action="clear">C</button>
        <button class="calc-btn calc-btn--paren" data-action="(">(</button>
        <button class="calc-btn calc-btn--paren" data-action=")">)</button>
        <button class="calc-btn calc-btn--op"    data-action="÷">÷</button>

        <button class="calc-btn" data-action="7">7</button>
        <button class="calc-btn" data-action="8">8</button>
        <button class="calc-btn" data-action="9">9</button>
        <button class="calc-btn calc-btn--op" data-action="×">×</button>

        <button class="calc-btn" data-action="4">4</button>
        <button class="calc-btn" data-action="5">5</button>
        <button class="calc-btn" data-action="6">6</button>
        <button class="calc-btn calc-btn--op" data-action="−">−</button>

        <button class="calc-btn" data-action="1">1</button>
        <button class="calc-btn" data-action="2">2</button>
        <button class="calc-btn" data-action="3">3</button>
        <button class="calc-btn calc-btn--op" data-action="+">+</button>

        <button class="calc-btn calc-btn--dot"  data-action=".">.</button>
        <button class="calc-btn calc-btn--zero" data-action="0">0</button>
        <button class="calc-btn calc-btn--del"  data-action="backspace">⌫</button>
        <button class="calc-btn calc-btn--eq"   data-action="=">=</button>
      </div>
    </div>
  </div>

  <script>
    // ================================================================
    //  STATE
    // ================================================================
    let expr       = '';   // current expression string
    let afterEqual = false; // true right after = pressed

    // ================================================================
    //  DISPLAY
    // ================================================================
    function updateDisplay() {
      const exprEl   = document.getElementById('calcExpr');
      const resultEl = document.getElementById('calcResult');
      exprEl.textContent = expr || '';
      if (afterEqual) {
        // Result already in resultEl (set by compute())
      } else {
        resultEl.className = 'calc-result';
        resultEl.textContent = expr || '0';
      }
    }

    function compute() {
      if (!expr) return;
      const resultEl = document.getElementById('calcResult');
      const exprEl   = document.getElementById('calcExpr');
      try {
        // Normalize: × → *, ÷ → /, − → -
        const safe = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
        // eslint-disable-next-line no-new-func
        const val = Function('"use strict"; return (' + safe + ')')();
        if (!isFinite(val)) throw new Error('Infinity');
        const formatted = parseFloat(val.toPrecision(12)).toString();
        exprEl.textContent = expr + ' =';
        resultEl.textContent = formatted;
        resultEl.className = 'calc-result result-shown';
        expr = formatted;
        afterEqual = true;
        SFX.click();
      } catch(e) {
        resultEl.textContent = 'Lỗi';
        resultEl.className = 'calc-result result-error';
        afterEqual = true;
        SFX.wrong?.();
      }
    }

    // ================================================================
    //  INPUT HANDLER
    // ================================================================
    function handleAction(action) {
      switch(action) {
        case 'clear':
          expr = ''; afterEqual = false;
          document.getElementById('calcExpr').textContent = '';
          document.getElementById('calcResult').textContent = '0';
          document.getElementById('calcResult').className = 'calc-result';
          return;

        case 'backspace':
          if (afterEqual) { expr = ''; afterEqual = false; updateDisplay(); return; }
          expr = expr.slice(0, -1);
          break;

        case '=':
          compute();
          return;

        default: {
          const isOp = '+-×÷−*/()'.includes(action);
          if (afterEqual) {
            // After = : digit starts fresh, operator continues from result
            if (!isOp) expr = '';
            afterEqual = false;
          }
          expr += action;
          break;
        }
      }
      afterEqual = false;
      updateDisplay();
    }

    // ================================================================
    //  BUTTON CLICKS
    // ================================================================
    document.getElementById('calc').addEventListener('click', e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      SFX.click();
      handleAction(btn.dataset.action);
    });

    // ================================================================
    //  KEYBOARD
    // ================================================================
    document.addEventListener('keydown', e => {
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      const key = e.key;
      if ('0123456789'.includes(key)) { handleAction(key); return; }
      if (key === '+')           { handleAction('+');        return; }
      if (key === '-')           { handleAction('−');        return; }
      if (key === '*')           { handleAction('×');        return; }
      if (key === '/')           { e.preventDefault(); handleAction('÷'); return; }
      if (key === '(')           { handleAction('(');        return; }
      if (key === ')')           { handleAction(')');        return; }
      if (key === '.')           { handleAction('.');        return; }
      if (key === 'Enter' || key === '=') { e.preventDefault(); handleAction('='); return; }
      if (key === 'Backspace')   { handleAction('backspace'); return; }
      if (key === 'Escape' || key === 'Delete') { handleAction('clear'); return; }
    });

    // ================================================================
    //  GAMES POPUP
    // ================================================================
    const gamesBtn   = document.getElementById('gamesBtn');
    const gamesPopup = document.getElementById('gamesPopup');
    gamesBtn.addEventListener('click', e => {
      e.stopPropagation(); SFX.click(); gamesPopup.classList.toggle('open');
      if (gamesPopup.classList.contains('open')) {
        const r = gamesBtn.getBoundingClientRect();
        gamesPopup.style.left = (r.left + r.width / 2) + 'px';
        gamesPopup.style.top  = (r.bottom + 6) + 'px';
      }
    });
    document.addEventListener('click', () => gamesPopup.classList.remove('open'));

    document.title = '🐬 — PIXELVERSE';
  </script>
</body>
</html>
