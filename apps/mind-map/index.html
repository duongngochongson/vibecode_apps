<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐙 — PIXELVERSE</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">
  <link rel="stylesheet" href="../../css/style.css" />
  <script src="../../data/mind-map.js"></script>
  <script src="../../js/sfx.js"></script>
  <style>
    /* ===== GAME PAGE ===== */
    .game-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 2rem 60px;
      position: relative;
      z-index: 2;
    }
    .page-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .page-header__back {
      font-family: var(--font-pixel);
      font-size: 7px;
      color: var(--grey);
      text-decoration: none;
      letter-spacing: 1px;
      display: inline-block;
      margin-bottom: 12px;
    }
    .page-header__back:hover { color: var(--cyan); }
    .page-header h1 {
      font-family: var(--font-vi-heading);
      font-size: clamp(18px, 4vw, 28px);
      color: var(--white);
      margin-bottom: 6px;
    }
    .page-header__sub {
      font-family: var(--font-vi-body);
      font-size: 13px;
      color: rgba(232,232,255,0.55);
    }

    /* ===== SCORE BAR ===== */
    .score-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .score-chip {
      font-family: var(--font-pixel);
      font-size: 7px;
      padding: 8px 14px;
      letter-spacing: 1px;
      color: var(--cyan);
    }
    .score-chip--yellow { color: var(--yellow); }


    /* ===== MAP LAYOUT ===== */
    .map-layout {
      display: grid;
      grid-template-columns: 1fr 196px;
      gap: 20px;
      align-items: start;
    }

    /* ===== MAP CANVAS ===== */
    .map-canvas {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 280px;
    }
    /* CRITICAL: pointer-events:none lets clicks pass through to rows/nodes below */
    .map-svg {
      position: absolute;
      inset: 0;
      overflow: visible;
      z-index: 10;
      fill: none;
      pointer-events: none;
    }

    /* ===== ROWS ===== */
    .map-row {
      min-height: 80px;
      border: 2px dashed var(--grey);
      padding: 10px 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      position: relative;
      z-index: 2;
      transition: border-color 0.1s, box-shadow 0.1s;
    }
    .map-row.accepting { border-color: rgba(0,255,245,0.35); }
    .map-row.drag-over {
      border-color: var(--cyan);
      box-shadow: inset 0 0 18px rgba(0,255,245,0.12);
    }
    .row-label {
      font-family: var(--font-pixel);
      font-size: 7px;
      color: var(--grey);
      min-width: 20px;
      user-select: none;
      align-self: center;
    }
    .row-nodes {
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      flex: 1;
      flex-wrap: wrap;
    }

    /* ===== NODE ===== */
    .map-node {
      position: relative;
      padding: 10px 18px 10px 14px;
      border: 2px solid var(--cyan);
      background: var(--bg-card);
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      color: var(--white);
      transition: border-color 0.12s, box-shadow 0.12s, opacity 0.12s;
    }
    .map-node:hover { border-color: var(--white); }
    .map-node.selected {
      border-color: var(--yellow);
      box-shadow: 0 0 14px rgba(255,230,0,0.5);
    }
    .map-node.correct {
      border-color: var(--green);
      box-shadow: 0 0 10px rgba(57,255,20,0.4);
    }
    .map-node.wrong {
      border-color: var(--orange);
      box-shadow: 0 0 10px rgba(255,107,0,0.4);
    }
    .map-node.shake { animation: node-shake 0.3s ease; }
    @keyframes node-shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-5px); }
      75%      { transform: translateX(5px); }
    }
    .map-node.dragging { opacity: 0.35; }

    /* Remove button on node hover */
    .node-remove {
      position: absolute;
      top: -7px; right: -7px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--orange);
      color: var(--bg-dark);
      font-size: 9px;
      line-height: 16px;
      text-align: center;
      cursor: pointer;
      display: none;
      z-index: 6;
      font-weight: bold;
    }
    .map-node:not(.correct):not(.wrong):hover .node-remove { display: block; }

    /* Connection dots */
    .node-dot {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--cyan);
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      pointer-events: none;
      transition: background 0.12s, box-shadow 0.12s, transform 0.12s;
    }
    .node-dot--top    { top: -6px; }
    .node-dot--bottom { bottom: -6px; }
    .map-node.selected .node-dot {
      background: var(--yellow);
      box-shadow: 0 0 8px rgba(255,230,0,0.8);
      transform: translateX(-50%) scale(1.3);
    }
    .map-node.correct .node-dot { background: var(--green); }
    .map-node.wrong   .node-dot { background: var(--orange); }

    /* Connection count badge */
    .node-conn-count {
      position: absolute;
      top: -7px; left: -7px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--bg-card2);
      border: 1px solid var(--grey);
      color: var(--grey);
      font-size: 9px;
      line-height: 16px;
      text-align: center;
      font-family: monospace;
      pointer-events: none;
      display: none;
    }
    .node-conn-count.has-conn {
      display: block;
      color: var(--cyan);
      border-color: var(--cyan);
    }

    /* ===== SVG LINES ===== */
    .map-line {
      stroke: var(--cyan);
      stroke-width: 2;
      stroke-dasharray: 6 3;
      fill: none;
      opacity: 0.85;
    }
    .map-line.correct { stroke: var(--green);  stroke-dasharray: none; opacity: 1; }
    .map-line.wrong   { stroke: var(--orange); stroke-dasharray: none; opacity: 1; }

    /* ===== CONNECTION GROUP (hover to show delete, click line to delete) ===== */
    .conn-group { cursor: pointer; }
    .conn-hit   { stroke: transparent; stroke-width: 20; pointer-events: stroke; fill: none; }
    .conn-del-group { visibility: hidden; pointer-events: none; }
    .conn-group:hover .conn-del-group { visibility: visible; }
    .conn-del-bg { fill: var(--bg-dark); stroke: var(--orange); stroke-width: 1.5; }
    .conn-del-txt {
      fill: var(--orange); font-size: 11px;
      text-anchor: middle; dominant-baseline: central;
    }
    /* Highlight connected nodes on hover */
    .map-node.highlight {
      border-color: var(--magenta) !important;
      box-shadow: 0 0 10px rgba(255,0,204,0.45) !important;
    }

    /* ===== KEYWORD POOL ===== */
    .kw-pool-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .kw-pool-header {
      font-family: var(--font-pixel);
      font-size: 7px;
      color: var(--magenta);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .kw-pool-count {
      color: var(--grey);
      font-size: 6px;
    }
    .kw-pool {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 60px;
      padding: 10px;
      border: 2px solid var(--grey);
      transition: border-color 0.1s;
    }
    .kw-pool.drag-over { border-color: var(--magenta); background: rgba(255,0,170,0.05); }
    .kw-chip {
      padding: 9px 12px;
      border: 2px solid var(--magenta);
      background: var(--bg-card2);
      cursor: grab;
      font-size: 12px;
      color: var(--white);
      transition: border-color 0.1s, transform 0.1s;
    }
    .kw-chip:hover { border-color: var(--white); transform: translateX(2px); }
    .kw-chip:active { cursor: grabbing; }
    .kw-chip.dragging { opacity: 0.35; }
    .pool-empty {
      font-family: var(--font-pixel);
      font-size: 6px;
      color: var(--green);
      letter-spacing: 1px;
      text-align: center;
      padding: 8px 0;
    }

    /* ===== ACTION BAR ===== */
    .action-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }
    .action-btn {
      font-family: var(--font-pixel);
      font-size: 9px;
      padding: 14px 22px;
      min-height: 44px;
      border: 2px solid;
      background: transparent;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.1s steps(1);
    }
    .action-btn--check     { color: var(--green);  border-color: var(--green); }
    .action-btn--check:hover { background: var(--green); color: var(--bg-dark); }
    .action-btn--reset     { color: var(--grey);   border-color: var(--grey); }
    .action-btn--reset:hover { background: var(--grey); color: var(--bg-dark); }
    .action-btn--play-again { color: var(--cyan);  border-color: var(--cyan); }
    .action-btn--play-again:hover { background: var(--cyan); color: var(--bg-dark); }

    /* ===== RESULT BANNER ===== */
    .result-banner {
      display: none;
      text-align: center;
      margin-top: 24px;
      padding: 20px 24px;
      border: 3px solid var(--green);
      box-shadow: 0 0 24px rgba(57,255,20,0.3);
    }
    .result-banner__score {
      font-family: var(--font-pixel);
      font-size: 10px;
      color: var(--green);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
    .result-banner__msg {
      font-family: var(--font-vi-body);
      font-size: 16px;
      color: var(--white);
    }

    /* ===== TOAST NOTIFICATIONS ===== */
    .toast {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--bg-card);
      border: 2px solid var(--orange);
      color: var(--orange);
      font-family: var(--font-pixel);
      font-size: 8px;
      padding: 12px 22px;
      letter-spacing: 1px;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 500;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .map-layout { grid-template-columns: 1fr; }
      .kw-pool-section { order: -1; }
      .kw-pool { flex-direction: row; flex-wrap: wrap; }
      .kw-chip { flex: 0 0 auto; }
      .admin-canvas-layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .game-page { padding: 16px 1rem 40px; }
      .map-node { padding: 8px 10px; font-size: 12px; }
      .action-bar { gap: 8px; }
      .admin-panel__inner { padding: 20px 14px; }
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <a href="../../index.html" class="navbar__logo">◈ PIXELVERSE</a>
    <ul class="navbar__links">
      <li><a href="../../index.html" title="Home">🏠</a></li>
      <li>
        <button class="navbar__grid-btn" id="gamesBtn" title="Games">
          <span class="navbar__grid-btn__dots">
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
          </span>
        </button>
      </li>
      <li><a class="navbar__admin-btn" href="../admin/">⚙</a></li>
    </ul>
  </nav>

  <!-- ===== GAMES POPUP ===== -->
  <div class="navbar__games-popup" id="gamesPopup">
    <div class="navbar__games-list">
      <a href="../pros-cons/index.html" class="navbar__game-item">🐺</a>
      <div class="navbar__game-item navbar__game-item--active" id="navGameName">🐙</div>
      <a href="../matching/index.html" class="navbar__game-item">🐿️</a>
      <a href="../file-naming/index.html" class="navbar__game-item">🐟</a>
    </div>
  </div>

  <!-- ===== GAME PAGE ===== -->
  <main class="game-page">

    <div class="page-header">
      <a href="../../index.html" class="page-header__back">◀ BACK TO HOME</a>
      <h1 id="gameTitle">🐙 Sơ đồ Tư Duy</h1>
      <p class="page-header__sub">Kéo thả từ khóa vào đúng hàng · Ấn 2 ô khác hàng để nối · Ấn lại để bỏ nối</p>
    </div>

    <div class="score-bar">
      <div class="score-chip pixel-box" id="progressDisplay">0 / 0 PLACED</div>
      <div class="score-chip score-chip--yellow pixel-box pixel-box--yellow" id="scoreDisplay">SCORE: —</div>
    </div>

    <div class="map-layout">
      <div class="map-canvas" id="mapCanvas">
        <svg class="map-svg" id="mapSvg"></svg>
      </div>
      <div class="kw-pool-section">
        <div class="kw-pool-header">
          ▸ KEYWORDS
          <span class="kw-pool-count" id="poolCount"></span>
        </div>
        <div class="kw-pool" id="kwPool"></div>
      </div>
    </div>

    <div class="action-bar">
      <button class="action-btn action-btn--check"      id="checkBtn"     onclick="checkAnswers()">✓ CHECK</button>
      <button class="action-btn action-btn--play-again" id="playAgainBtn" onclick="continueGame()" style="display:none">▶ CONTINUE</button>
    </div>

    <div class="result-banner" id="resultBanner">
      <div class="result-banner__score" id="resultScore"></div>
      <div class="result-banner__msg"   id="resultMsg"></div>
    </div>

  </main>

  <script>
    // ================================================================
    //  GAME EMOJI
    // ================================================================
    const GAME_EMOJI = '🐙';

    // ================================================================
    //  UTILITIES
    // ================================================================
    const SEP = '|';
    function ck(a, b)   { return a < b ? `${a}${SEP}${b}` : `${b}${SEP}${a}`; }
    function cpair(k)   { return k.split(SEP); }
    function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ================================================================
    //  GAMES POPUP
    // ================================================================
    const gamesBtn   = document.getElementById('gamesBtn');
    const gamesPopup = document.getElementById('gamesPopup');
    gamesBtn.addEventListener('click', e => {
      e.stopPropagation(); SFX.click(); gamesPopup.classList.toggle('open');
      if (gamesPopup.classList.contains('open')) {
        const r = gamesBtn.getBoundingClientRect();
        gamesPopup.style.left = (r.left + r.width / 2) + 'px';
        gamesPopup.style.top  = (r.bottom + 6) + 'px';
      }
    });
    document.addEventListener('click', () => gamesPopup.classList.remove('open'));

    // ================================================================
    //  TOAST
    // ================================================================
    function showToast(msg) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3200);
    }

    // ================================================================
    //  DATA LOADING
    // ================================================================
    let _cachedJson = null;
    async function loadGameData() {
      const saved = localStorage.getItem('mindMap');
      if (saved) { try { return JSON.parse(saved)[0]; } catch(e) {} }
      if (!_cachedJson) {
        try { const r = await fetch('../../admin/admin_mind_map.json'); if (r.ok) _cachedJson = await r.json(); } catch(e) {}
      }
      if (_cachedJson) return _cachedJson[0];
      return (window.MIND_MAP_DATA || [])[0] || null;
    }

    // ================================================================
    //  GAME STATE
    // ================================================================
    let gameData       = null;
    let placements     = {};          // { kid: rowIdx }
    let connections    = new Set();   // Set<"k1|k2">
    let rowOrder       = {};          // { rowIdx: [kid, ...] } for display order
    let poolOrder      = [];          // shuffled kid[] for pool display
    let checked        = false;
    let selectedNodeId = null;
    let dragKid        = null;

    // ================================================================
    //  GAME: BUILD
    // ================================================================
    function buildGame() {
      checked = false;
      placements = {};
      connections = new Set();
      rowOrder = {};
      selectedNodeId = null;
      poolOrder = shuffle(gameData.keywords.map(kw => kw.id));
      renderGameRows();
      renderGamePool();
      refreshGameConnections();
      updateProgress();
      document.getElementById('resultBanner').style.display = 'none';
      document.getElementById('playAgainBtn').style.display = 'none';
      document.getElementById('checkBtn').style.display = '';
      document.getElementById('scoreDisplay').textContent = 'SCORE: —';
    }


    // ================================================================
    //  GAME: ROWS
    // ================================================================
    function renderGameRows() {
      const canvas = document.getElementById('mapCanvas');
      canvas.querySelectorAll('.map-row').forEach(r => r.remove());
      for (let i = 0; i < gameData.rowCount; i++) canvas.appendChild(makeRow(i, false));
    }

    function makeRow(idx, isAdmin) {
      const pfx = isAdmin ? 'admin' : 'game';
      const row = document.createElement('div');
      row.className = 'map-row';
      row.dataset.row = idx;
      row.id = `${pfx}-row-${idx}`;

      const lbl = document.createElement('span');
      lbl.className = 'row-label';
      lbl.textContent = String(idx + 1).padStart(2, '0');

      const nodes = document.createElement('div');
      nodes.className = 'row-nodes';
      nodes.id = `${pfx}-nodes-${idx}`;

      row.appendChild(lbl);
      row.appendChild(nodes);

      row.addEventListener('dragover', e => {
        const dkid = isAdmin ? adminDragKid : dragKid;
        if (!dkid || (!isAdmin && checked)) return;
        e.preventDefault();
        row.classList.add('drag-over');
      });
      row.addEventListener('dragleave', e => {
        if (!row.contains(e.relatedTarget)) row.classList.remove('drag-over');
      });
      row.addEventListener('drop', e => {
        e.preventDefault();
        row.classList.remove('drag-over');
        const dkid = isAdmin ? adminDragKid : dragKid;
        if (!dkid || (!isAdmin && checked)) return;
        if (isAdmin) {
          adminPlacements[dkid] = idx;
          adminDragKid = null;
          // Remove connections where both endpoints are now in the same row
          adminConnections.forEach(key => {
            const [a, b] = cpair(key);
            if (adminPlacements[a] !== undefined && adminPlacements[b] !== undefined
                && adminPlacements[a] === adminPlacements[b]) adminConnections.delete(key);
          });
          renderAdminPool(); renderAdminPlaced(); refreshAdminConnections();
        } else {
          // Remove from old rowOrder
          const oldRow = placements[dkid];
          if (oldRow !== undefined && rowOrder[oldRow]) {
            rowOrder[oldRow] = rowOrder[oldRow].filter(k => k !== dkid);
          }
          // Add to new row
          placements[dkid] = idx;
          if (!rowOrder[idx]) rowOrder[idx] = [];
          if (!rowOrder[idx].includes(dkid)) rowOrder[idx].push(dkid);
          dragKid = null;
          SFX.place();
          // Remove connections where both endpoints are now in the same row
          connections.forEach(key => {
            const [a, b] = cpair(key);
            if (placements[a] !== undefined && placements[b] !== undefined
                && placements[a] === placements[b]) connections.delete(key);
          });
          renderGamePool(); renderGamePlaced(); refreshGameConnections(); updateProgress();
        }
      });
      return row;
    }

    // ================================================================
    //  GAME: POOL
    // ================================================================
    function renderGamePool() {
      const pool = document.getElementById('kwPool');
      pool.innerHTML = '';
      const placed = new Set(Object.keys(placements));
      const remaining = poolOrder.filter(id => !placed.has(id));
      remaining.forEach(id => {
        const kw = gameData.keywords.find(k => k.id === id);
        if (kw) pool.appendChild(makeChip(kw, false));
      });
      if (remaining.length === 0) {
        const e = document.createElement('div');
        e.className = 'pool-empty';
        e.textContent = 'ALL PLACED!';
        pool.appendChild(e);
      }
      const cnt = document.getElementById('poolCount');
      if (cnt) cnt.textContent = remaining.length > 0 ? `(${remaining.length})` : '';
    }

    function makeChip(kw, isAdmin) {
      const div = document.createElement('div');
      div.className = 'kw-chip font-vi';
      div.textContent = kw.text;
      div.draggable = true;
      div.dataset.kid = kw.id;

      const rowSel = isAdmin ? '.admin-map-canvas .map-row' : '#mapCanvas .map-row';

      div.addEventListener('dragstart', e => {
        if (!isAdmin && checked) { e.preventDefault(); return; }
        if (isAdmin) adminDragKid = kw.id; else dragKid = kw.id;
        if (!isAdmin) SFX.select();
        div.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        document.querySelectorAll(rowSel).forEach(r => r.classList.add('accepting'));
      });
      div.addEventListener('dragend', () => {
        div.classList.remove('dragging');
        document.querySelectorAll(rowSel).forEach(r => r.classList.remove('accepting', 'drag-over'));
        if (isAdmin) adminDragKid = null; else dragKid = null;
      });

      // Touch drag
      div.addEventListener('touchstart', () => {
        if (!isAdmin && checked) return;
        if (isAdmin) adminDragKid = kw.id; else dragKid = kw.id;
        if (!isAdmin) SFX.select();
        document.querySelectorAll(rowSel).forEach(r => r.classList.add('accepting'));
      }, { passive: true });
      div.addEventListener('touchend', e => {
        document.querySelectorAll(rowSel).forEach(r => r.classList.remove('accepting', 'drag-over'));
        const touch = e.changedTouches[0];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        const rowEl = el?.closest('.map-row');
        if (rowEl) {
          const ri = parseInt(rowEl.dataset.row);
          if (isAdmin) {
            adminPlacements[kw.id] = ri;
            adminDragKid = null;
            renderAdminPool(); renderAdminPlaced(); refreshAdminConnections();
          } else {
            const oldRow = placements[kw.id];
            if (oldRow !== undefined && rowOrder[oldRow]) rowOrder[oldRow] = rowOrder[oldRow].filter(k => k !== kw.id);
            placements[kw.id] = ri;
            if (!rowOrder[ri]) rowOrder[ri] = [];
            if (!rowOrder[ri].includes(kw.id)) rowOrder[ri].push(kw.id);
            dragKid = null;
            renderGamePool(); renderGamePlaced(); refreshGameConnections(); updateProgress();
          }
        } else {
          if (isAdmin) adminDragKid = null; else dragKid = null;
        }
      });

      return div;
    }

    // Pool: drop node back → unplace
    const kwPool = document.getElementById('kwPool');
    kwPool.addEventListener('dragover', e => { if (dragKid && !checked) e.preventDefault(); kwPool.classList.toggle('drag-over', !!dragKid); });
    kwPool.addEventListener('dragleave', () => kwPool.classList.remove('drag-over'));
    kwPool.addEventListener('drop', e => {
      e.preventDefault();
      kwPool.classList.remove('drag-over');
      if (!dragKid || checked) return;
      unplaceNode(dragKid);
      dragKid = null;
    });

    function unplaceNode(kid) {
      connections.forEach(key => { const [a, b] = cpair(key); if (a === kid || b === kid) connections.delete(key); });
      const row = placements[kid];
      if (row !== undefined && rowOrder[row]) rowOrder[row] = rowOrder[row].filter(k => k !== kid);
      delete placements[kid];
      renderGamePool(); renderGamePlaced(); refreshGameConnections(); updateProgress();
    }

    // ================================================================
    //  GAME: PLACED NODES
    // ================================================================
    function renderGamePlaced() {
      for (let i = 0; i < gameData.rowCount; i++) {
        const c = document.getElementById(`game-nodes-${i}`);
        if (c) c.innerHTML = '';
      }
      for (let row = 0; row < gameData.rowCount; row++) {
        const inRow = gameData.keywords.filter(kw => placements[kw.id] === row);
        const order = rowOrder[row] || [];
        const sorted = [
          ...order.map(id => inRow.find(kw => kw.id === id)).filter(Boolean),
          ...inRow.filter(kw => !order.includes(kw.id))
        ];
        const c = document.getElementById(`game-nodes-${row}`);
        if (c) sorted.forEach(kw => c.appendChild(makeNode(kw, false)));
      }
    }

    function makeNode(kw, isAdmin) {
      const div = document.createElement('div');
      div.className = 'map-node font-vi';
      div.dataset.kid = kw.id;
      div.draggable = !checked;
      div.innerHTML = `
        <div class="node-dot node-dot--top"></div>
        <span class="node-conn-count" title="connections"></span>
        <span>${escHtml(kw.text)}</span>
        <div class="node-dot node-dot--bottom"></div>
        ${!isAdmin ? '<span class="node-remove" title="Remove from canvas">✕</span>' : ''}
      `;

      // Remove button
      if (!isAdmin) {
        div.querySelector('.node-remove')?.addEventListener('click', e => {
          e.stopPropagation();
          if (checked) return;
          unplaceNode(kw.id);
        });
      }

      // Click to connect
      div.addEventListener('click', e => {
        e.stopPropagation();
        if (isAdmin) handleAdminNodeClick(kw.id);
        else handleGameNodeClick(kw.id);
      });

      // Hover to highlight connected nodes
      if (!isAdmin) {
        div.addEventListener('mouseenter', () => mmHighlightConn(kw.id));
        div.addEventListener('mouseleave', mmClearHighlight);
      }

      const rowSel = isAdmin ? '.admin-map-canvas .map-row' : '#mapCanvas .map-row';

      // Drag to different row
      div.addEventListener('dragstart', e => {
        e.stopPropagation();
        if (!isAdmin && checked) { e.preventDefault(); return; }
        if (isAdmin) adminDragKid = kw.id; else dragKid = kw.id;
        if (!isAdmin) SFX.select();
        div.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        document.querySelectorAll(rowSel).forEach(r => r.classList.add('accepting'));
      });

      div.addEventListener('dragend', () => {
        div.classList.remove('dragging');
        document.querySelectorAll(rowSel).forEach(r => r.classList.remove('accepting', 'drag-over'));
        if (isAdmin) adminDragKid = null; else dragKid = null;
      });

      return div;
    }

    // Deselect when clicking empty canvas
    document.getElementById('mapCanvas').addEventListener('click', () => clearGameSelection());

    // ESC to deselect
    document.addEventListener('keydown', e => { if (e.key === 'Escape') clearGameSelection(); });

    // ================================================================
    //  GAME: CLICK-TO-CONNECT
    // ================================================================
    function handleGameNodeClick(kid) {
      if (checked) return;
      if (selectedNodeId === null) {
        // Select
        selectedNodeId = kid;
        document.querySelectorAll('#mapCanvas .map-node').forEach(n => n.classList.remove('selected'));
        document.querySelector(`#mapCanvas .map-node[data-kid="${kid}"]`)?.classList.add('selected');
        SFX.select();
      } else if (selectedNodeId === kid) {
        clearGameSelection();
      } else {
        const rowA = placements[selectedNodeId], rowB = placements[kid];
        if (rowA === undefined || rowB === undefined) { clearGameSelection(); return; }
        if (rowA === rowB) {
          SFX.wrong();
          const n = document.querySelector(`#mapCanvas .map-node[data-kid="${kid}"]`);
          if (n) { n.classList.add('shake'); setTimeout(() => n.classList.remove('shake'), 400); }
          setTimeout(() => clearGameSelection(), 600);
        } else {
          const key = ck(selectedNodeId, kid);
          if (connections.has(key)) { connections.delete(key); SFX.click(); }
          else { connections.add(key); SFX.place(); }
          refreshGameConnections();
          updateConnCountBadges();
          clearGameSelection();
        }
      }
    }

    function clearGameSelection() {
      selectedNodeId = null;
      document.querySelectorAll('#mapCanvas .map-node').forEach(n => n.classList.remove('selected'));
    }

    // Update connection count badges on all nodes
    function updateConnCountBadges() {
      const connCount = {};
      connections.forEach(key => {
        const [a, b] = cpair(key);
        connCount[a] = (connCount[a] || 0) + 1;
        connCount[b] = (connCount[b] || 0) + 1;
      });
      document.querySelectorAll('#mapCanvas .map-node').forEach(node => {
        const kid = node.dataset.kid;
        const badge = node.querySelector('.node-conn-count');
        if (!badge) return;
        const cnt = connCount[kid] || 0;
        badge.textContent = cnt;
        badge.classList.toggle('has-conn', cnt > 0);
      });
    }

    // ================================================================
    //  SVG CONNECTION DRAWING
    // ================================================================
    function getDotPos(kid, dotType, canvasEl, svgEl) {
      const nodeEl = canvasEl.querySelector(`.map-node[data-kid="${kid}"]`);
      if (!nodeEl) return null;
      const dotEl  = nodeEl.querySelector(`.node-dot--${dotType}`);
      if (!dotEl)  return null;
      const sr = svgEl.getBoundingClientRect();
      const dr = dotEl.getBoundingClientRect();
      return { x: dr.left + dr.width / 2 - sr.left, y: dr.top + dr.height / 2 - sr.top };
    }

    function drawLines(conns, plcmts, canvasEl, svgEl, allowDelete, onDelete, correctSet) {
      svgEl.innerHTML = '';
      const ns = 'http://www.w3.org/2000/svg';

      conns.forEach(key => {
        const [kA, kB] = cpair(key);
        const rowA = plcmts[kA], rowB = plcmts[kB];
        if (rowA === undefined || rowB === undefined) return;

        const upper = rowA <= rowB ? kA : kB;
        const lower = rowA <= rowB ? kB : kA;
        const p1 = getDotPos(upper, 'bottom', canvasEl, svgEl);
        const p2 = getDotPos(lower, 'top',    canvasEl, svgEl);
        if (!p1 || !p2) return;

        const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;

        let lineCls = 'map-line';
        if (correctSet) lineCls += correctSet.has(key) ? ' correct' : ' wrong';

        const g = document.createElementNS(ns, 'g');
        g.setAttribute('class', allowDelete ? 'conn-group' : '');

        // Thick invisible hit area (clickable)
        const hit = document.createElementNS(ns, 'line');
        hit.setAttribute('x1', p1.x); hit.setAttribute('y1', p1.y);
        hit.setAttribute('x2', p2.x); hit.setAttribute('y2', p2.y);
        hit.setAttribute('class', 'conn-hit');

        // Visible styled line
        const line = document.createElementNS(ns, 'line');
        line.setAttribute('x1', p1.x); line.setAttribute('y1', p1.y);
        line.setAttribute('x2', p2.x); line.setAttribute('y2', p2.y);
        line.setAttribute('class', lineCls);
        line.style.pointerEvents = 'none';

        g.appendChild(hit);
        g.appendChild(line);

        if (allowDelete) {
          // Delete indicator — shown on group hover
          const dg = document.createElementNS(ns, 'g');
          dg.setAttribute('class', 'conn-del-group');
          const bg = document.createElementNS(ns, 'rect');
          bg.setAttribute('x', mx - 9); bg.setAttribute('y', my - 9);
          bg.setAttribute('width', 18); bg.setAttribute('height', 18);
          bg.setAttribute('rx', 3); bg.setAttribute('class', 'conn-del-bg');
          const txt = document.createElementNS(ns, 'text');
          txt.setAttribute('x', mx); txt.setAttribute('y', my);
          txt.setAttribute('class', 'conn-del-txt'); txt.textContent = '✕';
          dg.appendChild(bg); dg.appendChild(txt);
          g.appendChild(dg);

          g.addEventListener('click', e => { e.stopPropagation(); onDelete(key); });
        }

        svgEl.appendChild(g);
      });
    }

    function refreshGameConnections(correctSet) {
      const canvas = document.getElementById('mapCanvas');
      const svg    = document.getElementById('mapSvg');
      drawLines(connections, placements, canvas, svg,
        !checked,
        key => { connections.delete(key); refreshGameConnections(); updateProgress(); },
        correctSet || null);
    }

    function mmHighlightConn(kid) {
      document.querySelectorAll('#mapCanvas .map-node.highlight').forEach(n => n.classList.remove('highlight'));
      connections.forEach(key => {
        if (key.split('|').includes(kid)) {
          const partner = key.split('|').find(k => k !== kid);
          document.querySelector(`#mapCanvas .map-node[data-kid="${partner}"]`)?.classList.add('highlight');
        }
      });
    }
    function mmClearHighlight() {
      document.querySelectorAll('#mapCanvas .map-node.highlight').forEach(n => n.classList.remove('highlight'));
    }

    window.addEventListener('resize', () => {
      refreshGameConnections();
    });

    // ================================================================
    //  GAME: PROGRESS & CHECK
    // ================================================================
    function updateProgress() {
      const placed = Object.keys(placements).length;
      const total  = gameData ? gameData.keywords.length : 0;
      document.getElementById('progressDisplay').textContent = `${placed} / ${total} PLACED`;
      updateConnCountBadges();
    }

    function checkAnswers() {
      if (checked) return;

      // Validate: all placed
      const placedKids = Object.keys(placements);
      if (placedKids.length < gameData.keywords.length) {
        const missing = gameData.keywords.length - placedKids.length;
        showToast(`Hãy đặt tất cả từ khóa trước! (còn ${missing} từ)`);
        return;
      }

      // Validate: all nodes connected
      const connectedSet = new Set();
      connections.forEach(key => { const [a, b] = cpair(key); connectedSet.add(a); connectedSet.add(b); });
      const unconnected = gameData.keywords.filter(kw => !connectedSet.has(kw.id));
      if (unconnected.length > 0) {
        showToast(`${unconnected.length} nút chưa được kết nối!`);
        return;
      }

      checked = true;

      // Score
      const correctRowMap = {};
      gameData.keywords.forEach(kw => { correctRowMap[kw.id] = kw.correctRow; });
      const correctConnSet = new Set(gameData.connections.map(c => ck(c.from, c.to)));

      let correctPl = 0, correctCo = 0;
      const totalPl = gameData.keywords.length;
      const totalCo = gameData.connections.length;

      gameData.keywords.forEach(kw => {
        const isOk = placements[kw.id] === correctRowMap[kw.id];
        if (isOk) correctPl++;
        const nodeEl = document.querySelector(`#mapCanvas .map-node[data-kid="${kw.id}"]`);
        if (nodeEl) nodeEl.classList.add(isOk ? 'correct' : 'wrong');
      });
      connections.forEach(key => { if (correctConnSet.has(key)) correctCo++; });

      refreshGameConnections(correctConnSet);

      const total   = totalPl + totalCo;
      const correct = correctPl + correctCo;
      const pct = total === 0 ? 100 : Math.round(correct / total * 100);

      SFX[pct === 100 ? 'correct' : 'wrong']();
      document.getElementById('scoreDisplay').textContent = `SCORE: ${correct}/${total}`;
      document.getElementById('progressDisplay').textContent = `${correct} / ${total} CORRECT`;

      const msgs = [
        [100, '🏆 Hoàn hảo! Sơ đồ tư duy xuất sắc!'],
        [70,  '🎉 Rất tốt! Một vài kết nối cần xem lại.'],
        [40,  '👍 Khá ổn! Hãy kiểm tra hàng và liên kết.'],
        [0,   '💪 Chưa đạt! Xem lại cấu trúc nhé.'],
      ];
      const msg = msgs.find(([min]) => pct >= min)[1];

      document.getElementById('resultScore').textContent = `${correct} / ${total} CORRECT (${pct}%)`;
      document.getElementById('resultMsg').textContent   = msg;
      document.getElementById('resultBanner').style.display = 'block';
      document.getElementById('playAgainBtn').style.display = '';
      document.getElementById('checkBtn').style.display = 'none';
      autoGroupSiblings();
      clearGameSelection();
    }

    function autoGroupSiblings() {
      // Group nodes in each row so siblings sharing the same parent are adjacent.
      const childrenOf = {};
      connections.forEach(key => {
        const [a, b] = cpair(key);
        const rowA = placements[a], rowB = placements[b];
        if (rowA !== undefined && rowB !== undefined) {
          if (rowA < rowB) {
            if (!childrenOf[a]) childrenOf[a] = [];
            childrenOf[a].push(b);
          } else if (rowB < rowA) {
            if (!childrenOf[b]) childrenOf[b] = [];
            childrenOf[b].push(a);
          }
        }
      });
      const rows = Object.values(placements);
      if (!rows.length) return;
      const maxRow = Math.max(...rows);
      for (let row = 1; row <= maxRow; row++) {
        const rowKids = (rowOrder[row] || []).filter(id => placements[id] === row);
        if (rowKids.length < 2) continue;
        const parentOrder = (rowOrder[row - 1] || []);
        rowKids.sort((a, b) => {
          const pA = parentOrder.findIndex(p => (childrenOf[p] || []).includes(a));
          const pB = parentOrder.findIndex(p => (childrenOf[p] || []).includes(b));
          return (pA === -1 ? 9999 : pA) - (pB === -1 ? 9999 : pB);
        });
        rowOrder[row] = rowKids;
      }
      renderGamePlaced();

      // Re-apply correct/wrong classes lost when renderGamePlaced rebuilt the DOM
      const correctRowMap = {};
      gameData.keywords.forEach(kw => { correctRowMap[kw.id] = kw.correctRow; });
      gameData.keywords.forEach(kw => {
        const isOk = placements[kw.id] === correctRowMap[kw.id];
        const nodeEl = document.querySelector(`#mapCanvas .map-node[data-kid="${kw.id}"]`);
        if (nodeEl) nodeEl.classList.add(isOk ? 'correct' : 'wrong');
      });
      // Re-render colored connection lines
      const correctConnSet = new Set(gameData.connections.map(c => ck(c.from, c.to)));
      refreshGameConnections(correctConnSet);
    }

    function continueGame() {
      checked = false;
      document.querySelectorAll('#mapCanvas .map-node').forEach(n => n.classList.remove('correct', 'wrong'));
      refreshGameConnections();
      document.getElementById('resultBanner').style.display = 'none';
      document.getElementById('checkBtn').style.display = '';
      document.getElementById('playAgainBtn').style.display = 'none';
      updateProgress();
    }

    async function playAgain() { gameData = await loadGameData(); buildGame(); }

    // ================================================================
    //  INIT
    // ================================================================
    async function initGame() {
      gameData = await loadGameData();
      if (!gameData) {
        document.getElementById('progressDisplay').textContent = 'No data found';
        return;
      }

      // Apply emoji everywhere
      document.title = `${GAME_EMOJI} — PIXELVERSE`;
      document.getElementById('gameTitle').textContent = `${GAME_EMOJI} Sơ đồ Tư Duy`;
      document.getElementById('navGameName').textContent = GAME_EMOJI;

      buildGame();

    }

    initGame();
  </script>

</body>
