<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />

  <title>🦊 — PIXELVERSE</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">
  <link rel="stylesheet" href="../../css/style.css" />
  <script src="../../js/sfx.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/games-popup.js"></script>
  <script src="../../js/game-visibility.js" data-json="../../data/admin_content.json"></script>
  <style>
    .game-page { padding: 32px 1.5rem 80px; max-width: 800px; }

    /* ===== PAGE HEADER ===== */
    .page-header { margin-bottom: 24px; text-align: center; }
    .page-header__title {
      font-family: var(--font-pixel);
      font-size: clamp(14px, 3vw, 20px);
      color: var(--orange);
      letter-spacing: 3px; margin: 12px 0 10px;
    }
    .mece-explanation {
      font-family: var(--font-vi-body);
      font-size: 13px; color: rgba(232,232,255,0.75);
      line-height: 1.6; max-width: 600px; margin: 0 auto;
    }
    .mece-explanation strong { color: var(--orange); }

    /* (score-bar & score-chip in style.css) */

    /* ===== QUESTION CARD ===== */
    .question-card {
      background: var(--bg-card);
      border: 2px solid var(--grey);
      padding: 20px 24px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .question-card.correct { border-color: var(--green); }
    .question-card.wrong   { border-color: var(--magenta); }

    .question-card__header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 8px;
    }
    .question-card__num {
      font-family: var(--font-pixel);
      font-size: 9px; color: var(--orange);
      min-width: 28px;
    }
    .question-card__topic {
      font-family: var(--font-vi-heading);
      font-size: 16px; font-weight: 700; color: var(--white);
    }
    .question-card__concept {
      font-family: var(--font-vi-body);
      font-size: 12px; color: rgba(232,232,255,0.4);
      font-style: italic; margin-bottom: 12px;
      padding-left: 40px;
    }

    /* ===== CATEGORIES ===== */
    .categories {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 16px; padding-left: 40px;
    }
    .category-chip {
      font-family: var(--font-vi-body);
      font-size: 12px; color: var(--white);
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      background: var(--bg-card2);
      position: relative;
    }
    .category-chip[title] { cursor: help; }

    /* ===== ANSWER BUTTONS ===== */
    .answer-group {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding-left: 40px;
    }
    .answer-btn {
      font-family: var(--font-vi-body);
      font-size: 12px; font-weight: 600;
      padding: 8px 14px;
      border: 2px solid var(--grey);
      background: transparent;
      color: var(--grey);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }
    .answer-btn:hover { border-color: var(--white); color: var(--white); }
    .answer-btn.selected {
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 8px rgba(0,255,245,0.2);
      background: rgba(0,255,245,0.05);
    }
    .answer-btn.result-correct {
      border-color: var(--green) !important;
      color: var(--green) !important;
      box-shadow: 0 0 8px rgba(57,255,20,0.3);
      background: rgba(57,255,20,0.08);
    }
    .answer-btn.result-wrong {
      border-color: var(--magenta) !important;
      color: var(--magenta) !important;
      box-shadow: 0 0 8px rgba(255,0,204,0.3);
      background: rgba(255,0,204,0.08);
    }

    /* (action-btn & result-banner in style.css) */

    /* ===== EMPTY STATE ===== */
    .mece-empty {
      text-align: center; padding: 60px 20px;
      color: var(--grey); font-size: 11px; letter-spacing: 1px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .game-page { padding: 16px 1rem 60px; }
      .question-card { padding: 16px; }
      .categories, .answer-group, .question-card__concept { padding-left: 0; }
      .answer-btn { font-size: 10px; padding: 6px 10px; }
      .score-bar { gap: 12px; }
    }
    @media (max-width: 400px) {
      .answer-btn { font-size: 9px; padding: 6px 8px; }
      .category-chip { font-size: 11px; padding: 5px 10px; }
      .question-card__topic { font-size: 14px; }
      .result-banner { padding: 16px 14px; }
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="../../index.html" class="navbar__logo">◈ PIXELVERSE</a>
    <ul class="navbar__links">
      <li><a href="../../index.html" title="Home">◈</a></li>
      <li>
        <button class="navbar__grid-btn" id="gamesBtn" title="Games">
          <span class="navbar__grid-btn__dots">
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
            <span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span><span class="navbar__grid-dot"></span>
          </span>
        </button>
      </li>
      <li><a class="navbar__admin-btn" href="../admin/">⚙</a></li>
    </ul>
  </nav>

  <div class="navbar__games-popup" id="gamesPopup">
    <div class="navbar__games-list">
      <a href="../pros-cons/index.html" class="navbar__game-item" data-game="pros-cons">🐺</a>
      <a href="../mind-map/index.html" class="navbar__game-item" data-game="mind-map">🐙</a>
      <a href="../matching/index.html" class="navbar__game-item" data-game="matching">🐿️</a>
      <a href="../file-naming/index.html" class="navbar__game-item" data-game="file-naming">🐟</a>
      <a href="../prompt-order/index.html" class="navbar__game-item" data-game="prompt-order">🐜</a>
      <a href="../calculator/index.html" class="navbar__game-item" data-game="calculator">🐬</a>
      <div class="navbar__game-item navbar__game-item--active">🦊</div>
      <a href="../noticeboard/index.html" class="navbar__game-item" data-game="noticeboard">🐝</a>
    </div>
  </div>

  <!-- MAIN -->
  <main class="game-page">
    <div class="page-header">
      <a href="../../index.html" class="page-header__back">◀ HOME</a>
      <h1 class="page-header__title">🦊 MECE</h1>
      <p class="mece-explanation">
        <strong>MECE = Mutually Exclusive, Collectively Exhaustive.</strong><br>
        Phân loại đúng MECE khi các nhóm <strong>không chồng chéo</strong> (ME) và <strong>bao phủ hết</strong> tất cả trường hợp (CE).
      </p>
    </div>

    <div class="score-bar">
      <div class="score-chip pixel-box" id="progressDisplay">0 / 0 ANSWERED</div>
      <button class="action-btn action-btn--check" id="checkBtn">✓ CHECK</button>
      <button class="action-btn action-btn--continue" id="continueBtn" style="display:none">▶ CONTINUE</button>
      <div class="score-chip pixel-box pixel-box--yellow" id="scoreDisplay">SCORE: —</div>
    </div>

    <div id="questionsContainer"></div>
    <div id="meceEmpty" class="mece-empty" style="display:none">Chưa có câu hỏi nào. Thêm trong Admin.</div>

    <div class="result-banner" id="resultBanner">
      <div class="result-banner__score" id="resultScore"></div>
      <div class="result-banner__msg" id="resultMsg"></div>
    </div>
  </main>

  <script>
    // ================================================================
    //  CONSTANTS
    // ================================================================
    const GAME_EMOJI = '🦊';
    const STORAGE_KEY = 'mece';
    const ANSWER_KEYS = ['mece', 'not_me', 'not_ce', 'not_mece'];
    const ANSWER_LABELS = {
      mece:     '✓ MECE',
      not_me:   '✗ Sai ME',
      not_ce:   '✗ Sai CE',
      not_mece: '✗ Sai MECE'
    };

    // ================================================================
    //  STATE
    // ================================================================
    let gameData = [];
    let answers  = {};   // { questionId: 'mece'|'not_me'|'not_ce'|'not_mece' }
    let checked  = false;
    let totalCorrect  = 0;
    let totalAnswered = 0;

    async function loadGameData() {
      const data = await PV.loadData(STORAGE_KEY);
      return data ? JSON.parse(JSON.stringify(data)) : [];
    }

    // ================================================================
    //  BUILD GAME
    // ================================================================
    function buildGame() {
      const container = document.getElementById('questionsContainer');
      container.innerHTML = '';
      answers = {};
      checked = false;
      totalCorrect = 0;
      totalAnswered = 0;

      if (!gameData.length) {
        document.getElementById('meceEmpty').style.display = '';
        document.getElementById('checkBtn').style.display = 'none';
        updateProgress();
        return;
      }

      document.getElementById('meceEmpty').style.display = 'none';
      document.getElementById('checkBtn').style.display = '';
      document.getElementById('continueBtn').style.display = 'none';
      document.getElementById('resultBanner').style.display = 'none';

      gameData.forEach((q, idx) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `qcard-${q.id}`;

        // Header
        const header = document.createElement('div');
        header.className = 'question-card__header';
        header.innerHTML = `<span class="question-card__num">#${idx + 1}</span>
          <span class="question-card__topic">${PV.escHtml(q.topic)}</span>`;
        card.appendChild(header);

        // Topic concept
        if (q.topicConcept) {
          const concept = document.createElement('div');
          concept.className = 'question-card__concept';
          concept.textContent = q.topicConcept;
          card.appendChild(concept);
        }

        // Categories
        const cats = document.createElement('div');
        cats.className = 'categories';
        (q.categories || []).forEach(cat => {
          const chip = document.createElement('span');
          chip.className = 'category-chip';
          chip.textContent = cat.name;
          if (cat.concept) chip.title = cat.concept;
          cats.appendChild(chip);
        });
        card.appendChild(cats);

        // Answer buttons
        const group = document.createElement('div');
        group.className = 'answer-group';
        group.dataset.qid = q.id;
        ANSWER_KEYS.forEach(key => {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.dataset.answer = key;
          btn.textContent = ANSWER_LABELS[key];
          btn.addEventListener('click', () => onAnswerSelect(q.id, key, group));
          group.appendChild(btn);
        });
        card.appendChild(group);

        container.appendChild(card);
      });

      updateProgress();
      updateScoreDisplay();
    }

    // ================================================================
    //  ANSWER SELECTION
    // ================================================================
    function onAnswerSelect(qId, answer, group) {
      if (checked) return; // locked after check
      SFX.click();

      // Toggle: if same answer clicked, deselect
      if (answers[qId] === answer) {
        delete answers[qId];
      } else {
        answers[qId] = answer;
      }

      // Update button styles
      group.querySelectorAll('.answer-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.answer === answers[qId]);
      });

      updateProgress();
    }

    function updateProgress() {
      const answered = gameData.filter(q => answers[q.id] !== undefined).length;
      document.getElementById('progressDisplay').textContent =
        `${answered} / ${gameData.length} ANSWERED`;
    }

    function updateScoreDisplay() {
      if (totalAnswered === 0) {
        document.getElementById('scoreDisplay').textContent = 'SCORE: —';
      } else {
        document.getElementById('scoreDisplay').textContent =
          `SCORE: ${totalCorrect}/${totalAnswered}`;
      }
    }

    // ================================================================
    //  CHECK
    // ================================================================
    function checkAnswers() {
      checked = true;
      let correct = 0;

      gameData.forEach(q => {
        const card = document.getElementById(`qcard-${q.id}`);
        const group = card.querySelector('.answer-group');
        const userAnswer = answers[q.id];
        const isCorrect = userAnswer === q.answer;

        if (isCorrect) {
          correct++;
          card.classList.add('correct');
        } else {
          card.classList.add('wrong');
        }

        group.querySelectorAll('.answer-btn').forEach(btn => {
          const key = btn.dataset.answer;
          btn.classList.remove('selected');
          if (key === q.answer) {
            btn.classList.add('result-correct');
          }
          if (key === userAnswer && !isCorrect) {
            btn.classList.add('result-wrong');
          }
        });
      });

      totalCorrect += correct;
      totalAnswered += gameData.length;

      const pct = Math.round(correct / gameData.length * 100);
      if (pct === 100) SFX.correct(); else SFX.wrong();

      const msgs = [
        [100, '🏆 Hoàn hảo! Bạn hiểu rõ MECE!'],
        [70,  '🎉 Rất tốt! Còn vài chỗ cần xem lại.'],
        [40,  '👍 Khá ổn! Hãy ôn lại khái niệm ME và CE.'],
        [0,   '💪 Chưa đạt! Đọc lại giải thích và thử lại nhé.'],
      ];
      const msg = msgs.find(([min]) => pct >= min)[1];

      document.getElementById('resultScore').textContent =
        `${correct} / ${gameData.length} CORRECT (${pct}%)`;
      document.getElementById('resultMsg').textContent = msg;
      document.getElementById('resultBanner').style.display = '';
      document.getElementById('checkBtn').style.display = 'none';
      document.getElementById('continueBtn').style.display = '';

      updateScoreDisplay();
    }

    // ================================================================
    //  CONTINUE
    // ================================================================
    function continueGame() {
      checked = false;

      // Remove result styling but keep answers
      document.querySelectorAll('.question-card').forEach(card => {
        card.classList.remove('correct', 'wrong');
      });
      document.querySelectorAll('.answer-btn').forEach(btn => {
        btn.classList.remove('result-correct', 'result-wrong');
        // Restore selected state
        const group = btn.closest('.answer-group');
        const qId = +group.dataset.qid;
        btn.classList.toggle('selected', btn.dataset.answer === answers[qId]);
      });

      document.getElementById('resultBanner').style.display = 'none';
      document.getElementById('checkBtn').style.display = '';
      document.getElementById('continueBtn').style.display = 'none';
    }

    // ================================================================
    //  EVENT LISTENERS
    // ================================================================
    document.getElementById('checkBtn').addEventListener('click', checkAnswers);
    document.getElementById('continueBtn').addEventListener('click', continueGame);

    // ================================================================
    //  INIT
    // ================================================================
    (async () => {
      gameData = await loadGameData() || [];
      buildGame();
    })();
  </script>
</body>
</html>
