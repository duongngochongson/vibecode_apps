<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🐬 — PIXELVERSE</title><link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">
<link rel="stylesheet" href="style.css"/><script src="app.js"></script>
<style>
.calc-page{display:flex;flex-direction:column;align-items:center;padding:40px 1rem 60px;min-height:calc(100vh - 56px)}
.calc-title{font-family:var(--font-serif);font-size:clamp(18px,4vw,28px);font-weight:700;color:var(--text-primary);letter-spacing:0.5px;margin-bottom:32px}
.calc{width:100%;max-width:320px;border:1px solid var(--border-subtle);background:var(--bg-surface);border-radius:var(--radius-md);overflow:hidden}
.calc-display{padding:20px 16px;border-bottom:1px solid var(--border-subtle);text-align:right}
.calc-expr{font-size:12px;color:var(--text-secondary);min-height:18px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:6px;font-family:var(--font-mono)}
.calc-result{font-size:28px;color:var(--text-primary);font-family:var(--font-mono);letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-height:38px;transition:color 0.15s}
.calc-result.ok{color:var(--success)}
.calc-result.err{color:var(--error)}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr)}
.calc-btn{aspect-ratio:1;border:1px solid var(--border-subtle);background:var(--bg-base);color:var(--text-primary);font-size:16px;cursor:pointer;transition:all 0.1s;font-family:var(--font-mono);font-weight:500}
.calc-btn:hover{background:var(--bg-elevated);border-color:var(--border-default)}
.calc-btn:active{background:var(--bg-surface);transform:scale(0.98)}
.calc-btn--op{color:var(--accent);font-weight:600}
.calc-btn--cl{color:var(--error);font-size:13px;font-weight:600}
.calc-btn--eq{background:var(--accent);color:var(--text-inverse);border-color:var(--accent);font-weight:600}
.calc-btn--eq:hover{background:var(--accent-hover)}
.calc-btn--p{color:var(--text-secondary);font-size:14px}
.calc-btn--del{color:var(--error);font-size:13px;font-weight:600}
</style></head>
<body><div class="calc-page">
<div style="text-align:center;margin-bottom:20px"><a href="index.html" class="page-header__back">← Home</a></div>
<h1 class="calc-title">🐬 Máy Tính</h1>
<div class="calc" id="calc"><div class="calc-display"><div class="calc-expr" id="cE"></div><div class="calc-result" id="cR">0</div></div>
<div class="calc-grid">
<button class="calc-btn calc-btn--cl" data-a="clear">C</button><button class="calc-btn calc-btn--p" data-a="(">(</button><button class="calc-btn calc-btn--p" data-a=")">)</button><button class="calc-btn calc-btn--op" data-a="÷">÷</button>
<button class="calc-btn" data-a="7">7</button><button class="calc-btn" data-a="8">8</button><button class="calc-btn" data-a="9">9</button><button class="calc-btn calc-btn--op" data-a="×">×</button>
<button class="calc-btn" data-a="4">4</button><button class="calc-btn" data-a="5">5</button><button class="calc-btn" data-a="6">6</button><button class="calc-btn calc-btn--op" data-a="−">−</button>
<button class="calc-btn" data-a="1">1</button><button class="calc-btn" data-a="2">2</button><button class="calc-btn" data-a="3">3</button><button class="calc-btn calc-btn--op" data-a="+">+</button>
<button class="calc-btn" data-a=".">.</button><button class="calc-btn" data-a="0">0</button><button class="calc-btn calc-btn--del" data-a="backspace">⌫</button><button class="calc-btn calc-btn--eq" data-a="=">=</button>
</div></div></div>
<script>
let expr='',aft=false;const cE=document.getElementById('cE'),cR=document.getElementById('cR');
function upd(){if(!aft){cE.textContent='';cR.className='calc-result';cR.textContent=expr||'0'}}
function compute(){if(!expr)return;try{const s=expr.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
const v=Function('"use strict";return('+s+')')();if(!isFinite(v))throw 0;const f=parseFloat(v.toPrecision(12)).toString();
cE.textContent=expr+' =';cR.textContent=f;cR.className='calc-result ok';expr=f;aft=true;SFX.click()}
catch(e){cR.textContent='Lỗi';cR.className='calc-result err';aft=true;SFX.wrong?.()}}
function act(a){if(a==='clear'){expr='';aft=false;cE.textContent='';cR.textContent='0';cR.className='calc-result';return}
if(a==='backspace'){if(aft){expr='';aft=false;upd();return}expr=expr.slice(0,-1);aft=false;upd();return}
if(a==='='){compute();return}const isOp='+-×÷−*/()'.includes(a);if(aft){if(!isOp)expr='';aft=false}expr+=a;aft=false;upd()}
document.getElementById('calc').addEventListener('click',e=>{const b=e.target.closest('[data-a]');if(b){SFX.click();act(b.dataset.a)}});
document.addEventListener('keydown',e=>{if(e.ctrlKey||e.metaKey||e.altKey)return;const k=e.key;
if('0123456789'.includes(k))act(k);else if(k==='+')act('+');else if(k==='-')act('−');else if(k==='*')act('×');
else if(k==='/'){e.preventDefault();act('÷')}else if(k==='('||k===')')act(k);else if(k==='.')act('.');
else if(k==='Enter'||k==='='){e.preventDefault();act('=')}else if(k==='Backspace')act('backspace');
else if(k==='Escape'||k==='Delete')act('clear')});
</script></body></html>
