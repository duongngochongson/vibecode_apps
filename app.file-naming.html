<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🐟 — PIXELVERSE</title><link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">
<link rel="stylesheet" href="style.css"/><script src="app.js"></script>
<style>.fn-layout{position:relative;z-index:2;display:grid;grid-template-columns:220px 1fr;grid-template-rows:auto 1fr auto;height:calc(100vh - 56px);overflow:hidden}
.fn-header{grid-column:1/-1;display:flex;align-items:center;justify-content:center;gap:14px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.fn-header__title{font-size:clamp(16px,3vw,22px);color:var(--text-primary);margin:0;font-family:var(--font-serif);font-weight:700}
.fn-header__back{font-family:var(--font-sans);font-size:13px;color:var(--text-secondary);border:1px solid var(--border-default);text-decoration:none;letter-spacing:0.5px;padding:6px 12px;margin-right:12px;border-radius:4px;transition:all 0.15s}
.fn-header__back:hover{background:var(--accent);color:var(--text-inverse);border-color:var(--accent)}
.fn-tree{grid-row:2;grid-column:1;overflow-y:auto;border-right:2px solid rgba(255,255,255,.08);padding:8px 0;font-size:10px;user-select:none}
.fn-tree-label{font-size:11px;color:var(--text-secondary);letter-spacing:0.5px;padding:8px 12px;font-weight:600}
.fn-tree-item{display:flex;align-items:center;gap:4px;padding:6px 8px;cursor:pointer;color:var(--text-primary);transition:all 0.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fn-tree-item:hover{background:var(--bg-elevated)}.fn-tree-item.active{background:var(--accent-subtle);color:var(--accent)}.fn-tree-item.selected-planet{background:var(--accent-muted);color:var(--accent)}
.fn-tree-toggle{width:14px;text-align:center;color:var(--grey);flex-shrink:0;font-size:9px}
.fn-tree-icon{flex-shrink:0;font-size:10px}.fn-tree-name{font-size:9px;letter-spacing:.5px}
.fn-tree-children{display:none}.fn-tree-children.open{display:block}
.fn-browser{grid-row:2;grid-column:2;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column}
.fn-breadcrumb{display:flex;align-items:center;gap:2px;margin-bottom:16px;font-size:9px;letter-spacing:.5px;flex-wrap:wrap}
.fn-bc-item{color:var(--text-secondary);cursor:pointer;padding:4px 6px;transition:color 0.15s;border-radius:2px}.fn-bc-item:hover{color:var(--accent);background:var(--accent-subtle)}.fn-bc-item.current{color:var(--accent);cursor:default;font-weight:600}
.fn-bc-sep{color:var(--grey)}
.fn-grid{display:flex;flex-wrap:wrap;gap:12px;flex:1;align-content:flex-start}
.fn-grid-item{display:flex;flex-direction:column;align-items:center;width:80px;padding:12px 8px 8px;border:1px solid var(--border-subtle);cursor:pointer;border-radius:6px;transition:all 0.15s;text-align:center}
.fn-grid-item:hover{border-color:var(--border-default);background:var(--bg-elevated)}
.fn-grid-item.selected{border-color:var(--accent);background:var(--accent-subtle)}
.fn-grid-item.correct-sel{border-color:var(--success);background:var(--success-subtle)}.fn-grid-item.wrong-sel{border-color:var(--error);background:var(--error-subtle)}
.fn-grid-icon{font-size:28px;margin-bottom:6px}.fn-grid-name{font-size:8px;color:var(--white);letter-spacing:.5px;word-break:break-all}
.fn-empty{font-size:9px;color:var(--grey);letter-spacing:1px;padding:20px}
.fn-answer-bar{grid-row:3;grid-column:1/-1;border-top:1px solid var(--border-default);padding:12px 16px;background:var(--bg-base);display:flex;flex-direction:column;gap:10px}
.fn-q-block{flex:1;min-width:0}
.fn-bottom-nav{display:flex;align-items:stretch;gap:12px}
.fn-nav-group{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.fn-q-type-badge{font-size:10px;letter-spacing:2px;padding:6px 14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fn-q-type-badge--find{background:var(--accent-subtle);color:var(--accent);border:1px solid var(--accent)}
.fn-q-type-badge--write{background:var(--success-subtle);color:var(--success);border:1px solid var(--success)}
.fn-story-text{font-size:12px;color:var(--white);line-height:1.65;margin-bottom:8px}
.fn-story-hi{color:var(--accent);font-style:normal;font-weight:600}
.fn-q-answer-row{display:flex;align-items:center;gap:8px}
.fn-selected-path{font-size:12px;color:var(--text-primary);letter-spacing:0.25px;padding:8px 12px;border:1px solid var(--border-default);border-radius:4px;min-width:100px;text-align:center}
.fn-selected-path.empty{color:var(--text-secondary)}.fn-selected-path.correct{border-color:var(--success);color:var(--success);background:var(--success-subtle)}.fn-selected-path.wrong{border-color:var(--error);color:var(--error);background:var(--error-subtle)}
.fn-write-input{background:var(--bg-elevated);border:1px solid var(--border-default);color:var(--text-primary);font-size:12px;padding:8px 12px;letter-spacing:0.25px;width:320px;max-width:100%;font-family:var(--font-mono);border-radius:4px}
.fn-write-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-subtle)}.fn-write-input.input-correct{border-color:var(--success);color:var(--success)}.fn-write-input.input-wrong{border-color:var(--error);color:var(--error)}
.fn-check-btn{font-family:var(--font-serif);font-size:14px;font-weight:600;letter-spacing:0.25px;padding:8px 16px;border:none;cursor:pointer;background:var(--success);color:var(--text-inverse);border-radius:4px;flex-shrink:0;transition:all 0.15s}
.fn-check-btn:hover{background:filter(brightness(1.1))}
.fn-answer-feedback{font-size:12px;letter-spacing:0.25px;flex-basis:100%;padding:6px 0;margin-top:8px;font-weight:500}
.fn-answer-feedback.wrong{color:var(--error)}.fn-answer-feedback.correct{color:var(--success)}
.result-banner{display:none;margin-top:20px;padding:20px;border:1px solid var(--border-default);border-left:3px solid var(--success);background:var(--bg-surface);border-radius:var(--radius-md);grid-column:1/-1}
.result-banner.show{display:block}
.result-banner.error{border-left-color:var(--error)}
.result-banner__btn{font-family:var(--font-serif);font-size:14px;font-weight:600;letter-spacing:0.25px;padding:8px 16px;border:none;cursor:pointer;background:var(--accent);color:var(--text-inverse);border-radius:4px;transition:all 0.15s;margin-top:12px}
@media(max-width:600px){.fn-layout{grid-template-columns:160px 1fr}.fn-grid-item{width:64px;padding:8px 4px 6px}.fn-grid-icon{font-size:22px}.fn-answer-bar{gap:8px;padding:8px 10px}.fn-write-input{width:200px}}
@media(max-width:420px){.fn-layout{grid-template-columns:110px 1fr}.fn-tree-name{font-size:8px}.fn-grid-item{width:54px;padding:6px 2px 4px}.fn-grid-icon{font-size:18px}.fn-grid-name{font-size:7px}.fn-write-input{width:140px}.fn-answer-bar{padding:6px 8px;gap:6px}.result-banner{padding:20px 16px;width:88vw;box-sizing:border-box}}</style></head>
<body>
<div class="fn-layout">
<div class="fn-header"><a href="index.html" class="fn-header__back" onclick="SFX.navigate()">← Home</a><h1 class="fn-header__title" id="gameTitle">🐟 Đặt Tên File</h1></div>
<aside class="fn-tree"><div class="fn-tree-label">CÂY THƯ MỤC</div><div id="fnTreeBody"></div></aside>
<section class="fn-browser"><div class="fn-breadcrumb" id="fnBreadcrumb"></div><div class="fn-grid" id="fnGrid"></div></section>
<div class="fn-answer-bar" id="fnAnswerBar">
<div class="fn-q-block"><div class="fn-story-text" id="fnStoryText"></div>
<div class="fn-q-answer-row"><div class="fn-selected-path empty" id="fnSelectedPath">Chưa chọn</div>
<input class="fn-write-input" id="fnWriteInput" placeholder="vutru.thiênhà.ngânhà.hệsao.hànhtinh" autocomplete="off" style="display:none"/></div></div>
<div class="fn-bottom-nav"><div class="fn-q-type-badge fn-q-type-badge--find" id="fnQTypeBadge">🔍 TÌM FILE</div>
<div class="fn-nav-group"><div class="fn-q-nav">
<button class="fn-nav-btn" id="fnPrevQ">◀</button><button class="fn-check-btn" id="fnCheckBtn">✓ CHECK</button><button class="fn-nav-btn" id="fnNextQ">▶</button></div>
<div class="fn-dots" id="fnDots"></div></div></div></div></div>
<div class="result-banner" id="resultBanner"><div class="result-banner__score" id="resultScore"></div><div class="result-banner__msg" id="resultMsg"></div>
<button class="result-banner__btn" id="resultContBtn">▶ CONTINUE</button></div>
<div class="toast" id="toast"></div>
<script>
const TQ=10,TI={root:'◈',th:'◆',nh:'✦',hs:'☆',planet:'●'},BI={root:'🌌',th:'🌀',nh:'✨',hs:'☀',planet:'🪐'};
const STORIES=['Tàu thám hiểm đã đáp xuống hành tinh {HP} trong hệ sao {HS}, thuộc ngân hà {NH} của thiên hà {TH}. Nhiệt độ bề mặt −200°C, bầu trời phát ánh tím mờ.',
'Đài thiên văn phát hiện tín hiệu lạ từ hành tinh {HP} trong hệ sao {HS}. Ngân hà {NH} nằm ở rìa thiên hà {TH}, nơi không gian bẻ cong ánh sáng.',
'Bản đồ vũ trụ cổ đại ghi: từ thiên hà {TH}, tới ngân hà {NH}, đi sâu vào hệ sao {HS} sẽ thấy hành tinh {HP} — nơi ẩn giấu kho báu của đế chế bị lãng quên.',
'Nhiệm vụ khẩn cấp: hành tinh {HP} trong hệ sao {HS} thuộc ngân hà {NH}, thiên hà {TH} sắp bị nuốt bởi lỗ đen. Cần sơ tán dân số trước 48 giờ.',
'Du ký vũ trụ ghi lại: thiên hà {TH} có ngân hà {NH} xinh đẹp với hệ sao {HS} nổi tiếng. Hành tinh {HP} ở đó có mùa hoa nở kéo dài 300 năm.'];
let tree=null,allP=[],ques=[],cq=0,drafts={},results={},selPl=null,curFolder=null;
function buildTree(){const d=window.FN_TREE,root={name:d.root,type:'root',children:[],path:d.root};
d.th.forEach((thN,ti)=>{const th={name:thN,type:'th',children:[],path:`${d.root}/${thN}`};
for(let ni=0;ni<5;ni++){const nhI=ti*5+ni,nhN=d.nh[nhI],nh={name:nhN,type:'nh',children:[],path:`${th.path}/${nhN}`};
for(let hi=0;hi<5;hi++){const hsI=nhI*5+hi,hsN=d.hs[hsI],hsP=`${nh.path}/${hsN}`;
const planets=(d.pl[hsI]||[]).map(p=>({name:p,type:'planet',children:[],path:`${hsP}/${p}`}));
nh.children.push({name:hsN,type:'hs',children:planets,path:hsP})}th.children.push(nh)}root.children.push(th)});return root}
function collectP(n){if(n.type==='planet')allP.push(n);if(n.children)n.children.forEach(collectP)}
function findNode(path){const parts=path.split('/');let n=tree;for(let i=1;i<parts.length;i++){const c=n.children.find(c=>c.name===parts[i]);if(!c)return null;n=c}return n}
function fillStory(tpl,pn){const p=pn.path.split('/'),hi=s=>`<b class="fn-story-hi">${s}</b>`;return tpl.replace('{TH}',hi(p[1])).replace('{NH}',hi(p[2])).replace('{HS}',hi(p[3])).replace('{HP}',hi(p[4]))}
function genQues(){const sh=[...allP].sort(()=>Math.random()-.5),p10=sh.slice(0,10),si=[0,1,2,3,4].sort(()=>Math.random()-.5);ques=[];
for(let i=0;i<5;i++){const tpl=STORIES[si[i]];ques.push({type:'find',planet:p10[i],storyHtml:fillStory(tpl,p10[i])});ques.push({type:'write',planet:p10[i+5],storyHtml:fillStory(tpl,p10[i+5])})}}
function renderTree(){const b=document.getElementById('fnTreeBody');b.innerHTML='';renderTreeNode(tree,b,0)}
function renderTreeNode(node,parent,depth){const isF=node.type!=='planet',hasC=node.children&&node.children.length>0;
const row=document.createElement('div');row.className='fn-tree-item';row.style.paddingLeft=(depth*14+8)+'px';row.dataset.path=node.path;
const tog=document.createElement('span');tog.className='fn-tree-toggle';tog.textContent=isF&&hasC?'▸':' ';row.appendChild(tog);
const ico=document.createElement('span');ico.className='fn-tree-icon';ico.textContent=TI[node.type]||'●';row.appendChild(ico);
const nm=document.createElement('span');nm.className='fn-tree-name';nm.textContent=node.name;row.appendChild(nm);parent.appendChild(row);
if(isF&&hasC){const cw=document.createElement('div');cw.className='fn-tree-children';cw.dataset.parentPath=node.path;
node.children.forEach(c=>renderTreeNode(c,cw,depth+1));parent.appendChild(cw);
tog.addEventListener('click',e=>{e.stopPropagation();SFX.click();const o=cw.classList.toggle('open');tog.textContent=o?'▾':'▸'});
row.addEventListener('click',()=>{SFX.click();navTo(node);if(!cw.classList.contains('open')){cw.classList.add('open');tog.textContent='▾'}})}
else if(node.type==='planet')row.addEventListener('click',()=>selPlanetNode(node));
else row.addEventListener('click',()=>{SFX.click();navTo(node)})}
function hlTree(path){document.querySelectorAll('.fn-tree-item').forEach(el=>el.classList.toggle('active',el.dataset.path===path))}
function expandTo(path){const parts=path.split('/');let acc='';parts.forEach((p,i)=>{acc+=(i>0?'/':'')+p;const w=document.querySelector(`.fn-tree-children[data-parent-path="${acc}"]`);
if(w&&!w.classList.contains('open')){w.classList.add('open');const prev=w.previousElementSibling;if(prev){const t=prev.querySelector('.fn-tree-toggle');if(t)t.textContent='▾'}}})}
function navTo(node){if(node.type==='planet')return;curFolder=node;renderBC();renderBrowser();hlTree(node.path);expandTo(node.path)}
function renderBC(){const bc=document.getElementById('fnBreadcrumb');bc.innerHTML='';const parts=curFolder.path.split('/');let acc='';
parts.forEach((p,i)=>{if(i>0){const sep=document.createElement('span');sep.className='fn-bc-sep';sep.textContent=' / ';bc.appendChild(sep)}
acc+=(i>0?'/':'')+p;const lk=document.createElement('span');lk.className='fn-bc-item'+(i===parts.length-1?' current':'');lk.textContent=p;
const tp=acc;lk.addEventListener('click',()=>{const t=findNode(tp);if(t&&t.type!=='planet'){SFX.click();navTo(t)}});bc.appendChild(lk)})}
function renderBrowser(){const g=document.getElementById('fnGrid');g.innerHTML='';
if(!curFolder.children||!curFolder.children.length){g.innerHTML='<div class="fn-empty">Thư mục trống</div>';return}
curFolder.children.forEach(c=>{const it=document.createElement('div');it.className='fn-grid-item';it.dataset.path=c.path;
const ic=document.createElement('span');ic.className='fn-grid-icon';ic.textContent=BI[c.type]||'🪐';it.appendChild(ic);
const nm=document.createElement('span');nm.className='fn-grid-name';nm.textContent=c.name;it.appendChild(nm);
if(c.type==='planet'){it.addEventListener('click',()=>selPlanetNode(c));if(selPl&&selPl.path===c.path)it.classList.add('selected')}
else it.addEventListener('click',()=>{SFX.navigate();navTo(c)});g.appendChild(it)})}
function selPlanetNode(pn){if(ques[cq]?.type!=='find')return;SFX.click();selPl=pn;drafts[cq]={planet:pn};
if(results[cq]){delete results[cq];document.querySelectorAll('.fn-answer-feedback').forEach(el=>el.remove())}
document.querySelectorAll('.fn-grid-item.selected,.fn-grid-item.correct-sel,.fn-grid-item.wrong-sel').forEach(el=>el.classList.remove('selected','correct-sel','wrong-sel'));
document.querySelectorAll('.fn-tree-item.selected-planet').forEach(el=>el.classList.remove('selected-planet'));
const bi=document.querySelector(`.fn-grid-item[data-path="${pn.path}"]`);if(bi)bi.classList.add('selected');
const ti=document.querySelector(`.fn-tree-item[data-path="${pn.path}"]`);if(ti)ti.classList.add('selected-planet');
if(!bi){const pp=pn.path.split('/').slice(0,-1).join('/'),par=findNode(pp);if(par)navTo(par);
requestAnimationFrame(()=>{const el=document.querySelector(`.fn-grid-item[data-path="${pn.path}"]`);if(el)el.classList.add('selected')})}
const pe=document.getElementById('fnSelectedPath');pe.textContent=pn.path;pe.className='fn-selected-path';upDots()}
function saveDraft(i){const q=ques[i];if(!q)return;if(q.type==='write'){const v=document.getElementById('fnWriteInput').value;if(v.trim())drafts[i]={text:v};else delete drafts[i]}}
function goToQ(i){saveDraft(cq);cq=i;const q=ques[i];const badge=document.getElementById('fnQTypeBadge');
if(q.type==='find'){badge.textContent='🔍 TÌM FILE';badge.className='fn-q-type-badge fn-q-type-badge--find'}
else{badge.textContent='✏️ VIẾT TÊN';badge.className='fn-q-type-badge fn-q-type-badge--write'}
document.getElementById('fnStoryText').innerHTML=q.storyHtml;document.querySelectorAll('.fn-answer-feedback').forEach(el=>el.remove());
const pe=document.getElementById('fnSelectedPath'),ie=document.getElementById('fnWriteInput'),dr=drafts[i];
document.querySelectorAll('.fn-grid-item.selected,.fn-grid-item.correct-sel,.fn-grid-item.wrong-sel').forEach(el=>el.classList.remove('selected','correct-sel','wrong-sel'));
document.querySelectorAll('.fn-tree-item.selected-planet').forEach(el=>el.classList.remove('selected-planet'));
if(q.type==='find'){pe.style.display='';ie.style.display='none';selPl=dr?.planet||null;
if(selPl){pe.textContent=selPl.path;pe.className='fn-selected-path'}else{pe.textContent='Chưa chọn';pe.className='fn-selected-path empty'}}
else{pe.style.display='none';ie.style.display='';ie.value=dr?.text||'';ie.className='fn-write-input';selPl=null}
if(results[i])showFeedback(i);upNav();upDots()}
function upNav(){document.getElementById('fnPrevQ').disabled=cq===0;document.getElementById('fnNextQ').disabled=cq===TQ-1}
function buildDots(){const c=document.getElementById('fnDots');c.innerHTML='';for(let i=0;i<TQ;i++){const d=document.createElement('button');d.className='fn-dot';d.addEventListener('click',()=>{SFX.click();goToQ(i)});c.appendChild(d)}}
function upDots(){document.querySelectorAll('.fn-dot').forEach((d,i)=>{d.className='fn-dot';if(i===cq)d.classList.add('active');else if(results[i]?.isCorrect)d.classList.add('answered');else if(results[i]&&!results[i].isCorrect)d.classList.add('wrong-q');else if(drafts[i])d.classList.add('drafted')})}
function doCheckAll(){saveDraft(cq);let ok=0;ques.forEach((q,i)=>{const dr=drafts[i];let isOk=false,cv='';
if(q.type==='find'){cv=q.planet.path;isOk=(dr?.planet?.path||'').toLowerCase()===cv.toLowerCase()}
else{cv=q.planet.path.replace(/\//g,'.');isOk=(dr?.text||'').trim().toLowerCase()===cv.toLowerCase()}
results[i]={isCorrect:isOk,correctValue:cv};if(isOk)ok++});SFX[ok===TQ?'correct':'wrong']();showFeedback(cq);upDots();showFinal(ok)}
function showFeedback(i){document.querySelectorAll('.fn-answer-feedback').forEach(el=>el.remove());const r=results[i];if(!r)return;const q=ques[i];
if(q.type==='find'){const pe=document.getElementById('fnSelectedPath');pe.className='fn-selected-path '+(r.isCorrect?'correct':'wrong');
document.querySelectorAll('.fn-grid-item.selected').forEach(el=>{el.classList.remove('selected');el.classList.add(r.isCorrect?'correct-sel':'wrong-sel')})}
else{document.getElementById('fnWriteInput').className='fn-write-input '+(r.isCorrect?'input-correct':'input-wrong')}
if(!r.isCorrect){const fb=document.createElement('div');fb.className='fn-answer-feedback wrong';fb.textContent=`✕ Đáp án đúng: ${r.correctValue}`;document.getElementById('fnAnswerBar').appendChild(fb)}}
function showFinal(ok){const pct=Math.round(ok/TQ*100);document.getElementById('resultScore').textContent=`${ok} / ${TQ} ĐÚNG (${pct}%)`;
document.getElementById('resultMsg').textContent=PV.checkMsg(pct);document.getElementById('resultBanner').style.display='block'}
document.getElementById('fnCheckBtn').addEventListener('click',doCheckAll);
document.getElementById('fnPrevQ').addEventListener('click',()=>{if(cq>0){SFX.navigate();goToQ(cq-1)}});
document.getElementById('fnNextQ').addEventListener('click',()=>{if(cq<TQ-1){SFX.navigate();goToQ(cq+1)}});
document.getElementById('fnWriteInput').addEventListener('input',()=>{const v=document.getElementById('fnWriteInput').value;
if(v.trim()){drafts[cq]={text:v};if(results[cq]){delete results[cq];document.querySelectorAll('.fn-answer-feedback').forEach(el=>el.remove());document.getElementById('fnWriteInput').className='fn-write-input';upDots()}}else delete drafts[cq]});
document.getElementById('resultContBtn').addEventListener('click',()=>{document.getElementById('resultBanner').style.display='none';const wi=ques.findIndex((_,i)=>results[i]&&!results[i].isCorrect);if(wi!==-1)goToQ(wi)});
(async()=>{try{const r=await fetch('data.json');if(r.ok){const d=await r.json();window.FN_TREE=d.fileNaming}}catch(e){}
tree=buildTree();collectP(tree);genQues();renderTree();navTo(tree);buildDots();goToQ(0)})();
</script></body></html>
