<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🐺 — PIXELVERSE</title><link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">
<link rel="stylesheet" href="style.css"/><script src="app.js"></script>
<style>.page-header h1{color:var(--cyan);font-size:clamp(22px,4vw,34px)}
#scoreDisp{color:var(--yellow);border-color:var(--yellow)}#progDisp{color:var(--cyan);border-color:var(--cyan)}
.game-area{display:grid;grid-template-columns:1fr 280px;gap:24px;align-items:start}
.topics-col{display:flex;flex-direction:column;gap:20px}
.topic-card{background:var(--card);border:2px solid var(--grey);padding:20px;transition:border-color .2s}
.topic-card.highlight{border-color:var(--cyan);box-shadow:0 0 10px rgba(0,255,245,.2)}
.topic-card__hdr{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.topic-card__num{font-family:var(--fp);font-size:9px;color:var(--magenta);text-shadow:0 0 6px var(--magenta);min-width:28px}
.topic-card__title{font-family:var(--fh);font-size:16px;font-weight:700;color:var(--white)}
.topic-card__passage{font-family:var(--fb);font-size:13px;color:rgba(232,232,255,.65);line-height:1.7;margin-bottom:16px;padding-left:clamp(0px,5vw,40px)}
.drop-zones{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-left:clamp(0px,5vw,40px)}
.drop-zone{min-height:72px;border:2px dashed;padding:8px;display:flex;align-items:center;justify-content:center;position:relative;transition:background .15s,box-shadow .15s}
.drop-zone--pro{border-color:rgba(0,255,245,.4)}.drop-zone--con{border-color:rgba(255,0,204,.4)}
.drop-zone.drag-over{background:rgba(255,255,255,.06)}
.drop-zone--pro.drag-over{box-shadow:0 0 12px rgba(0,255,245,.4);border-color:var(--cyan)}
.drop-zone--con.drag-over{box-shadow:0 0 12px rgba(255,0,204,.4);border-color:var(--magenta)}
.drop-zone__label{font-size:11px;font-weight:600;position:absolute;top:5px;left:7px;letter-spacing:1px;opacity:.6}
.drop-zone--pro .drop-zone__label{color:var(--cyan)}.drop-zone--con .drop-zone__label{color:var(--magenta)}
.drop-zone__empty{font-family:var(--fb);font-size:11px;color:rgba(232,232,255,.25);text-align:center;margin-top:10px}
.drop-zone.correct{border-style:solid;border-color:var(--green);box-shadow:0 0 12px rgba(57,255,20,.4);background:rgba(57,255,20,.05)}
.drop-zone.wrong{border-style:solid;border-color:var(--orange);box-shadow:0 0 12px rgba(255,107,0,.4);background:rgba(255,107,0,.05)}
.drag-card{background:var(--card2);border:2px solid var(--grey);padding:10px 12px;font-family:var(--fb);font-size:12px;color:var(--white);line-height:1.5;cursor:grab;transition:border-color .15s,box-shadow .15s,opacity .15s;width:100%;position:relative}
.drag-card:active{cursor:grabbing;opacity:.7}.drag-card:hover{border-color:var(--white);box-shadow:0 0 8px rgba(232,232,255,.2)}
.drag-card.dragging{opacity:.35}
.drag-card.selected{border-color:var(--yellow);box-shadow:0 0 10px rgba(255,230,0,.45);background:rgba(255,230,0,.04)}
.drop-zone.accepting{border-color:rgba(255,230,0,.5);border-style:solid}
.drop-zone.accepting:hover{border-color:var(--yellow);box-shadow:0 0 8px rgba(255,230,0,.35);cursor:pointer}
.drop-zone .drag-card{font-size:11px;margin-top:14px}
.drop-zone--pro .drag-card{border-color:rgba(0,255,245,.5)}.drop-zone--con .drag-card{border-color:rgba(255,0,204,.5)}
.drop-zone.correct .drag-card{border-color:var(--green);color:var(--green)}
.drop-zone.wrong .drag-card{border-color:var(--orange);color:var(--orange)}
.card-pool-section{position:sticky;top:80px}
.card-pool-header{font-size:13px;font-weight:600;color:var(--yellow);letter-spacing:2px;text-shadow:0 0 8px var(--yellow);margin-bottom:12px}
.card-pool{background:var(--card);border:2px solid var(--grey);padding:12px;min-height:120px;display:flex;flex-direction:column;gap:8px}
.card-pool.drag-over{border-color:var(--yellow);box-shadow:0 0 10px rgba(255,230,0,.3)}
.card-pool__empty{font-family:var(--fb);font-size:12px;color:rgba(232,232,255,.3);text-align:center;padding:20px 0}
.result-banner__score{font-size:22px}
@media(max-width:768px){.game-area{grid-template-columns:1fr}.card-pool-section{order:-1;position:static}}
@media(max-width:480px){.game-page{padding:20px 1rem 40px}.topic-card{padding:14px}.drop-zone{min-height:60px}}
@media(max-width:380px){.drop-zones{grid-template-columns:1fr}}</style></head>
<body><main class="game-page">
<div class="page-header"><a href="index.html" class="page-header__back">◀ HOME</a><h1>🐺 Đoán Ưu / Nhược</h1>
<p class="page-header__sub">Kéo thả thẻ vào đúng ô tương ứng với từng chủ đề</p></div>
<div class="score-bar"><div class="score-chip pixel-box" id="progDisp">0 / 0 PLACED</div>
<button class="action-btn action-btn--check" id="checkBtn" onclick="checkAnswers()">✓ CHECK</button>
<button class="action-btn action-btn--play-again" id="contBtn" onclick="contGame()" style="display:none">▶ CONTINUE</button>
<div class="score-chip pixel-box pixel-box--yellow" id="scoreDisp">SCORE: —</div></div>
<div class="game-area"><div class="topics-col" id="topicsCol"></div>
<div class="card-pool-section"><div class="card-pool-header">▸ THẺ CÒN LẠI</div>
<div class="card-pool pixel-box pixel-box--yellow" id="cardPool" ondragover="hDragOver(event)" ondrop="hDropPool(event)">
<div class="card-pool__empty" id="poolEmpty">Tất cả thẻ đã được đặt!</div></div></div></div>
<div class="result-banner" id="resultBanner"><div class="result-banner__score" id="resultScore"></div><div class="result-banner__msg" id="resultMsg"></div></div></main>
<script>
let gd=[],dragId=null,selId=null,dropSt={},chk=false;
function clrSel(){selId=null;document.querySelectorAll('.drag-card.selected').forEach(c=>c.classList.remove('selected'));document.querySelectorAll('.drop-zone.accepting').forEach(z=>z.classList.remove('accepting'))}
function initDrop(){dropSt={};gd.forEach(t=>{dropSt[t.id]={pro:null,con:null}})}
function buildGame(){chk=false;initDrop();renderTopics();renderPool();upProg();
document.getElementById('resultBanner').style.display='none';document.getElementById('contBtn').style.display='none';document.getElementById('checkBtn').style.display=''}
function renderTopics(){const col=document.getElementById('topicsCol');col.innerHTML='';
gd.forEach((t,i)=>{const a=document.createElement('article');a.className='topic-card';a.id='topic-'+t.id;
a.innerHTML=`<div class="topic-card__hdr"><span class="topic-card__num">${String(i+1).padStart(2,'0')}.</span><span class="topic-card__title font-vi-h">${PV.escHtml(t.topic)}</span></div>
<p class="topic-card__passage font-vi">${PV.escHtml(t.passage)}</p>
<div class="drop-zones"><div class="drop-zone drop-zone--pro" id="dz-${t.id}-pro" ondragover="hDragOver(event)" ondrop="hDropZone(event,'${t.id}','pro')" ondragleave="hDragLeave(event)"><span class="drop-zone__label">ƯU ▸</span><span class="drop-zone__empty">Kéo / nhấn thẻ</span></div>
<div class="drop-zone drop-zone--con" id="dz-${t.id}-con" ondragover="hDragOver(event)" ondrop="hDropZone(event,'${t.id}','con')" ondragleave="hDragLeave(event)"><span class="drop-zone__label">NHƯỢC ▸</span><span class="drop-zone__empty">Kéo / nhấn thẻ</span></div></div>`;
col.appendChild(a);a.querySelectorAll('.drop-zone').forEach(z=>{const[,tid,tp]=z.id.split('-');
z.addEventListener('click',e=>{e.stopPropagation();if(!selId||chk)return;dragId=selId;clrSel();SFX.place();doDrop(tid,tp)})})});
document.addEventListener('click',()=>clrSel(),{capture:false})}
function renderPool(){const pool=document.getElementById('cardPool'),emp=document.getElementById('poolEmpty');
pool.querySelectorAll('.drag-card').forEach(c=>c.remove());const placed=new Set();
Object.values(dropSt).forEach(s=>{if(s.pro)placed.add(s.pro);if(s.con)placed.add(s.con)});
let cards=[];gd.forEach(t=>{cards.push({id:t.pro.id,text:t.pro.text,tid:t.id,tp:'pro'});cards.push({id:t.con.id,text:t.con.text,tid:t.id,tp:'con'})});
cards=PV.shuffle(cards).filter(c=>!placed.has(c.id));emp.style.display=cards.length===0?'block':'none';
cards.forEach(c=>pool.appendChild(mkCard(c)))}
function mkCard(card){const d=document.createElement('div');d.className='drag-card';d.draggable=true;d.dataset.cardId=card.id;d.textContent=card.text;
d.addEventListener('click',e=>{e.stopPropagation();if(chk)return;if(selId===card.id)clrSel();else{clrSel();selId=card.id;d.classList.add('selected');SFX.select();document.querySelectorAll('.drop-zone').forEach(z=>z.classList.add('accepting'))}});
d.addEventListener('dragstart',e=>{clrSel();dragId=card.id;d.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',card.id)});
d.addEventListener('dragend',()=>d.classList.remove('dragging'));
let tx,ty;d.addEventListener('touchstart',e=>{const t=e.touches[0];tx=t.clientX;ty=t.clientY;dragId=card.id},{passive:true});
d.addEventListener('touchend',e=>{const t=e.changedTouches[0],el=document.elementFromPoint(t.clientX,t.clientY),z=el?el.closest('.drop-zone'):null;
if(z){const[,tid,tp]=z.id.split('-');doDrop(tid,tp)}dragId=null});return d}
function getCard(cid){for(const t of gd){if(t.pro.id===cid)return{id:t.pro.id,text:t.pro.text,tid:t.id,tp:'pro'};if(t.con.id===cid)return{id:t.con.id,text:t.con.text,tid:t.id,tp:'con'}}return null}
function hDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over')}
function hDragLeave(e){e.currentTarget.classList.remove('drag-over')}
function hDropZone(e,tid,tp){e.preventDefault();e.currentTarget.classList.remove('drag-over');if(!dragId)return;doDrop(tid,tp)}
function doDrop(tid,tp){if(!dragId||chk)return;const inc=dragId;if(dropSt[tid][tp])dropSt[tid][tp]=null;
for(const k of Object.keys(dropSt)){if(dropSt[k].pro===inc)dropSt[k].pro=null;if(dropSt[k].con===inc)dropSt[k].con=null}
dropSt[tid][tp]=inc;dragId=null;SFX.place();refZone(tid,'pro');refZone(tid,'con');renderPool();upProg()}
function hDropPool(e){e.preventDefault();e.currentTarget.classList.remove('drag-over');if(!dragId||chk)return;
for(const k of Object.keys(dropSt)){if(dropSt[k].pro===dragId){dropSt[k].pro=null;refZone(k,'pro')}if(dropSt[k].con===dragId){dropSt[k].con=null;refZone(k,'con')}}dragId=null;renderPool();upProg()}
function refZone(tid,tp){const z=document.getElementById(`dz-${tid}-${tp}`);if(!z)return;const cid=dropSt[tid][tp];
z.querySelector('.drag-card')?.remove();const emp=z.querySelector('.drop-zone__empty');
if(cid){const c=getCard(cid);if(c){const el=mkCard(c);el.addEventListener('dragstart',ev=>{dragId=cid;el.classList.add('dragging');ev.dataTransfer.effectAllowed='move';ev.dataTransfer.setData('text/plain',cid)});
z.appendChild(el);if(emp)emp.style.display='none'}}else{if(emp)emp.style.display=''}}
function upProg(){let f=0;const tot=gd.length*2;Object.values(dropSt).forEach(s=>{if(s.pro)f++;if(s.con)f++});document.getElementById('progDisp').textContent=`${f} / ${tot} PLACED`}
function checkAnswers(){let ok=0;const tot=gd.length*2;gd.forEach(t=>{const s=dropSt[t.id];
['pro','con'].forEach(tp=>{const z=document.getElementById(`dz-${t.id}-${tp}`);if(!z)return;z.classList.remove('correct','wrong');
const pid=s[tp],cid=tp==='pro'?t.pro.id:t.con.id;if(pid===cid){z.classList.add('correct');ok++}else z.classList.add('wrong')})});
chk=true;const pct=Math.round(ok/tot*100);SFX[pct===100?'correct':'wrong']();
document.getElementById('scoreDisp').textContent=`SCORE: ${ok}/${tot}`;PV.showResult(ok,tot,PV.checkMsg(pct));
document.getElementById('checkBtn').style.display='none';document.getElementById('contBtn').style.display=''}
function contGame(){chk=false;document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('correct','wrong'));
document.getElementById('resultBanner').style.display='none';document.getElementById('checkBtn').style.display='';document.getElementById('contBtn').style.display='none'}
(async()=>{gd=await PV.loadData('prosCons')||[];buildGame()})();
</script></body></html>
