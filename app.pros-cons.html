<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🐺 — PIXELVERSE</title><link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300fff5'>◈</text></svg>">
<link rel="stylesheet" href="style.css"/><script src="app.js"></script>
<style>
.page-header h1{color:var(--text-primary);font-family:var(--font-serif);font-size:clamp(24px,4vw,32px);font-weight:700}
.game-area{display:grid;grid-template-columns:1fr 280px;gap:24px;align-items:start}
.topic-card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:20px;transition:all 0.15s}
.topic-card:hover{border-color:var(--border-default)}
.topic-card.highlight{border-color:var(--accent);background:var(--accent-subtle)}
.topic-card__hdr{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.topic-card__num{font-family:var(--font-sans);font-size:12px;font-weight:600;color:var(--accent);min-width:28px}
.topic-card__title{font-family:var(--font-serif);font-size:22px;font-weight:700;color:var(--text-primary)}
.topic-card__passage{font-family:var(--font-sans);font-size:13px;color:var(--text-secondary);line-height:1.7;margin-bottom:16px}
.drop-zones{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.drop-zone{min-height:96px;border:1px dashed var(--border-default);border-radius:6px;padding:10px;display:flex;align-items:center;justify-content:center;position:relative;transition:all 0.15s}
.drop-zone--pro{border-color:var(--success-subtle)}.drop-zone--con{border-color:var(--error-subtle)}
.drop-zone.drag-over{background:var(--bg-elevated)}
.drop-zone--pro.drag-over{border-color:var(--success);background:rgba(92,184,92,.08)}
.drop-zone--con.drag-over{border-color:var(--error);background:rgba(217,100,89,.08)}
.drop-zone__label{font-size:13px;font-weight:600;position:absolute;top:6px;left:8px;letter-spacing:0.5px;opacity:0.8}
.drop-zone--pro .drop-zone__label{color:var(--success)}.drop-zone--con .drop-zone__label{color:var(--error)}
.drop-zone__empty{font-family:var(--font-sans);font-size:11px;color:var(--text-tertiary);text-align:center;margin-top:10px}
.drop-zone.correct{border-style:solid;border-color:var(--success);background:var(--success-subtle)}
.drop-zone.wrong{border-style:solid;border-color:var(--error);background:var(--error-subtle)}
.drag-card{background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:4px;padding:12px 16px;font-family:var(--font-sans);font-size:15px;color:var(--text-primary);line-height:1.5;cursor:grab;transition:all 0.15s;width:100%;position:relative;min-height:56px;display:flex;align-items:center;justify-content:center}
.drag-card:active{cursor:grabbing;opacity:0.6}.drag-card:hover{border-color:var(--accent)}
.drag-card.dragging{opacity:0.4}
.drag-card.selected{border-color:var(--accent);background:var(--accent-subtle)}
.drop-zone.accepting{border-color:var(--accent);border-style:solid}
.drop-zone.accepting:hover{background:var(--accent-muted);cursor:pointer}
.drop-zone .drag-card{font-size:11px;margin-top:14px}
.drop-zone--pro .drag-card{border-color:rgba(92,184,92,.5)}.drop-zone--con .drag-card{border-color:rgba(217,100,89,.5)}
.drop-zone.correct .drag-card{border-color:var(--success);color:var(--success)}
.drop-zone.wrong .drag-card{border-color:var(--error);color:var(--error)}
.card-pool-section{position:sticky;top:80px}
.card-pool-header{font-family:var(--font-sans);font-size:16px;font-weight:600;color:var(--text-primary);letter-spacing:0.25px;margin-bottom:14px}
.card-pool{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:12px;min-height:120px;display:flex;flex-direction:column;gap:8px}
.card-pool.drag-over{border-color:var(--accent);background:var(--accent-subtle)}
.card-pool__empty{font-family:var(--font-sans);font-size:12px;color:var(--text-tertiary);text-align:center;padding:20px 0}
.result-banner{padding:20px;margin-top:20px;border:1px solid var(--border-default);border-left:3px solid var(--success);background:var(--bg-surface);border-radius:var(--radius-md)}
.result-banner.error{border-left-color:var(--error)}
.result-banner__score{font-size:16px;font-weight:600}.result-banner__msg{font-size:14px;letter-spacing:0.25px;margin-top:8px}
@media(max-width:768px){.game-area{grid-template-columns:1fr}.card-pool-section{order:-1;position:static}}
@media(max-width:480px){.game-page{padding:20px 1rem 40px}.topic-card{padding:14px}.drop-zone{min-height:60px}}
@media(max-width:380px){.drop-zones{grid-template-columns:1fr}}
</style></head>
<body><main class="game-page">
<div class="page-header"><a href="index.html" class="page-header__back">← Home</a><h1>🐺 Đoán Ưu / Nhược</h1>
<p class="page-header__sub">Kéo thả thẻ vào đúng ô tương ứng với từng chủ đề</p></div>
<div class="how-to"><strong>Cách chơi:</strong> Mỗi chủ đề có 2 ô: Ưu điểm (xanh) và Nhược điểm (đỏ). Kéo thẻ vào ô đúng. Nhấp "Check" khi xong.</div>
<div class="control-bar">
<div class="control-bar__row">
<span class="control-bar__stat" id="setDisp">Bộ: 1 / 1</span>
<button class="control-bar__check" id="checkBtn">Check<span class="check-toggle" id="checkToggle">›all</span></button>
<button class="control-bar__continue" id="contBtn" style="display:none">Tiếp tục</button>
<span class="control-bar__stat" id="scoreDisp" style="display:none">Điểm: 0</span></div>
<div class="control-bar__nav">
<button class="control-bar__prev" id="prevBtn">←</button>
<div class="control-bar__dots" id="ctrlDots"></div>
<button class="control-bar__next" id="nextBtn">→</button></div></div>
<div class="game-area"><div class="topics-col" id="topicsCol"></div>
<div class="card-pool-section"><div class="card-pool-header">Thẻ còn lại</div>
<div class="card-pool" id="cardPool">
<div class="card-pool__empty" id="poolEmpty">Tất cả thẻ đã được đặt!</div></div></div></div>
<div class="result-banner" id="resultBanner"><div class="result-banner__score" id="resultScore"></div><div class="result-banner__msg" id="resultMsg"></div></div></main>
<div class="toast" id="toast"></div>
<script>
let gd=[],cs=0,dragId=null,selId=null,sDropSt={},chk=false;
const gameState={sets:[],currentSetIdx:0,checkMode:'all',setResults:[],globalResults:{correct:0,total:0,pct:0}};
function clrSel(){selId=null;document.querySelectorAll('.drag-card.selected').forEach(c=>c.classList.remove('selected'));document.querySelectorAll('.drop-zone.accepting').forEach(z=>z.classList.remove('accepting'))}
function getDropSt(qId){if(!sDropSt[cs])sDropSt[cs]={};if(!sDropSt[cs][qId])sDropSt[cs][qId]={pro:null,con:null};return sDropSt[cs][qId]}
function buildGame(){if(!gd[cs])return;chk=false;if(!sDropSt[cs])sDropSt[cs]={};renderTopics();renderPool();upSetNav()}
function renderTopics(){const col=document.getElementById('topicsCol');col.innerHTML='';
(gd[cs].questions||[]).forEach((t,qi)=>{
const ds=getDropSt(t.id);const a=document.createElement('article');a.className='topic-card';a.id='topic-'+t.id;
a.innerHTML=`<div class="topic-card__hdr"><span class="topic-card__num">${String(qi+1).padStart(2,'0')}.</span><span class="topic-card__title">${PV.escHtml(t.topic)}</span></div>
<p class="topic-card__passage">${PV.escHtml(t.passage)}</p>
<div class="drop-zones"><div class="drop-zone drop-zone--pro" id="dz-pro-${t.id}"><span class="drop-zone__label">Ưu</span><span class="drop-zone__empty">Kéo / nhấn thẻ</span></div>
<div class="drop-zone drop-zone--con" id="dz-con-${t.id}"><span class="drop-zone__label">Nhược</span><span class="drop-zone__empty">Kéo / nhấn thẻ</span></div></div>`;
col.appendChild(a);
['pro','con'].forEach(tp=>{const z=document.getElementById(`dz-${tp}-${t.id}`);
z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drag-over')});
z.addEventListener('dragleave',e=>{z.classList.remove('drag-over')});
z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('drag-over');if(!dragId||chk)return;doDrop(tp,t.id)});
z.addEventListener('click',e=>{e.stopPropagation();if(!selId||chk)return;dragId=selId;clrSel();SFX.place();doDrop(tp,t.id)});
if(ds[tp]){const c=getCard(ds[tp]);if(c){const el=mkCard(c);z.appendChild(el);z.querySelector('.drop-zone__empty').style.display='none'}}})})}
function renderPool(){const pool=document.getElementById('cardPool'),emp=document.getElementById('poolEmpty');
pool.querySelectorAll('.drag-card').forEach(c=>c.remove());
const qs=gd[cs].questions||[];const placed=new Set();
qs.forEach(t=>{const ds=getDropSt(t.id);if(ds.pro)placed.add(ds.pro);if(ds.con)placed.add(ds.con)});
let cards=[];qs.forEach(t=>{cards.push({id:t.pro.id,text:t.pro.text,tp:'pro'},{id:t.con.id,text:t.con.text,tp:'con'})});
cards=cards.filter(c=>!placed.has(c.id));emp.style.display=cards.length===0?'block':'none';
cards.forEach(c=>pool.appendChild(mkCard(c)));}
const _pool=document.getElementById('cardPool');
_pool.addEventListener('dragover',e=>{e.preventDefault();_pool.classList.add('drag-over')});
_pool.addEventListener('dragleave',e=>{if(!_pool.contains(e.relatedTarget))_pool.classList.remove('drag-over')});
_pool.addEventListener('drop',e=>{e.preventDefault();_pool.classList.remove('drag-over');if(!dragId||chk)return;
(gd[cs].questions||[]).forEach(t=>{const ds=getDropSt(t.id);if(ds.pro===dragId)ds.pro=null;if(ds.con===dragId)ds.con=null});
dragId=null;renderTopics();renderPool();upSetDots()});
document.addEventListener('click',()=>clrSel());
function mkCard(card){const d=document.createElement('div');d.className='drag-card';d.draggable=true;d.dataset.cardId=card.id;d.textContent=card.text;
d.addEventListener('click',e=>{e.stopPropagation();if(chk)return;if(selId===card.id)clrSel();else{clrSel();selId=card.id;d.classList.add('selected');SFX.select();document.querySelectorAll('.drop-zone').forEach(z=>z.classList.add('accepting'))}});
d.addEventListener('dragstart',e=>{clrSel();dragId=card.id;d.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',card.id)});
d.addEventListener('dragend',()=>d.classList.remove('dragging'));
d.addEventListener('touchstart',e=>{dragId=card.id},{passive:true});
d.addEventListener('touchend',e=>{const tc=e.changedTouches[0],el=document.elementFromPoint(tc.clientX,tc.clientY),z=el?el.closest('.drop-zone'):null;
if(z){const m=z.id.match(/^dz-(pro|con)-(.+)$/);if(m)doDrop(m[1],m[2])}dragId=null});return d}
function getCard(cid){for(const t of(gd[cs].questions||[])){if(t.pro.id===cid)return{id:t.pro.id,text:t.pro.text,tp:'pro'};if(t.con.id===cid)return{id:t.con.id,text:t.con.text,tp:'con'}}return null}
function doDrop(tp,qId){if(!dragId||chk)return;
(gd[cs].questions||[]).forEach(t=>{const ds=getDropSt(t.id);if(ds.pro===dragId)ds.pro=null;if(ds.con===dragId)ds.con=null});
const ds=getDropSt(qId);ds[tp]=dragId;dragId=null;SFX.place();renderTopics();renderPool();upSetDots()}
function buildSetDots(){PV.buildDots(gd.length,'ctrlDots');
document.querySelectorAll('#ctrlDots .control-bar__dot').forEach((d,i)=>{d.addEventListener('click',e=>{e.stopPropagation();if(i!==cs){SFX.navigate();goTo(i)}})})}
function upSetDots(){const states=gd.map((_,i)=>{if(i===cs)return'active';if(gameState.setResults[i])return gameState.setResults[i].pct===100?'answered':'wrong-q';
const ds=sDropSt[i];if(ds&&Object.values(ds).some(q=>q&&(q.pro||q.con)))return'drafted';return null});PV.setAllDots(states,'ctrlDots')}
function goTo(i){cs=i;gameState.currentSetIdx=i;chk=false;document.getElementById('resultBanner').classList.remove('show','error');document.getElementById('checkBtn').style.display='';document.getElementById('contBtn').style.display='none';buildGame()}
function upSetNav(){document.getElementById('setDisp').textContent=`Bộ: ${cs+1} / ${gd.length}`;document.getElementById('prevBtn').disabled=cs===0;document.getElementById('nextBtn').disabled=cs===gd.length-1;upSetDots()}
function prevSet(){if(cs>0){SFX.navigate();goTo(cs-1)}}function nextSet(){if(cs<gd.length-1){SFX.navigate();goTo(cs+1)}}
function checkAnswers(){if(gameState.checkMode==='all'){checkAllSets()}else{checkCurrentSet()}}
function checkCurrentSet(){chk=true;let ok=0,tot=0;
(gd[cs].questions||[]).forEach(t=>{const ds=getDropSt(t.id);
['pro','con'].forEach(tp=>{const z=document.getElementById(`dz-${tp}-${t.id}`);if(!z)return;
z.classList.remove('correct','wrong');const pid=ds[tp],cid=tp==='pro'?t.pro.id:t.con.id;tot++;
if(pid===cid){z.classList.add('correct');ok++}else z.classList.add('wrong')})});
const pct=tot===0?100:Math.round(ok/tot*100);gameState.setResults[cs]={correct:ok,total:tot,pct};SFX[pct===100?'correct':'wrong']();
const sdp=document.getElementById('scoreDisp');sdp.style.display='';sdp.textContent=`Điểm: ${ok}/${tot}`;PV.showResult(ok,tot,PV.checkMsg(pct));
document.getElementById('checkBtn').style.display='none';document.getElementById('contBtn').style.display='';upSetDots()}
function checkAllSets(){chk=true;let globalOk=0,globalTot=0;
gd.forEach((set,idx)=>{if(!sDropSt[idx])sDropSt[idx]={};let ok=0,tot=0;
(set.questions||[]).forEach(t=>{const ds=sDropSt[idx][t.id]||{pro:null,con:null};
['pro','con'].forEach(tp=>{tot++;if(ds[tp]===(tp==='pro'?t.pro.id:t.con.id))ok++})});
const pct=tot===0?100:Math.round(ok/tot*100);gameState.setResults[idx]={correct:ok,total:tot,pct};globalOk+=ok;globalTot+=tot});
(gd[cs].questions||[]).forEach(t=>{const ds=getDropSt(t.id);
['pro','con'].forEach(tp=>{const z=document.getElementById(`dz-${tp}-${t.id}`);if(!z)return;
z.classList.remove('correct','wrong');if(ds[tp]===(tp==='pro'?t.pro.id:t.con.id))z.classList.add('correct');else z.classList.add('wrong')})});
const globalPct=globalTot===0?100:Math.round(globalOk/globalTot*100);
gameState.globalResults={correct:globalOk,total:globalTot,pct:globalPct};SFX[globalPct===100?'correct':'wrong']();
const sdp2=document.getElementById('scoreDisp');sdp2.style.display='';sdp2.textContent=`Điểm: ${globalOk}/${globalTot}`;PV.showResult(globalOk,globalTot,PV.checkMsg(globalPct));
document.getElementById('checkBtn').style.display='none';document.getElementById('contBtn').style.display='';upSetDots()}
function contGame(){chk=false;document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('correct','wrong'));
document.getElementById('resultBanner').classList.remove('show','error');document.getElementById('checkBtn').style.display='';document.getElementById('contBtn').style.display='none';document.getElementById('scoreDisp').style.display='none'}
document.getElementById('checkBtn').addEventListener('click',checkAnswers);
document.getElementById('checkToggle').addEventListener('click',e=>{e.stopPropagation();SFX.click();PV.toggleCheckMode(gameState)});
document.getElementById('contBtn').addEventListener('click',contGame);
document.getElementById('prevBtn').addEventListener('click',prevSet);
document.getElementById('nextBtn').addEventListener('click',nextSet);
(async()=>{let raw=await PV.loadData('prosCons')||[];
if(raw.length&&raw[0].topic!==undefined){raw=[{id:Date.now(),setTitle:'BỘ 1',questions:raw}]}
gd=raw;if(!gd.length)return;
gameState.sets=gd;gameState.currentSetIdx=0;gameState.checkMode='all';cs=0;sDropSt={};buildSetDots();buildGame()})();
</script></body></html>
